<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>MAD Perfume</title>
  <meta http-equiv="refresh" content="0; url=customer.html?lang=he">
  <script>
    (function () {
      var target = new URL("customer.html", window.location.href);
      var source = new URL(window.location.href);
      source.searchParams.forEach(function (value, key) {
        if (key !== "lang") target.searchParams.append(key, value);
      });
      target.searchParams.set("lang", "he");
      window.location.replace(target.toString());
    }());
  </script>
</head>
<body>
  <a href="customer.html?lang=he">Open Hebrew catalog</a>
</body>
</html>
