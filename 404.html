<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MAD Perfume</title>
  <meta name="robots" content="noindex">
  <style>
    html,body{margin:0;min-height:100%;background:#121a2b;color:#fff;font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif}
    body{display:grid;place-items:center;text-align:center;padding:20px}
    a{color:#25d366;font-weight:800}
  </style>
</head>
<body>
  <main>
    <p id="msg">سيتم فتح صفحة المنتج خلال لحظات.</p>
    <a id="link" href="/customer.html">فتح الكتالوج</a>
  </main>
  <script>
    (function () {
      var path = location.pathname.replace(/^\/+|\/+$/g, "");
      var match = path.match(/^(?:product|p)\/(\d+)$/i) || path.match(/^(\d+)$/);
      if (!match) return;
      var id = match[1];
      var params = new URLSearchParams(location.search);
      params.set("id", id);
      if (!params.has("v")) params.set("v", "20260706d");
      var target = "/p.html?" + params.toString();
      document.getElementById("link").href = target;
      location.replace(target);
    }());
  </script>
</body>
</html>
