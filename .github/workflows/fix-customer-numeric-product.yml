name: Fix customer numeric product links

on:
  - push
  - workflow_dispatch

permissions:
  contents: write

jobs:
  patch-customer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch customer.html
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('customer.html')
          text = path.read_text(encoding='utf-8')
          original = text

          def replace_once(old, new, label):
              global text
              if new in text:
                  return
              if old not in text:
                  raise SystemExit(f'Missing expected block: {label}')
              text = text.replace(old, new, 1)

          old_product_key = '''    function productSearchText(product) {
      return `${product.name} ${product.code} ${product.category}`.toLowerCase();
    }
    function productPageKey(product) {
      return safe(product.code || product.id).trim();
    }
'''
          new_product_key = '''    function productSearchText(product) {
      return `${product.name} ${product.code} ${product.category}`.toLowerCase();
    }
    function productStoreId(product) {
      const match = safe(`${product.link} ${product.id}`).match(/product\\.show\\.(\\d+)/i);
      return match ? match[1] : "";
    }
    function productPageKey(product) {
      return productStoreId(product) || safe(product.code || product.id).trim();
    }
'''
          replace_once(old_product_key, new_product_key, 'productPageKey')

          old_preserved = '''    function preservedUrlParams(url) {
      const langParam = (qs.get("lang") || "").trim();
      const waParam = (qs.get("wa") || "").trim();
      if (langParam) url.searchParams.set("lang", langParam);
      if (waParam) url.searchParams.set("wa", waParam);
    }
'''
          new_preserved = '''    function preservedUrlParams(url) {
      const langParam = (qs.get("lang") || locale || "").trim();
      const waParam = (qs.get("wa") || "").trim();
      if (langParam) url.searchParams.set("lang", langParam);
      if (waParam) url.searchParams.set("wa", waParam);
    }
'''
          replace_once(old_preserved, new_preserved, 'preservedUrlParams')

          old_keys = '''          productPageKey(product),
          product.code,
          product.id,
          product.link
'''
          new_keys = '''          productPageKey(product),
          productStoreId(product),
          product.code,
          product.id,
          product.link
'''
          replace_once(old_keys, new_keys, 'findProductByKey keys')

          old_fallback = '''    function renderInstantCatalog() {
      const cached = readCachedCatalog();
      const fallback = cached.length ? cached : (FALLBACK_CATALOG[locale] || []);
      if (!fallback.length) return false;
      setProducts(fallback);
      return renderCurrentProducts();
    }
'''
          new_fallback = '''    function renderInstantCatalog() {
      const cached = readCachedCatalog();
      const requestedKey = requestedProductKey();
      const fallbackCatalog = requestedKey
        ? [
            ...(FALLBACK_CATALOG[locale] || []),
            ...Object.keys(FALLBACK_CATALOG)
              .filter((catalogLocale) => catalogLocale !== locale)
              .flatMap((catalogLocale) => FALLBACK_CATALOG[catalogLocale] || [])
          ]
        : (FALLBACK_CATALOG[locale] || []);
      const fallback = requestedKey ? fallbackCatalog : (cached.length ? cached : fallbackCatalog);
      if (!fallback.length) return false;
      setProducts(fallback);
      return renderCurrentProducts();
    }
'''
          replace_once(old_fallback, new_fallback, 'renderInstantCatalog')

          old_not_found = '''        if (!renderCurrentProducts()) {
          document.body.classList.remove("product-view");
          els.status.hidden = false;
          els.status.textContent = pt("productNotFound");
        }
'''
          new_not_found = '''        if (!renderCurrentProducts()) {
          if (renderedInstantly) return;
          document.body.classList.remove("product-view");
          els.status.hidden = false;
          els.status.textContent = pt("productNotFound");
        }
'''
          replace_once(old_not_found, new_not_found, 'external catalog not found fallback')

          if text == original:
              print('customer.html already patched')
          else:
              path.write_text(text, encoding='utf-8')
              print('customer.html patched')
          PY

      - name: Commit patch and remove workflow
        shell: bash
        run: |
          rm -f .github/workflows/fix-customer-numeric-product.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A customer.html .github/workflows/fix-customer-numeric-product.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Support numeric product links on customer page"
            git push
          fi
