<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MAD PRINT</title>
  <meta name="description" content="MAD Print Manager" />
  <style>
    :root { --bg:#0f172a; --card:#111827; --line:#1f2937; --txt:#e5e7eb; --brand:#22c55e; }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(180deg,#0b1220,#111827);color:var(--txt)}
    .top{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(17,24,39,.9);backdrop-filter:blur(4px)}
    .title{font-weight:900;letter-spacing:.5px}
    .actions{display:flex;gap:8px}
    .btn{border:1px solid #334155;background:#0b1220;color:#e5e7eb;padding:8px 12px;border-radius:10px;cursor:pointer;text-decoration:none;font-size:13px;font-weight:700}
    .btn.primary{background:var(--brand);color:#052e16;border-color:#16a34a}
    .wrap{padding:12px}
    iframe{width:100%;height:calc(100vh - 78px);border:1px solid #334155;border-radius:14px;background:#fff}
    .note{font-size:12px;color:#94a3b8;margin-top:8px;text-align:center}
  </style>
</head>
<body>
  <header class="top">
    <div class="title">MAD PRINT</div>
    <div class="actions">
      <a class="btn" href="https://script.google.com/macros/s/AKfycbwj2YQfX_hwha73zHZnTCvr1JcJAcpc0_zNTzOUpCbpbU5NLoH7wyp1EqHRhzdT87TD4Q/exec?page=employee" target="_blank" rel="noopener">فتح مباشر</a>
      <button class="btn primary" onclick="reloadFrame()">تحديث</button>
    </div>
  </header>

  <main class="wrap">
    <iframe
      id="appFrame"
      title="MAD Print Manager"
      src="https://script.google.com/macros/s/AKfycbwj2YQfX_hwha73zHZnTCvr1JcJAcpc0_zNTzOUpCbpbU5NLoH7wyp1EqHRhzdT87TD4Q/exec?page=employee"
      loading="eager"
      referrerpolicy="no-referrer"
      allow="clipboard-read; clipboard-write">
    </iframe>
    <div class="note">إذا لم يظهر داخل الإطار، استخدم زر "فتح مباشر".</div>
  </main>

  <script>
    function reloadFrame() {
      const f = document.getElementById('appFrame');
      f.src = f.src;
    }
  </script>
</body>
</html>
