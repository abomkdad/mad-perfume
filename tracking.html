<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAD Parfumeur | Order Tracking</title>
    
    <link rel="icon" href="https://www.mad-parfumeur.com/assets/hero/lg.png" type="image/png">
    
    <meta name="theme-color" content="#0f172a">
    
    <style>
        /* إزالة أي حواف أو هوامش لجعل الصفحة تملأ الشاشة بالكامل */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* لمنع ظهور شريطي تمرير */
            background-color: #0f172a; /* نفس لون خلفية التطبيق لدمج سلس */
            font-family: sans-serif;
        }

        /* جعل الإطار يغطي 100% من الشاشة بدون أي إطار */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 10;
        }

        /* شاشة تحميل أنيقة تظهر بينما يفتح جوجل سكريبت */
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(59, 130, 246, 0.3);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }

        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }
    </style>
</head>
<body>

    <div id="loader">
        <img src="https://www.mad-parfumeur.com/assets/hero/lg.png" alt="MAD Parfumeur" style="height: 40px; margin-bottom: 15px; filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.5));">
        <div class="spinner"></div>
    </div>

    <iframe 
        src="https://script.google.com/macros/s/AKfycbxHbh6v1Lq3MXeTWdOTYOoCpRJEbkBpmLUGGmF2AINLgs8jNoMvQkN2CuJLjndOcGJT/exec?page=tracking" 
        allowfullscreen 
        onload="document.getElementById('loader').style.display='none';">
    </iframe>

</body>
</html>
