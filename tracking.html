<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <title>MAD Parfumeur | מעקב הזמנות</title>
  <meta name="description" content="تتبع طلبك من MAD Parfumeur" />
  <meta name="theme-color" content="#0f172a" />
  
  <link rel="icon" href="https://www.mad-parfumeur.com/assets/hero/lg.png" type="image/png">

  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0f172a; /* نفس لون خلفية التتبع لدمج مثالي */
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* الإطار يملأ الشاشة بالكامل بدون أي حواف */
    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 1;
    }

    /* زر الخطة البديلة الشفاف أسفل الشاشة */
    .fallback-btn {
      position: absolute;
      bottom: env(safe-area-inset-bottom, 20px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(30, 41, 59, 0.85);
      color: #94a3b8;
      padding: 8px 16px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 11px;
      font-weight: bold;
      border: 1px solid rgba(51, 65, 85, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      white-space: nowrap;
      transition: all 0.2s;
    }

    .fallback-btn:active {
      transform: translateX(-50%) scale(0.95);
      background: rgba(30, 41, 59, 1);
    }
  </style>
</head>
<body>

  <iframe 
    src="https://script.google.com/macros/s/AKfycbyF-nYl9dSSIJx6lVPrJRC8km0HbOYf7deD_oYQLIkIn5IBw4UBMSBbDhcGrySC38Bp/exec?page=tracking" 
    allow="clipboard-read; clipboard-write">
  </iframe>

  <a href="https://script.google.com/macros/s/AKfycbyF-nYl9dSSIJx6lVPrJRC8km0HbOYf7deD_oYQLIkIn5IBw4UBMSBbDhcGrySC38Bp/exec?page=tracking" target="_blank" class="fallback-btn">
    إذا لم تظهر الصفحة، اضغط هنا للفتح المباشر 👆
  </a>

</body>
</html>
