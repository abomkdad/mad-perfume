<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAD Parfumeur | Order Tracking</title>
    <meta name="theme-color" content="#0f172a">
    
    <link rel="icon" href="https://www.mad-parfumeur.com/assets/hero/lg.png" type="image/png">
    
    <style>
        body {
            margin: 0;
            background-color: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
        }
        img {
            height: 60px;
            margin-bottom: 20px;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.5));
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(59, 130, 246, 0.3);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }
    </style>

    <script>
        // التحويل المباشر لصفحة التتبع بعد ثانية واحدة (لتخطي حظر الإطارات)
        setTimeout(function() {
            window.location.replace("https://script.google.com/macros/s/AKfycbxHbh6v1Lq3MXeTWdOTYOoCpRJEbkBpmLUGGmF2AINLgs8jNoMvQkN2CuJLjndOcGJT/exec?page=tracking");
        }, 1000);
    </script>
</head>
<body>

    <img src="https://www.mad-parfumeur.com/assets/hero/lg.png" alt="MAD Parfumeur">
    <div class="spinner"></div>

</body>
</html>
