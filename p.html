<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>MAD Perfume</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#121a2b">
  <style>
    html,body{margin:0;min-height:100%;background:#121a2b;color:#f5f8ff;font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif}
    body{display:grid;place-items:center}
    .fallback{display:none;max-width:360px;padding:20px;text-align:center;line-height:1.7}
    .fallback a{color:#25d366;font-weight:800}
  </style>
</head>
<body>
  <div class="fallback" id="fallback">
    <p id="message">سيتم فتح صفحة المنتج خلال لحظات.</p>
    <a id="manual" href="customer.html">فتح الكتالوج</a>
  </div>
  <script>
    (function () {
      var qs = new URLSearchParams(location.search);
      var raw = (qs.get("id") || qs.get("p") || qs.get("product") || qs.get("code") || qs.get("u") || qs.get("url") || "").trim();
      var forcedLang = (qs.get("lang") || "").trim().toLowerCase();
      var lang = forcedLang === "he" || forcedLang === "iw" ? "he" : forcedLang === "ar" ? "ar" : detectLang();
      document.documentElement.lang = lang;
      document.documentElement.dir = "rtl";

      function detectLang() {
        var langs = (navigator.languages || [navigator.language || ""]).join(" ").toLowerCase();
        return /\b(he|iw)\b/.test(langs) ? "he" : "ar";
      }
      function productId(value) {
        var text = String(value || "");
        var fromUrl = text.match(/product\.show\.(\d+)/i);
        if (fromUrl) return fromUrl[1];
        var clean = text.replace(/[^0-9]/g, "");
        return clean || text;
      }
      function keepParams(target) {
        qs.forEach(function (value, key) {
          var k = key.toLowerCase();
          if (k === "id" || k === "p" || k === "product" || k === "code" || k === "u" || k === "url") return;
          if (k === "lang" || k === "wa" || k === "v" || k === "ttclid" || k === "gclid" || k === "fbclid" || k.indexOf("utm_") === 0) {
            if (value) target.searchParams.set(key, value);
          }
        });
        target.searchParams.set("lang", lang);
      }
      function customerUrl(code) {
        var target = new URL("customer.html", location.href);
        keepParams(target);
        if (code) target.searchParams.set("p", code);
        return target;
      }
      function openCustomer(code) {
        var target = customerUrl(code);
        document.getElementById("manual").href = target.href;
        location.replace(target.href);
      }
      function showFallback(code) {
        var target = customerUrl(code || raw);
        document.getElementById("manual").href = target.href;
        document.getElementById("message").textContent = lang === "he" ? "פותחים את עמוד המוצר." : "سيتم فتح صفحة المنتج خلال لحظات.";
        document.getElementById("manual").textContent = lang === "he" ? "פתיחת העמוד" : "فتح الصفحة";
        document.getElementById("fallback").style.display = "block";
      }
      function extractCatalog(source) {
        var marker = "const FALLBACK_CATALOG = ";
        var start = source.indexOf(marker);
        if (start < 0) throw new Error("catalog missing");
        var i = start + marker.length;
        var depth = 0;
        var inString = false;
        var escaped = false;
        for (; i < source.length; i++) {
          var ch = source[i];
          if (inString) {
            if (escaped) escaped = false;
            else if (ch === "\\") escaped = true;
            else if (ch === '"') inString = false;
            continue;
          }
          if (ch === '"') inString = true;
          else if (ch === "{" || ch === "[") depth++;
          else if (ch === "}" || ch === "]") depth--;
          else if (ch === ";" && depth === 0) break;
        }
        return JSON.parse(source.slice(start + marker.length, i));
      }
      function makeMap(catalog) {
        var map = { ar: {}, he: {} };
        ["ar", "he"].forEach(function (locale) {
          (catalog[locale] || []).forEach(function (product) {
            var text = String((product && product.link) || "") + " " + String((product && product.id) || "");
            var match = text.match(/product\.show\.(\d+)/i);
            if (match && product && product.code) map[locale][match[1]] = product.code;
          });
        });
        return map;
      }
      function readCache() {
        try { return JSON.parse(sessionStorage.getItem("madProductIdMap") || "null"); } catch (e) { return null; }
      }
      function writeCache(map) {
        try { sessionStorage.setItem("madProductIdMap", JSON.stringify(map)); } catch (e) {}
      }
      async function resolveProduct(id) {
        var map = readCache();
        if (!map) {
          var response = await fetch("customer.html?v=20260706", { cache: "force-cache" });
          var html = await response.text();
          map = makeMap(extractCatalog(html));
          writeCache(map);
        }
        if (map[lang] && map[lang][id]) return { code: map[lang][id], locale: lang };
        if (map.he && map.he[id]) return { code: map.he[id], locale: "he" };
        if (map.ar && map.ar[id]) return { code: map.ar[id], locale: "ar" };
        return { code: "", locale: lang };
      }
      async function main() {
        if (!raw) return openCustomer("");
        var id = productId(raw);
        showFallback(raw);
        var product = await resolveProduct(id);
        lang = product.locale || lang;
        openCustomer(product.code || raw);
      }
      main().catch(function () { openCustomer(raw); });
    }());
  </script>
</body>
</html>
