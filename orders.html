<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MAD → Olivery</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; margin:20px; max-width:900px}
    .card{border:1px solid #ddd; border-radius:12px; padding:16px; margin-bottom:16px}
    input,textarea,select,button{width:100%; padding:10px; border-radius:10px; border:1px solid #ccc; font-size:14px}
    button{cursor:pointer}
    .row{display:grid; grid-template-columns:1fr 1fr; gap:10px}
    pre{background:#111; color:#eee; padding:12px; border-radius:12px; overflow:auto}
    .hint{color:#666; font-size:13px}
  </style>
</head>
<body>
  <h2>إرسال طلب إلى Olivery</h2>

  <div class="card">
    <div class="row">
      <div>
        <label>الاسم</label>
        <input id="name" placeholder="مثال: محمد" />
      </div>
      <div>
        <label>الهاتف</label>
        <input id="phone" placeholder="مثال: 9725..." />
      </div>
    </div>

    <div class="row" style="margin-top:10px">
      <div>
        <label>المدينة / المنطقة</label>
        <input id="city" placeholder="مثال: سلفيت / تل أبيب ..." />
      </div>
      <div>
        <label>السعر</label>
        <input id="price" placeholder="مثال: 350" />
      </div>
    </div>

    <div style="margin-top:10px">
      <label>العنوان</label>
      <input id="address" placeholder="العنوان بالتفصيل" />
    </div>

    <div class="row" style="margin-top:10px">
      <div>
        <label>Reference / Order ID (اختياري)</label>
        <input id="ref" placeholder="MAD-12345" />
      </div>
      <div>
        <label>Paid</label>
        <select id="paid">
          <option value="false">false</option>
          <option value="true">true</option>
        </select>
      </div>
    </div>

    <div style="margin-top:10px">
      <label>ملاحظات</label>
      <textarea id="notes" rows="3" placeholder="ملاحظات للطلب"></textarea>
    </div>

    <div class="row" style="margin-top:10px">
      <button onclick="sendOrder()">إرسال الطلب</button>
      <button onclick="testOlivery()">فحص الاتصال (status)</button>
    </div>

    <p class="hint">ملاحظة: إذا Olivery رجّع HTML/500 رح تشوفه في RAW.</p>
  </div>

  <div class="card">
    <h3>النتيجة</h3>
    <pre id="out">{}</pre>
  </div>

<script>
  function $(id){ return document.getElementById(id); }

  async function post(action, payload) {
    const res = await fetch(location.href, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ action, ...payload })
    });
    const txt = await res.text();
    try { return JSON.parse(txt); } catch(e) { return {result:"ERROR", message:"Response not JSON", raw: txt}; }
  }

  async function sendOrder(){
    const payload = {
      customer_name: $("name").value,
      customer_mobile: $("phone").value,
      customer_area: $("city").value,
      customer_address: $("address").value,
      cost: $("price").value,
      reference_id: $("ref").value,
      note: $("notes").value,
      paid: $("paid").value === "true"
    };

    const out = await post("create_order", { payload });
    $("out").textContent = JSON.stringify(out, null, 2);
  }

  async function testOlivery(){
    const out = await post("test_olivery", {});
    $("out").textContent = JSON.stringify(out, null, 2);
  }
</script>
</body>
</html>
