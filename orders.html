<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"/>
  <title>إضافة طلب سريع - MAD Manager</title>
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Cairo', 'sans-serif'] },
          colors: {
            brand: { 500: '#3b82f6', 600: '#2563eb', 950: '#0a0f1e' },
            card: '#161b2c',
          }
        }
      }
    }
  </script>

  <style type="text/tailwindcss">
    @layer components {
      .input-field {
        @apply w-full p-3.5 mb-4 bg-slate-800/80 border border-slate-700 rounded-2xl text-white outline-none focus:border-brand-500 transition-all text-[16px] placeholder-slate-500;
      }
      .label-text {
        @apply block text-slate-400 text-sm font-bold mb-1.5 ms-2;
      }
    }

    body {
      background-color: theme('colors.brand.950');
      color: theme('colors.slate.100');
      -webkit-tap-highlight-color: transparent;
      padding-bottom: 180px; 
    }
    
    input, textarea, select { font-size: 16px !important; }

    @media print {
      @page { size: 10cm 10cm; margin: 0; }
      body * { visibility: hidden !important; }
      #printSection, #printSection * { visibility: visible !important; color: black !important; }
      #printSection {
        display: block !important;
        position: fixed !important;
        inset: 0 !important;
        width: 10cm !important;
        height: 10cm !important;
        background: white !important;
      }
    }
  </style>
</head>
<body class="antialiased selection:bg-brand-500">

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="fixed inset-0 bg-brand-950/90 backdrop-blur-md z-[4000] hidden items-center justify-center flex-col gap-4">
    <div class="w-14 h-14 border-4 border-brand-500/20 border-t-brand-500 rounded-full animate-spin"></div>
    <p id="loadingText" class="text-white font-bold">جاري العمل...</p>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 bg-emerald-500 text-white px-6 py-4 rounded-2xl font-bold text-[16px] shadow-2xl z-[3000] transition-all duration-300 -translate-y-20 opacity-0 pointer-events-none flex items-center gap-3 w-[90%] max-w-[400px]">
    <i class="fa fa-check-circle text-xl"></i> <span id="toastMsg">تمت العملية بنجاح</span>
  </div>

  <!-- Header -->
  <header class="sticky top-0 z-[100] bg-brand-950/90 backdrop-blur-xl border-b border-white/5 p-4 shadow-lg shadow-black/20">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center shadow-lg">
        <i class="fa fa-bolt text-white text-lg"></i>
      </div>
      <h1 class="font-black text-xl text-white">إضافة طلب سريع</h1>
    </div>
  </header>

  <main class="p-4 max-w-md mx-auto">
    
    <!-- Smart Analyzer Box -->
    <div class="bg-brand-500/10 border border-brand-500/30 p-4 rounded-3xl mb-6 shadow-inner overflow-hidden">
      <h4 class="m-0 mb-3 text-[15px] font-bold text-brand-400 flex items-center gap-2">
        <i class="fa fa-robot"></i> المحلل الذكي
      </h4>
      <textarea id="smartInput" oninput="autoAnalyze()" placeholder="الصق نص الطلب هنا..." class="w-full h-24 p-3 mb-3 bg-black/30 border border-brand-500/20 rounded-2xl text-white text-[16px] outline-none focus:border-brand-500 resize-none transition-all"></textarea>
      
      <div class="flex gap-2">
        <button onclick="analyzeWithGemini()" class="flex-1 bg-gradient-to-r from-indigo-600 to-brand-600 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 active:scale-95 shadow-lg">
          استخراج بالذكاء ✨
        </button>
      </div>
    </div>

    <!-- Form Fields -->
    <div class="bg-card p-5 rounded-3xl border border-white/5 shadow-xl">
      <label class="label-text">الاسم الكامل</label>
      <input type="text" id="f_name" class="input-field" placeholder="اسم الزبون">
      
      <label class="label-text">رقم الهاتف</label>
      <input type="tel" id="f_phone" class="input-field" dir="ltr" placeholder="05X-XXXXXXX">
      
      <label class="label-text">الأصناف المطلوبة</label>
      <textarea id="f_offer" rows="2" class="input-field resize-none" placeholder="تفاصيل الطلب..."></textarea>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="label-text">السعر (₪)</label>
          <input type="number" id="f_price" class="input-field" placeholder="0">
        </div>
        <div>
          <label class="label-text">المدينة</label>
          <input type="text" id="f_city" class="input-field" placeholder="اسم المدينة">
        </div>
      </div>

      <label class="label-text">شركة التوصيل</label>
      <select id="f_delivery" class="input-field appearance-none">
        <option value="">-- اختر الشركة --</option>
        <option value="High Express - أم الفحم">High Express - أم الفحم</option>
        <option value="Pickup">Pickup</option>
      </select>

      <label class="label-text">ملاحظات</label>
      <textarea id="f_notes" rows="2" class="input-field resize-none mb-0"></textarea>
    </div>

    <!-- Previous Orders Section -->
    <div class="mt-8 mb-4">
      <h3 class="text-white font-black text-lg mb-4 flex items-center gap-2">
        <i class="fa fa-list text-brand-400"></i> آخر الطلبات
      </h3>
      <div id="ordersList" class="flex flex-col gap-3"></div>
    </div>
  </main>

  <!-- Sticky Bottom Actions -->
  <div class="fixed bottom-0 left-0 right-0 bg-brand-950/95 backdrop-blur-xl border-t border-white/10 p-4 z-50">
    <div class="max-w-md mx-auto flex flex-col gap-3">
      <button onclick="saveOrder('high_express')" class="w-full bg-orange-500 text-black font-black py-4 rounded-2xl text-[18px] flex items-center justify-center gap-2 shadow-lg active:scale-95">
        دخل الطلب هي اكسبرس 🚀
      </button>
      
      <div class="grid grid-cols-2 gap-3">
        <button onclick="saveOrder('normal')" class="w-full bg-slate-800 text-white font-bold py-3.5 rounded-2xl border border-slate-700 active:scale-95">
          حفظ فقط
        </button>
        <button onclick="window.print()" class="w-full bg-slate-800 text-white font-bold py-3.5 rounded-2xl border border-slate-700 active:scale-95">
          <i class="fa fa-print text-emerald-400 me-2"></i>طباعة
        </button>
      </div>
    </div>
  </div>

  <script>
    // ⚠️ استبدل هذا الرابط برابط الـ Web App الخاص بك بعد نشره من جوجل سكربت
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxaA4Wc7cEyU6gx-MzuA_C8psZPuWCLmIJ9TPjnqX_RGG4SDQR0Jeeqcnf85Q65NdlK/exec";
    const DASH_KEY = "12345678";

    let analyzeTimeout;

    function showLoading(s, text = "جاري العمل...") {
      document.getElementById('loadingText').textContent = text;
      document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none';
    }

    function showToast(m, type = 'success') {
      const t = document.getElementById('toast');
      document.getElementById('toastMsg').textContent = m;
      t.className = `fixed top-4 left-1/2 -translate-x-1/2 px-6 py-4 rounded-2xl font-bold z-[3000] transition-all duration-300 flex items-center gap-3 w-[90%] max-w-[400px] ${
        type === 'error' ? 'bg-red-500 text-white' : 'bg-emerald-500 text-white'
      }`;
      t.classList.remove('-translate-y-20', 'opacity-0');
      setTimeout(() => t.classList.add('-translate-y-20', 'opacity-0'), 3000);
    }

    function autoAnalyze() {
      clearTimeout(analyzeTimeout);
      analyzeTimeout = setTimeout(() => {
        const val = document.getElementById('smartInput').value;
        const phoneMatch = val.match(/(?:05|972)\d{8,9}/);
        if (phoneMatch && !document.getElementById('f_phone').value) {
          document.getElementById('f_phone').value = phoneMatch[0];
        }
      }, 500);
    }

    async function analyzeWithGemini() {
      const text = document.getElementById('smartInput').value;
      if (!text) return showToast("الصق نصاً أولاً", "error");
      
      showLoading(true, "المساعد الذكي يحلل النص...");
      try {
        const res = await fetch(`${SCRIPT_URL}?action=analyze&key=${DASH_KEY}&text=${encodeURIComponent(text)}`);
        const data = await res.json();
        
        if (data.result === "SUCCESS") {
          const d = data.data;
          if(d.name) document.getElementById('f_name').value = d.name;
          if(d.phone) document.getElementById('f_phone').value = d.phone;
          if(d.price) document.getElementById('f_price').value = d.price;
          if(d.city) document.getElementById('f_city').value = d.city;
          if(d.offer) document.getElementById('f_offer').value = d.offer;
          showToast("تم استخراج البيانات ✨");
        } else {
          throw new Error(data.message || "خطأ غير معروف");
        }
      } catch (e) {
        showToast("فشل التحليل الذكي: " + e.message, "error");
      } finally {
        showLoading(false);
      }
    }

    async function saveOrder(mode) {
      const name = document.getElementById('f_name').value;
      if (!name) return showToast("أدخل اسم الزبون على الأقل", "error");
      
      showLoading(true, "جاري حفظ الطلب...");
      const delivery = (mode === 'high_express') ? "High Express - أم الفحم" : document.getElementById('f_delivery').value;
      
      const params = new URLSearchParams({
        action: "addOrder",
        key: DASH_KEY,
        name: name,
        phone: document.getElementById('f_phone').value,
        offer: document.getElementById('f_offer').value,
        price: document.getElementById('f_price').value,
        city: document.getElementById('f_city').value,
        notes: document.getElementById('f_notes').value,
        delivery: delivery,
        payment: "دفع عند الاستلام",
        status: "NEW"
      });

      try {
        const res = await fetch(`${SCRIPT_URL}?${params.toString()}`);
        const data = await res.json();
        if (data.result === "SUCCESS") {
          showToast("تم الحفظ بنجاح 🚀");
          clearForm();
          loadOrders();
        } else {
          showToast("فشل الحفظ: " + data.message, "error");
        }
      } catch (e) {
        showToast("خطأ في الاتصال بالبيانات", "error");
      } finally {
        showLoading(false);
      }
    }

    function clearForm() {
      document.getElementById('smartInput').value = "";
      ['f_name', 'f_phone', 'f_offer', 'f_price', 'f_city', 'f_notes'].forEach(id => {
        document.getElementById(id).value = "";
      });
      document.getElementById('f_delivery').value = "";
    }

    async function loadOrders() {
      const list = document.getElementById('ordersList');
      list.innerHTML = "<p class='text-center opacity-50 py-4'>جاري تحميل الطلبات...</p>";
      try {
        const res = await fetch(`${SCRIPT_URL}?action=get&key=${DASH_KEY}`);
        const data = await res.json();
        if (Array.isArray(data)) {
          list.innerHTML = data.reverse().slice(0, 10).map(o => `
            <div class="bg-card p-4 rounded-2xl border border-white/5 shadow-lg">
              <div class="flex justify-between items-start mb-1">
                <span class="font-bold text-white">${o.name || "بدون اسم"}</span>
                <span class="text-[10px] bg-brand-500/20 text-brand-400 px-2 py-1 rounded-full">${o.status || 'جديد'}</span>
              </div>
              <div class="text-xs text-slate-400">${o.city || "—"} | ${o.price || 0}₪</div>
            </div>
          `).join('');
        }
      } catch(e) {
        list.innerHTML = "";
      }
    }

    window.onload = loadOrders;
  </script>
</body>
</html>
