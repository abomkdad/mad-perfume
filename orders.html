<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAD Manager - New Columns</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950">
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzXDBGY0PTODQR0CW2btQtBHRsqbUfrl3nYx2GTNKmF4LN_8itoWGTS7KDwfU7DL5GS3w/exec";
    const SECRET_KEY = "12345678";

    function App() {
      const [orders, setOrders] = useState([]);
      const [loading, setLoading] = useState(false);
      const [search, setSearch] = useState("");
      const [open, setOpen] = useState(false);
      const [current, setCurrent] = useState(null);
      const [aiText, setAiText] = useState("");

      const [form, setForm] = useState({
        date: "",
        orderId: "",
        offer: "",
        name: "",
        phone: "",
        address: "",
        price: "",
        Status: "NEW"
      });

      const toast = (msg) => alert(msg);

      const fetchData = async () => {
        setLoading(true);
        try {
          const r = await fetch(`${SCRIPT_URL}?action=get&key=${encodeURIComponent(SECRET_KEY)}&t=${Date.now()}`);
          const j = await r.json();
          if (Array.isArray(j)) setOrders(j);
          else toast(j.message || "Fetch error");
        } catch {
          toast("Connection error");
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => { fetchData(); }, []);

      const filtered = useMemo(() => {
        const s = search.toLowerCase().trim();
        return orders.filter(o => {
          return String(o.orderId || "").toLowerCase().includes(s) ||
                 String(o.name || "").toLowerCase().includes(s) ||
                 String(o.offer || "").toLowerCase().includes(s) ||
                 String(o.phone || "").includes(s) ||
                 String(o.Status || "").toLowerCase().includes(s);
        }).reverse();
      }, [orders, search]);

      const openModal = (o = null) => {
        if (o) {
          setCurrent(o);
          setForm({
            date: o.date || "",
            orderId: o.orderId || "",
            offer: o.offer || "",
            name: o.name || "",
            phone: o.phone || "",
            address: o.address || "",
            price: o.price || "",
            Status: o.Status || "NEW"
          });
        } else {
          setCurrent(null);
          setForm({ date:"", orderId:"", offer:"", name:"", phone:"", address:"", price:"", Status:"NEW" });
        }
        setAiText("");
        setOpen(true);
      };

      const saveOrder = async () => {
        setLoading(true);
        try {
          const payload = {
            ...form,
            action: current ? "updateOrder" : "addOrder",
            row: current ? current.rowIndex : undefined,
            key: SECRET_KEY
          };
          const r = await fetch(SCRIPT_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload)
          });
          const j = await r.json();
          if (j.result === "SUCCESS") {
            toast("تم الحفظ");
            setOpen(false);
            fetchData();
          } else toast(j.message || "Save failed");
        } catch {
          toast("Save failed");
        } finally {
          setLoading(false);
        }
      };

      const analyze = async () => {
        if (!aiText.trim()) return toast("الصق نص");
        setLoading(true);
        try {
          const r = await fetch(SCRIPT_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({ action: "analyze", text: aiText, key: SECRET_KEY })
          });
          const j = await r.json();
          if (j.result === "SUCCESS") {
            const d = j.data || {};
            setForm(prev => ({
              ...prev,
              date: d.date || prev.date,
              orderId: d.orderId || prev.orderId,
              offer: d.offer || prev.offer,
              name: d.name || prev.name,
              phone: d.phone || prev.phone,
              address: d.address || prev.address,
              price: d.price || prev.price,
              Status: d.Status || prev.Status
            }));
            toast("تم التحليل");
          } else toast(j.message || "Analyze failed");
        } catch {
          toast("Analyze failed");
        } finally {
          setLoading(false);
        }
      };

      const ship = async (o) => {
        setLoading(true);
        try {
          const r = await fetch(SCRIPT_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({ action: "sendToDelivery", row: o.rowIndex, key: SECRET_KEY })
          });
          const j = await r.json();
          if (j.result === "SUCCESS") {
            toast("تم الشحن، رقم: " + (j.delivery_order_id || ""));
            fetchData();
          } else {
            toast(j.message || "Shipping failed");
          }
        } catch {
          toast("Shipping failed");
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="max-w-5xl mx-auto p-4 text-white">
          <div className="flex gap-2 mb-4">
            <input
              className="flex-1 p-3 rounded bg-slate-800"
              placeholder="بحث..."
              value={search}
              onChange={e => setSearch(e.target.value)}
            />
            <button className="px-4 py-3 bg-blue-600 rounded" onClick={fetchData}>تحديث</button>
            <button className="px-4 py-3 bg-emerald-600 rounded" onClick={() => openModal()}>طلب جديد</button>
          </div>

          {loading && <div className="mb-4 text-amber-400">...جاري المعالجة</div>}

          <div className="grid gap-3">
            {filtered.map(o => (
              <div key={o.rowIndex} className="bg-slate-900 border border-slate-700 rounded p-4">
                <div className="flex justify-between mb-2">
                  <div>REF: {o.orderId || "N/A"}</div>
                  <div>{o.Status || "NEW"}</div>
                </div>
                <div className="text-sm text-slate-300">الاسم: {o.name || "-"}</div>
                <div className="text-sm text-slate-300">العرض: {o.offer || "-"}</div>
                <div className="text-sm text-slate-300">الهاتف: {o.phone || "-"}</div>
                <div className="text-sm text-slate-300">العنوان: {o.address || "-"}</div>
                <div className="text-sm text-slate-300">السعر: {o.price || "-"}</div>
                <div className="mt-3 flex gap-2">
                  <button className="px-3 py-2 bg-indigo-600 rounded" onClick={() => openModal(o)}>تعديل</button>
                  <button
                    className="px-3 py-2 bg-amber-500 text-black rounded disabled:opacity-40"
                    onClick={() => ship(o)}
                    disabled={!!o.delivery_order_id}
                  >
                    {o.delivery_order_id ? `بوليصة: ${o.delivery_order_id}` : "شحن الآن"}
                  </button>
                </div>
              </div>
            ))}
          </div>

          {open && (
            <div className="fixed inset-0 bg-black/70 flex items-center justify-center p-4">
              <div className="w-full max-w-2xl bg-slate-900 rounded p-4 space-y-3">
                <textarea
                  className="w-full h-24 p-2 rounded bg-slate-800"
                  placeholder="نص للتحليل بالذكاء..."
                  value={aiText}
                  onChange={e => setAiText(e.target.value)}
                />
                <button className="px-4 py-2 bg-blue-600 rounded" onClick={analyze}>تحليل AI</button>

                <input className="w-full p-2 rounded bg-slate-800" placeholder="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/>
                <input className="w-full p-2 rounded bg-slate-800" placeholder="orderId" value={form.orderId} onChange={e=>setForm({...form,orderId:e.target.value})}/>
                <input className="w-full p-2 rounded bg-slate-800" placeholder="offer" value={form.offer} onChange={e=>setForm({...form,offer:e.target.value})}/>
                <input className="w-full p-2 rounded bg-slate-800" placeholder="name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
                <input className="w-full p-2 rounded bg-slate-800" placeholder="phone" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})}/>
                <input className="w-full p-2 rounded bg-slate-800" placeholder="address" value={form.address} onChange={e=>setForm({...form,address:e.target.value})}/>
                <input className="w-full p-2 rounded bg-slate-800" placeholder="price" value={form.price} onChange={e=>setForm({...form,price:e.target.value})}/>
                <input className="w-full p-2 rounded bg-slate-800" placeholder="Status" value={form.Status} onChange={e=>setForm({...form,Status:e.target.value})}/>

                <div className="flex gap-2">
                  <button className="flex-1 py-2 bg-slate-700 rounded" onClick={()=>setOpen(false)}>إلغاء</button>
                  <button className="flex-1 py-2 bg-emerald-600 rounded" onClick={saveOrder}>حفظ</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
