<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"/>
  <title>إضافة طلب سريع - MAD Manager</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Cairo', 'sans-serif'] },
          colors: { brand: { 500: '#3b82f6', 600: '#2563eb', 950: '#0a0f1e' }, card: '#161b2c' }
        }
      }
    }
  </script>

  <style type="text/tailwindcss">
    @layer components {
      .input-field { @apply w-full p-3.5 mb-4 bg-slate-800/80 border border-slate-700 rounded-2xl text-white outline-none focus:border-brand-500 transition-all text-[16px] placeholder-slate-500; }
      .label-text { @apply block text-slate-400 text-sm font-bold mb-1.5 ms-2; }
    }
    body { background-color: theme('colors.brand.950'); color: theme('colors.slate.100'); padding-bottom: 180px; -webkit-tap-highlight-color: transparent; }
    input, textarea, select { font-size: 16px !important; }
    @media print {
      @page { size: 10cm 10cm; margin: 0; }
      body * { visibility: hidden !important; }
      #printSection, #printSection * { visibility: visible !important; color: black !important; }
      #printSection { display: block !important; position: fixed !important; inset: 0 !important; width: 10cm !important; height: 10cm !important; background: white !important; padding: 5mm; }
    }
  </style>
</head>

<body class="antialiased selection:bg-brand-500">

  <!-- شاشة التحميل -->
  <div id="loadingOverlay" class="fixed inset-0 bg-brand-950/90 backdrop-blur-md z-[4000] hidden items-center justify-center flex-col gap-4">
    <div class="w-14 h-14 border-4 border-brand-500/20 border-t-brand-500 rounded-full animate-spin"></div>
    <p id="loadingText" class="text-white font-bold">جاري العمل...</p>
  </div>

  <!-- الإشعارات -->
  <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 bg-emerald-500 text-white px-6 py-4 rounded-2xl font-bold text-[16px] shadow-2xl z-[3000] transition-all duration-300 -translate-y-20 opacity-0 pointer-events-none flex items-center gap-3 w-[90%] max-w-[400px]">
    <i class="fa fa-check-circle text-xl" id="toastIcon"></i> <span id="toastMsg">نجاح</span>
  </div>

  <header class="sticky top-0 z-[100] bg-brand-950/90 backdrop-blur-xl border-b border-white/5 p-4 shadow-lg shadow-black/20">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center shadow-lg"><i class="fa fa-bolt text-white text-lg"></i></div>
      <h1 class="font-black text-xl text-white">إضافة طلب سريع</h1>
    </div>
  </header>

  <main class="p-4 max-w-md mx-auto">

    <!-- المحلل الذكي -->
    <div class="bg-brand-500/10 border border-brand-500/30 p-4 rounded-3xl mb-6 shadow-inner">
      <h4 class="m-0 mb-3 text-[15px] font-bold text-brand-400 flex items-center gap-2"><i class="fa fa-robot"></i> المحلل الذكي</h4>
      <textarea id="smartInput" oninput="autoAnalyze()" placeholder="الصق نص الطلب هنا..." class="w-full h-24 p-3 mb-3 bg-black/30 border border-brand-500/20 rounded-2xl text-white text-[16px] outline-none focus:border-brand-500 resize-none"></textarea>

      <div class="flex gap-2">
        <button onclick="analyzeWithGemini()" class="flex-1 bg-gradient-to-r from-indigo-600 to-brand-600 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 active:scale-95 shadow-lg">استخراج بالذكاء ✨</button>
        <button onclick="document.getElementById('pdfUpload').click()" class="w-14 bg-red-500/20 text-red-400 border border-red-500/40 rounded-xl flex items-center justify-center active:scale-95"><i class="fa fa-file-pdf text-xl"></i></button>
        <input type="file" id="pdfUpload" accept="application/pdf" class="hidden" onchange="handlePdfUpload(event)">
      </div>
    </div>

    <!-- النموذج -->
    <div class="bg-card p-5 rounded-3xl border border-white/5 shadow-xl">
      <label class="label-text">الاسم الكامل</label>
      <input type="text" id="f_name" class="input-field" placeholder="اسم الزبون">

      <label class="label-text">رقم الهاتف</label>
      <input type="tel" id="f_phone" class="input-field" dir="ltr" placeholder="05X-XXXXXXX">

      <label class="label-text">الأصناف</label>
      <textarea id="f_offer" rows="2" class="input-field resize-none"></textarea>

      <div class="grid grid-cols-2 gap-3">
        <div><label class="label-text">السعر (₪)</label><input type="number" id="f_price" class="input-field" placeholder="0"></div>
        <div><label class="label-text">المدينة</label><input type="text" id="f_city" class="input-field" placeholder="المدينة"></div>
      </div>

      <label class="label-text">شركة التوصيل</label>
      <select id="f_delivery" class="input-field appearance-none">
        <option value="">-- اختر الشركة --</option>
        <option value="High Express - أم الفحم">High Express - أم الفحم</option>
        <option value="Pickup">Pickup</option>
      </select>

      <label class="label-text">ملاحظات (اختياري)</label>
      <textarea id="f_notes" rows="2" class="input-field resize-none mb-0"></textarea>
    </div>

    <!-- الطلبات السابقة -->
    <div class="mt-8 mb-4">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-white font-black text-lg flex items-center gap-2"><i class="fa fa-list text-brand-400"></i> آخر الطلبات</h3>
        <button onclick="loadOrders()" class="w-8 h-8 rounded-xl bg-slate-800 text-slate-400 flex items-center justify-center active:scale-95 border border-slate-700"><i class="fa fa-sync-alt text-xs"></i></button>
      </div>
      <div id="ordersList" class="flex flex-col gap-3"><p class="text-center text-slate-500 py-4">جاري التحميل...</p></div>
    </div>

  </main>

  <div class="fixed bottom-0 left-0 right-0 bg-brand-950/95 backdrop-blur-xl border-t border-white/10 p-4 z-50">
    <div class="max-w-md mx-auto flex flex-col gap-3">
      <button onclick="saveOrder('high_express')" class="w-full bg-orange-500 text-black font-black py-4 rounded-2xl text-[18px] flex items-center justify-center gap-2 shadow-lg active:scale-95">دخل الطلب هي اكسبرس 🚀</button>
      <div class="grid grid-cols-2 gap-3">
        <button onclick="saveOrder('normal')" class="w-full bg-slate-800 text-white font-bold py-3.5 rounded-2xl border border-slate-700 active:scale-95">حفظ فقط</button>
        <button onclick="printCurrentOrder()" class="w-full bg-slate-800 text-white font-bold py-3.5 rounded-2xl border border-slate-700 active:scale-95 flex items-center justify-center gap-2"><i class="fa fa-print text-emerald-400"></i>طباعة</button>
      </div>
    </div>
  </div>

  <div id="printSection" class="hidden">
    <div class="text-center border-b-2 border-black pb-2 mb-3">
      <h1 class="m-0 text-3xl tracking-[4px] font-black leading-none">MAD</h1>
      <div class="text-[11px] font-extrabold mt-1">PARFUMEUR</div>
      <div class="text-[10px] font-black mt-2 pt-1 border-t border-gray-200 flex justify-between"><span id="p_date">00.00.0000</span><span>ORD: NEW</span></div>
    </div>
    <div id="p_content" class="text-xs leading-relaxed font-semibold text-right" dir="rtl"></div>
    <div class="border-t-2 border-black pt-2 mt-2 flex justify-between items-end">
      <div class="text-center"><img id="p_qr" src="" class="w-12 h-12 border border-black mx-auto bg-gray-50" alt="QR"></div>
      <div class="text-left"><div class="text-[11px] font-bold">TOTAL:</div><div class="text-2xl font-black mt-1">₪<span id="p_total">0</span></div></div>
    </div>
  </div>

  <script>
    // ✅ رابط السكربت
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxhPdvoHVpFsYKdZdrLL2h4NdkCiDB45iOK854cnS3H0yMDfskjq5eQJJiIw3JxJVKnnA/exec";
    const DASH_KEY = "12345678";

    let analyzeTimeout;

    function showLoading(s, text = "جاري العمل...") {
      document.getElementById('loadingText').textContent = text;
      document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none';
    }

    function showToast(m, type = 'success') {
      const t = document.getElementById('toast');
      document.getElementById('toastMsg').textContent = m;
      document.getElementById('toastIcon').className = type === 'error' ? 'fa fa-exclamation-triangle text-xl' : 'fa fa-check-circle text-xl';
      t.className = `fixed top-4 left-1/2 -translate-x-1/2 px-6 py-4 rounded-2xl font-bold text-[16px] shadow-2xl z-[3000] transition-all duration-300 flex items-center gap-3 w-[90%] max-w-[400px] ${type === 'error' ? 'bg-red-500 text-white' : 'bg-emerald-500 text-white'}`;
      t.classList.remove('-translate-y-20', 'opacity-0');
      setTimeout(() => t.classList.add('-translate-y-20', 'opacity-0'), 3000);
    }

    function esc(str) {
      if (!str) return "";
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    function autoAnalyze() {
      clearTimeout(analyzeTimeout);
      analyzeTimeout = setTimeout(() => {
        const val = document.getElementById('smartInput').value;
        const phoneMatch = val.match(/(?:05|972)\d{8,9}/);
        if (phoneMatch && !document.getElementById('f_phone').value) {
          let p = phoneMatch[0];
          if (p.startsWith("972")) p = "0" + p.substring(3);
          document.getElementById('f_phone').value = p;
        }
      }, 500);
    }

    async function analyzeWithGemini() {
      const text = document.getElementById('smartInput').value;
      if (!text) return showToast("الرجاء لصق نص الطلب", "error");
      showLoading(true, "يتم التحليل عبر السيرفر...");
      try {
        const res = await fetch(`${SCRIPT_URL}?action=analyze&key=${DASH_KEY}&text=${encodeURIComponent(text)}`);
        const data = await res.json();
        if (data.result === "SUCCESS" && data.data) {
          const d = data.data;
          if (d.name) document.getElementById('f_name').value = d.name;
          if (d.phone) {
            let p = String(d.phone).replace(/\D/g, "");
            if (p.startsWith("972")) p = "0" + p.substring(3);
            document.getElementById('f_phone').value = p;
          }
          if (d.price !== undefined && d.price !== null) document.getElementById('f_price').value = d.price;
          if (d.city) document.getElementById('f_city').value = d.city;
          if (d.offer) document.getElementById('f_offer').value = d.offer;
          showToast("تم التحليل بنجاح ✨");
        } else {
          throw new Error(data.message || "فشل غير معروف");
        }
      } catch (e) {
        showToast("فشل التحليل: " + e.message, "error");
      } finally {
        showLoading(false);
      }
    }

    async function handlePdfUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      showLoading(true, "قراءة الملف...");
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          const res = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({
              action: "analyzePDF",
              key: DASH_KEY,
              fileBase64: reader.result.split(',')[1],
              text: document.getElementById('smartInput').value || "" // اختياري
            })
          });
          const data = await res.json();
          if (data.result === "SUCCESS" && data.data) {
            const d = data.data;
            if (d.name) document.getElementById('f_name').value = d.name;
            if (d.phone) {
              let p = String(d.phone).replace(/\D/g, "");
              if (p.startsWith("972")) p = "0" + p.substring(3);
              document.getElementById('f_phone').value = p;
            }
            if (d.price !== undefined && d.price !== null) document.getElementById('f_price').value = d.price;
            if (d.city) document.getElementById('f_city').value = d.city;
            if (d.offer) document.getElementById('f_offer').value = d.offer;
            showToast("تم التحليل ✨");
          } else {
            throw new Error(data.message || "فشل غير معروف");
          }
        } catch (e) {
          showToast("خطأ: " + e.message, "error");
        } finally {
          showLoading(false);
          event.target.value = '';
        }
      };
      reader.readAsDataURL(file);
    }

    function getFormData_() {
      return {
        name: document.getElementById('f_name').value.trim(),
        phone: document.getElementById('f_phone').value.trim(),
        offer: document.getElementById('f_offer').value.trim(),
        price: document.getElementById('f_price').value.trim(),
        city: document.getElementById('f_city').value.trim(),
        notes: document.getElementById('f_notes').value.trim(),
        delivery: document.getElementById('f_delivery').value
      };
    }

    async function saveOrder(mode) {
      const d = getFormData_();
      if (!d.name || !d.phone) return showToast("الاسم والهاتف مطلوبان!", "error");

      showLoading(true, "إرسال الطلب...");

      // ✅ الإصلاح الأساسي: high_express الآن يرسل بيانات الفورم مباشرة (بدون row)
      const action = (mode === 'high_express') ? "sendToDelivery" : "addOrder";
      const delivery = (mode === 'high_express') ? "High Express - أم الفحم" : d.delivery;

      const params = new URLSearchParams({
        action,
        key: DASH_KEY,
        name: d.name,
        phone: d.phone,
        offer: d.offer,
        price: d.price,
        city: d.city,
        notes: d.notes,
        delivery
      });

      try {
        const res = await fetch(`${SCRIPT_URL}?${params.toString()}`);
        const data = await res.json();
        if (data.result === "SUCCESS") {
          showToast("تم الإدخال بنجاح 🚀");
          clearForm();
          loadOrders();
        } else {
          showToast("تعذر الحفظ: " + (data.message || "خطأ غير معروف"), "error");
        }
      } catch (e) {
        showToast("خطأ في الاتصال", "error");
      } finally {
        showLoading(false);
      }
    }

    function clearForm() {
      document.getElementById('smartInput').value = "";
      ['f_name', 'f_phone', 'f_offer', 'f_price', 'f_city', 'f_notes', 'f_delivery'].forEach(id => document.getElementById(id).value = "");
    }

    async function loadOrders() {
      const list = document.getElementById('ordersList');
      list.innerHTML = "<p class='text-center opacity-50 py-4'>جاري تحميل الطلبات...</p>";
      try {
        const res = await fetch(`${SCRIPT_URL}?action=get&key=${DASH_KEY}`);
        const data = await res.json();

        if (Array.isArray(data) && data.length > 0) {
          list.innerHTML = data.slice(0, 10).map(o => `
            <div class="bg-card p-4 rounded-2xl border border-white/5 shadow-lg relative overflow-hidden">
              <div class="flex justify-between items-start mb-2">
                <span class="font-bold text-white text-[15px]">${esc(o.name) || "بدون اسم"}</span>
                <span class="text-[10px] bg-brand-500/20 text-brand-400 px-2 py-1 rounded-full font-bold">${esc(o.status || "")}</span>
              </div>

              <div class="text-slate-400 text-xs mb-1" dir="ltr"><i class="fa fa-phone text-[10px]"></i> ${esc(o.phone || "")}</div>

              <div class="text-brand-200 text-xs bg-brand-900/20 p-2 rounded-lg border-r-2 border-brand-500 truncate mb-2">
                ${esc(o.offer) || "بدون تفاصيل"}
              </div>

              <div class="flex gap-4 text-[10px] font-bold text-slate-300">
                <span>📍 ${esc(o.city || "")}</span>
                <span class="text-emerald-400">₪${esc(o.price || 0)}</span>
              </div>
            </div>
          `).join('');
        } else {
          list.innerHTML = "<p class='text-center opacity-50 py-4'>لا توجد طلبات</p>";
        }
      } catch (e) {
        list.innerHTML = "<p class='text-center text-red-400 py-4'>فشل الاتصال بالسيرفر</p>";
      }
    }

    async function printCurrentOrder() {
      const name = document.getElementById('f_name').value.trim();
      const phone = document.getElementById('f_phone').value.trim();
      if (!name || !phone) return showToast("الرجاء إدخال الاسم والهاتف!", 'error');

      // ✅ بدل includes على value الفاضي: تحقق من اختيار التوصيل
      const deliveryVal = document.getElementById('f_delivery').value || "";
      if (deliveryVal.includes("High Express")) return showToast("طلبات هي اكسبرس لا تُطبع يدوياً!", "error");

      document.getElementById('p_date').textContent = new Date().toLocaleDateString();
      document.getElementById('p_total').textContent = document.getElementById('f_price').value || "0";
      document.getElementById('p_content').innerHTML =
        `<div style="margin-bottom: 4px;"><b>الاسم:</b> ${esc(name)}</div>
         <div style="margin-bottom: 4px;"><b>الهاتف:</b> <span dir="ltr">${esc(phone)}</span></div>
         <div style="margin-bottom: 4px;"><b>المدينة:</b> ${esc(document.getElementById('f_city').value)}</div>
         <div style="margin-top: 8px; padding-top: 8px; border-top: 1px dashed black;"><b>الأصناف:</b><br>${esc(document.getElementById('f_offer').value)}</div>`;

      showLoading(true, "تجهيز الطباعة...");
      let cleanPhone = phone.replace(/\D/g, "");
      if (cleanPhone.startsWith("0")) cleanPhone = "972" + cleanPhone.substring(1);

      const qrImg = document.getElementById('p_qr');
      qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://wa.me/${cleanPhone}`;
      await new Promise(r => { qrImg.onload = r; qrImg.onerror = r; });

      showLoading(false);
      window.print();
    }

    window.onload = loadOrders;
  </script>
</body>
</html>
