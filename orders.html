    function $(id){return document.getElementById(id)}function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]})}function setAction(text){$('actionState').textContent=text}function setBusy(on,text){$('busy').classList.toggle('show',!!on);if(text)$('busyText').textContent=text;Array.from(document.querySelectorAll('button')).forEach(function(b){b.disabled=!!on})}function toast(msg,type){var el=$('toast');el.textContent=msg;el.style.borderColor=type==='error'?'#ef4444':type==='success'?'#22c55e':'#26364f';el.classList.add('show');setTimeout(function(){el.classList.remove('show')},2800)}
    function buildApiUrl(action,payload,extra,cb){payload=payload||{};extra=extra||{};var qs='api='+encodeURIComponent(action)+'&callback='+encodeURIComponent(cb)+'&v='+Date.now();if(Object.keys(payload).length)qs+='&payload='+encodeURIComponent(JSON.stringify(payload));Object.keys(extra).forEach(function(k){qs+='&'+encodeURIComponent(k)+'='+encodeURIComponent(extra[k])});return APP_URL+'?'+qs}
    function jsonpRequest(url,timeoutMs){return new Promise(function(resolve,reject){var m=url.match(/[?&]callback=([^&]+)/);var cb=m?decodeURIComponent(m[1]):('__madCb_'+Date.now()+'_'+Math.floor(Math.random()*100000));var script=document.createElement('script');var done=false;var timer=setTimeout(function(){cleanup();reject(new Error('Ш§ЩҶШӘЩҮШӘ Щ…ЩҮЩ„Ш© Ш§Щ„Ш§ШӘШөШ§Щ„'))},timeoutMs||35000);function cleanup(){if(done)return;done=true;clearTimeout(timer);try{delete window[cb]}catch(e){window[cb]=void 0}if(script.parentNode)script.parentNode.removeChild(script)}window[cb]=function(data){cleanup();resolve(data)};script.async=true;script.charset='utf-8';script.referrerPolicy='no-referrer';script.onerror=function(){cleanup();reject(new Error('ШӘШ№Ш°Шұ Ш§Щ„Ш§ШӘШөШ§Щ„ ШЁШ§Щ„Ш®Ш§ШҜЩ…'))};script.src=url;document.head.appendChild(script)})}
    function recoveryPhone(v){var d=String(v||'').replace(/\D/g,'');while(d.indexOf('00')===0)d=d.slice(2);if(d.indexOf('972')===0)d=d.slice(3);while(d.charAt(0)==='0')d=d.slice(1);return d}
    function isMutationApi(action){return /^(save|saveAndPrep|bulk|sendSingle|sendMany|delete)$/.test(String(action||''))}
    function recoverSavedOrder(action,payload,firstErr,successRes){if(action!=='save'&&action!=='saveAndPrep')return firstErr?Promise.reject(firstErr):Promise.resolve(successRes);var q=recoveryPhone(payload&&payload.phone);if(!q)return firstErr?Promise.reject(firstErr):Promise.resolve(successRes);return api('searchAll',{query:q,limit:20}).then(function(res){var orders=(res&&res.orders)||[];var match=orders.find(function(o){return recoveryPhone(o.phone)===q&&(!payload.name||String(o.name||'').indexOf(String(payload.name||'').slice(0,8))>=0)} )||orders.find(function(o){return recoveryPhone(o.phone)===q});if(!match){if(firstErr)throw firstErr;return successRes}return Object.assign({},successRes||{success:true,ok:true}, {success:true,ok:true,rowIndex:match.rowIndex,order:match,recovered:!!firstErr})}).catch(function(){if(firstErr)throw firstErr;return successRes})}

    function api(action,payload,extra){payload=payload||{};extra=extra||{};return new Promise(function(resolve,reject){var cb='__madCb_'+Date.now()+'_'+Math.floor(Math.random()*100000);var url=buildApiUrl(action,payload,extra,cb);if(url.length>7800){reject(new Error('Ш§Щ„ЩҶШө Ш·ЩҲЩҠЩ„ Ш¬ШҜШ§ЩӢШҢ ШЈШұШіЩ„ Ш§Щ„Ш·Щ„ШЁШ§ШӘ Ш№Щ„Щү ШҜЩҒШ№Ш§ШӘ ШЈШөШәШұ'));return}jsonpRequest(url,35000).then(function(res){if(needsSaveRecovery(action,payload,res)){recoverSavedOrder(action,payload,null,res).then(resolve).catch(function(){resolve(res)});return}resolve(res)}).catch(function(firstErr){if(isMutationApi(action)){recoverMutationFailure(action,payload,firstErr).then(resolve).catch(reject);return}var retryExtra={};Object.keys(extra).forEach(function(k){retryExtra[k]=extra[k]});retryExtra.retry=1;var retryCb='__madCb_'+Date.now()+'_'+Math.floor(Math.random()*100000);var retryUrl=buildApiUrl(action,payload,retryExtra,retryCb);jsonpRequest(retryUrl,35000).then(resolve).catch(function(){reject(firstErr)})})})}

    async function extractPdfText(file){await ensurePdfReader();pdfjsLib.GlobalWorkerOptions.workerSrc=window.__madPdfWorkerSrc||'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';var data=await file.arrayBuffer();var pdf=await pdfjsLib.getDocument({data:data}).promise;var parts=[];for(var i=1;i<=pdf.numPages;i++){var page=await pdf.getPage(i);var content=await page.getTextContent();parts.push(content.items.map(function(item){return item.str||''}).join(' '))}return parts.join('\n').replace(/[ \t]+/g,' ').trim()}

    function madCleanProductLine(line){return String(line||'').replace(/\s+/g,' ').replace(/^(?:Ш§Щ„Ш·Щ„ШЁ|Ш·Щ„ШЁ|Ш§Щ„Щ…ЩҶШӘШ¬Ш§ШӘ|Щ…ЩҶШӘШ¬Ш§ШӘ|Ш§Щ„Щ…ЩҶШӘШ¬|ШӘЩҒШ§ШөЩҠЩ„ Ш§Щ„Ш·Щ„ШЁ|ЩҶШө Ш§Щ„Ш·Щ„ШЁ|products?|items?|description|order items?|ЧһЧ•ЧҰЧЁЧҷЧқ|ЧӨЧЁЧҷЧҳЧҷЧқ|ЧӘЧҷЧҗЧ•ЧЁ)\s*[:пјҡ\-вҖ“]?\s*/i,'').trim()}

    function madProductLine(line){if(!line||madNoiseLine(line))return false;return /\[[A-Za-z]\d{2,}\]/.test(line)||/\b(?:MAD|SKU)[-\s]?\d{4,}\b/i.test(line)||/(?:Ш№Ш·Шұ|Ш№Ш·ЩҲШұ|ШЁШұЩҒШ§ЩҶ|ШЁЩҠШұЩҒЩҠЩҲЩ…|ШұШ¬Ш§Щ„ЩҠ|ЩҶШіШ§ШҰЩҠ|ШЁШ®ЩҲШұ|ШҜЩҮЩҶ|ШЁЩҲЩғШі|Щ…Щ„|ml|Ч‘Ч•Ч©Чқ|Ч‘Ч©ЧһЧҷЧқ|ЧһЧ•ЧҰЧЁ|ЧһЧ•ЧҰЧЁЧҷЧқ)/i.test(line)}
    function madGuessProducts(text){var lines=String(text||'').split(/\n+/).map(madCleanProductLine).filter(Boolean);var label=/^(?:Ш§Щ„Ш·Щ„ШЁ|Ш·Щ„ШЁ|Ш§Щ„Щ…ЩҶШӘШ¬Ш§ШӘ|Щ…ЩҶШӘШ¬Ш§ШӘ|Ш§Щ„Щ…ЩҶШӘШ¬|ШӘЩҒШ§ШөЩҠЩ„ Ш§Щ„Ш·Щ„ШЁ|ЩҶШө Ш§Щ„Ш·Щ„ШЁ|products?|items?|description|order items?|ЧһЧ•ЧҰЧЁЧҷЧқ|ЧӨЧЁЧҷЧҳЧҷЧқ|ЧӘЧҷЧҗЧ•ЧЁ)\s*[:пјҡ\-вҖ“]?\s*(.{3,})$/i;for(var i=0;i<lines.length;i++){var m=lines[i].match(label);if(m&&!madNoiseLine(m[1]))return madCleanProductLine(m[1])}var picked=lines.filter(madProductLine);if(picked.length)return picked.slice(0,5).join('ШҢ ');var block=String(text||'').match(/(?:Ш§Щ„Ш·Щ„ШЁ|Ш§Щ„Щ…ЩҶШӘШ¬Ш§ШӘ|products?|items?|description|ЧһЧ•ЧҰЧЁЧҷЧқ|ЧӨЧЁЧҷЧҳЧҷЧқ|ЧӘЧҷЧҗЧ•ЧЁ)\s*[:пјҡ\-вҖ“]?\s*([\s\S]{3,260})(?:\n(?:Ш§Щ„Ш§ШіЩ…|Ш§Щ„ЩҮШ§ШӘЩҒ|Ш§Щ„Ш№ЩҶЩҲШ§ЩҶ|Ш§Щ„ШіШ№Шұ|name|phone|address|price|Ч©Чқ|ЧҳЧңЧӨЧ•Чҹ|ЧӣЧӘЧ•Ч‘ЧӘ|ЧһЧ—ЧҷЧЁ)|$)/i);return block?madCleanProductLine(block[1]).split(/\n/).map(madCleanProductLine).filter(function(x){return x&&!madNoiseLine(x)}).slice(0,4).join('ШҢ '):''}
    function madApplyAnalysis(res,text){var map={name:['name','customer_name','customerName','client_name'],phone:['phone','customer_phone','customerPhone','tel','mobile'],city:['city','customer_area','area','region'],address:['address','customer_address','street'],price:['price','total','amount','order_total'],offer:['offer','product','products','items','item','order','order_details','orderItems','description','request','raw_request_text']};Object.keys(map).forEach(function(id){var v=madFirstValue(res,map[id]);if(v)$(id).value=v});var fallback=madGuessProducts(text);if(fallback&&(!madFirstValue(res,map.offer)||!$('offer').value.trim()))$('offer').value=fallback;if(res&&res.delivery_company)$('delivery').value=normalizeDeliveryName(res.delivery_company)}

    function madPdfPageText(items){var lines=[];(items||[]).forEach(function(item,index){var str=String(item.str||'').trim();if(!str)return;var y=item.transform&&item.transform.length>5?item.transform[5]:0;var line=lines.find(function(row){return Math.abs(row.y-y)<3});if(!line){line={y:y,items:[]};lines.push(line)}line.items.push({index:index,str:str})});return lines.sort(function(a,b){return b.y-a.y}).map(function(row){return row.items.sort(function(a,b){return a.index-b.index}).map(function(x){return x.str}).join(' ')}).join('\n')}

    async function ensureSentAfterSaveAndPrep(res){var rowIndex=Number((res&&res.rowIndex)||(res&&res.order&&res.order.rowIndex)||$('rowIndex').value||state.savedRowIndex);var status=String(res&&res.order&&res.order.Status||'').toUpperCase();if(rowIndex&&status!=='SENT_TO_PREP'){var sent=await runApi('sendSingle',{rowIndex:rowIndex},'ШҘШұШіШ§Щ„ Щ„Щ„ШӘШ¬ЩҮЩҠШІ...');if(sent&&sent.order)res=Object.assign({},res||{}, {rowIndex:sent.rowIndex||rowIndex,order:sent.order})}return res}
    async function saveFast(){var p=collectPayload(),msg=validatePayload(p);if(msg){toast(msg,'error');return}try{var res=await runApi('save',p,'ШӯЩҒШё ШіШұЩҠШ№...');state.savedRowIndex=String(res.rowIndex||'');$('rowIndex').value=state.savedRowIndex;$('saveState').textContent=state.savedRowIndex?('ШөЩҒ '+state.savedRowIndex):'ШӘЩ… Ш§Щ„ШӯЩҒШё';if(res.order)upsertOrder(res.order);setAction('ШӘЩ… Ш§Щ„ШӯЩҒШё');toast('ШӘЩ… Ш§Щ„ШӯЩҒШё','success')}catch(err){toast(String(err.message||err),'error')}}async function saveAndSendFast(){var p=collectPayload(),msg=validatePayload(p);if(msg){toast(msg,'error');return}try{var res=await runApi('saveAndPrep',p,'ШӯЩҒШё ЩҲШҘШұШіШ§Щ„ ШіШұЩҠШ№...');res=await ensureSentAfterSaveAndPrep(res);state.savedRowIndex=String(res.rowIndex||'');$('rowIndex').value=state.savedRowIndex;$('saveState').textContent=state.savedRowIndex?('ШөЩҒ '+state.savedRowIndex):'ШӘЩ… Ш§Щ„ШӯЩҒШё';if(res.order)upsertOrder(res.order);setAction('ШӘЩ… Ш§Щ„ШӯЩҒШё ЩҲШ§Щ„ШҘШұШіШ§Щ„');toast('ШӘЩ… Ш§Щ„ШӯЩҒШё ЩҲШ§Щ„ШҘШұШіШ§Щ„','success')}catch(err){toast(String(err.message||err),'error')}}
    async function sendSavedOrder(){var rowIndex=$('rowIndex').value||state.savedRowIndex;if(!rowIndex){toast('Ш§ШӯЩҒШё Ш§Щ„Ш·Щ„ШЁ ШЈЩҲЩ„Ш§ЩӢ','error');return}try{await runApi('sendSingle',{rowIndex:Number(rowIndex)},'ШҘШұШіШ§Щ„ ШіШұЩҠШ№ Щ„Щ„ШӘШ¬ЩҮЩҠШІ...');toast('ШӘЩ… Ш§Щ„ШҘШұШіШ§Щ„','success');loadRecentOrders()}catch(err){toast(String(err.message||err),'error')}}function upsertOrder(order){var idx=state.orders.findIndex(function(o){return Number(o.rowIndex)===Number(order.rowIndex)});if(idx>=0)state.orders[idx]=order;else state.orders.unshift(order);renderOrders()}async function loadRecentOrders(){try{var res=await runApi('recent',{limit:80},'ШӘШӯЩ…ЩҠЩ„ ШўШ®Шұ Ш§Щ„Ш·Щ„ШЁШ§ШӘ...',{limit:80});state.orders=(res&&res.orders)||[];$('ordersMeta').textContent='Ш§Щ„Щ…Ш№ШұЩҲШ¶: '+state.orders.length;renderOrders();setAction('Ш¬Ш§ЩҮШІ')}catch(err){$('ordersMeta').textContent='ЩҒШҙЩ„ Ш§Щ„ШӘШӯЩ…ЩҠЩ„';toast(String(err.message||err),'error');setAction('Ш¬Ш§ЩҮШІ')}}async function searchAllOrders(){var q=$('ordersSearch').value.trim();if(!q){toast('Ш§ЩғШӘШЁ Ш§ШіЩ… ШЈЩҲ ЩҮШ§ШӘЩҒ ШЈЩҲ ШЁШ§ШұЩғЩҲШҜ Щ„Щ„ШЁШӯШ« ЩҒЩҠ ЩғЩ„ Ш§Щ„Ш·Щ„ШЁШ§ШӘ','error');return}try{var res=await runApi('searchAll',{query:q,limit:150},'ШЁШӯШ« ЩҒЩҠ ЩғЩ„ Ш§Щ„Ш·Щ„ШЁШ§ШӘ...');state.orders=(res&&res.orders)||[];$('ordersMeta').textContent='ЩҶШӘШ§ШҰШ¬ Ш§Щ„ШЁШӯШ«: '+state.orders.length;renderOrders();setAction('ШӘЩ… Ш§Щ„ШЁШӯШ« ЩҒЩҠ ЩғЩ„ Ш§Щ„Ш·Щ„ШЁШ§ШӘ')}catch(err){toast(String(err.message||err),'error')}}
    function renderOrders(){var q=$('ordersSearch').value.trim().toLowerCase();var filtered=state.orders.filter(function(o){if(!q)return true;return[o.name,o.phone,o.customer_area,o.address,o.offer,o.raw_request_text,o.orderId,o.delivery_sequen].some(function(v){return String(v||'').toLowerCase().indexOf(q)>=0})});if(!filtered.length){$('ordersList').innerHTML='<div class="status">Щ„Ш§ ШӘЩҲШ¬ШҜ Ш·Щ„ШЁШ§ШӘ</div>';return}$('ordersList').innerHTML=filtered.map(function(o){var displayName=o.name||(o.raw_request_text?'Ш·Щ„ШЁ Ш¬Щ…Ш§Ш№ЩҠ Ш®Ш§Щ…':'-');var displayOffer=o.offer||o.raw_request_text||'-';var row=Number(o.rowIndex);return '<article class="order"><div class="order-title"><span><input type="checkbox" class="order-check" value="'+row+'"> '+esc(displayName)+'</span><span class="price">'+esc(o.price||'0')+' вӮӘ</span></div><div class="chips"><span class="chip">'+esc(o.Status||'-')+'</span><span class="chip">'+esc(o.customer_area||'-')+'</span><span class="chip" dir="ltr">'+esc(o.phone||'-')+'</span><span class="chip">'+esc(o.prep_notes||'-')+'</span></div><div class="tiny muted" style="margin-top:7px">'+esc(displayOffer)+'</div><div class="tiny muted" style="margin-top:4px">ШөЩҒ '+esc(o.rowIndex||'')+' | '+esc(o.orderId||'')+'</div><div class="order-actions"><button class="ghost" onclick="editOrder('+row+')">ШӘШ№ШҜЩҠЩ„</button><button class="warn" onclick="sendOrder('+row+')">Щ„Щ„ШӘШ¬ЩҮЩҠШІ</button><button class="success" onclick="callCustomer('+row+')">Ш§ШӘШөШ§Щ„</button><button class="ghost" onclick="openWhatsApp('+row+',\'AR\')">ЩҲШ§ШӘШіШ§ШЁ Ш№ШұШЁЩҠ</button><button class="ghost" onclick="openWhatsApp('+row+',\'HE\')">ЩҲШ§ШӘШіШ§ШЁ Ш№ШЁШұЩҠ</button><button class="danger" onclick="deleteOrder('+row+')">ШӯШ°ЩҒ</button></div></article>'}).join('')}
    function getOrder(rowIndex){return state.orders.find(function(o){return Number(o.rowIndex)===Number(rowIndex)})}function editOrder(rowIndex){var order=getOrder(rowIndex);if(order)fillFromOrder(order)}async function sendOrder(rowIndex){$('rowIndex').value=rowIndex;state.savedRowIndex=String(rowIndex);await sendSavedOrder()}async function deleteOrder(rowIndex){if(!confirm('ШӯШ°ЩҒ Ш§Щ„Ш·Щ„ШЁШҹ'))return;try{await runApi('delete',{rowIndex:Number(rowIndex)},'ШӯШ°ЩҒ Ш§Щ„Ш·Щ„ШЁ...');state.orders=state.orders.filter(function(o){return Number(o.rowIndex)!==Number(rowIndex)});renderOrders();toast('ШӘЩ… Ш§Щ„ШӯШ°ЩҒ','success')}catch(err){toast(String(err.message||err),'error')}}function selectedRows(){return Array.from(document.querySelectorAll('.order-check:checked')).map(function(el){return Number(el.value)}).filter(Boolean)}function toggleSelectAllOrders(){var boxes=Array.from(document.querySelectorAll('.order-check'));var should=boxes.some(function(b){return!b.checked});boxes.forEach(function(b){b.checked=should})}async function sendSelectedOrders(){var ids=selectedRows();if(!ids.length){toast('Ш§Ш®ШӘШұ Ш·Щ„ШЁШ§ЩӢ ЩҲШ§ШӯШҜШ§ЩӢ Ш№Щ„Щү Ш§Щ„ШЈЩӮЩ„','error');return}try{var res=await runApi('sendMany',{ids:ids},'ШҘШұШіШ§Щ„ Ш§Щ„Щ…ШӯШҜШҜ...');toast('ШӘЩ…ШӘ Щ…Ш№Ш§Щ„Ш¬Ш© '+((res&&res.ok)||ids.length)+' Ш·Щ„ШЁ','success');loadRecentOrders()}catch(err){toast(String(err.message||err),'error')}}
    function normalizeDialPhone(phone){var d=String(phone||'').replace(/\D/g,'');if(!d)return'';if(d.indexOf('972')===0)return'+'+d;if(d.indexOf('05')===0)return d;if(d.indexOf('5')===0)return'0'+d;return d}function normalizeWhatsappPhone(phone){var d=String(phone||'').replace(/\D/g,'');if(d.indexOf('972')===0)return d;if(d.indexOf('05')===0)return'972'+d.slice(1);if(d.indexOf('5')===0)return'972'+d;return d}function callCustomer(rowIndex){var o=getOrder(rowIndex);if(!o)return;var phone=normalizeDialPhone(o.phone);if(!phone){toast('ШұЩӮЩ… Ш§Щ„ЩҮШ§ШӘЩҒ ЩҶШ§ЩӮШө','error');return}location.href='tel:'+phone}
    function openWhatsApp(rowIndex,lang){var o=getOrder(rowIndex);if(!o)return;var phone=normalizeWhatsappPhone(o.phone);if(!phone){toast('ШұЩӮЩ… Ш§Щ„ЩҮШ§ШӘЩҒ ЩҶШ§ЩӮШө','error');return}var name=o.name||'';var orderId=o.orderId||'';var msg;if(lang==='HE'){msg='Ч©ЧңЧ•Чқ '+name+'\nЧ”Ч”Ч–ЧһЧ Ч” Ч©ЧңЧҡ Чһ-MAD PRINT Ч ЧһЧҰЧҗЧӘ Ч‘Ч”ЧӣЧ Ч”.\nЧһЧЎЧӨЧЁ Ч”Ч–ЧһЧ Ч”: '+orderId+'\nЧӘЧ•Ч“Ч”.'}else{msg='Щ…ШұШӯШЁШ§ '+name+'\nШ·Щ„ШЁЩғ Щ…ЩҶ MAD PRINT ЩӮЩҠШҜ Ш§Щ„ШӘШ¬ЩҮЩҠШІ.\nШұЩӮЩ… Ш§Щ„Ш·Щ„ШЁ: '+orderId}window.open('https://wa.me/'+phone+'?text='+encodeURIComponent(msg),'_blank')}
    function clearForm(){['rowIndex','aiInput','name','phone','city','address','price','offer'].forEach(function(id){$(id).value=''});$('delivery').value='Hi Express';$('employee').value='Ш§Щ„Щ…ШҜЩҠШұ';state.savedRowIndex='';$('saveState').textContent='Щ„Щ… ЩҠШӘЩ… Ш§Щ„ШӯЩҒШё';setAction('Ш¬Ш§ЩҮШІ')}async function loadCities(){try{var cities=await runApi('cities',{},'ШӘШӯЩ…ЩҠЩ„ Ш§Щ„Щ…ШҜЩҶ...');$('cityList').innerHTML=(cities||[]).map(function(c){return '<option value="'+esc(c)+'"></option>'}).join('')}catch(err){}}function fillEmployees(){var html='<option value="">-- Ш§Ш®ШӘШұ Ш§Щ„Щ…ЩӮШ§ЩҲЩ„ --</option>'+employees.map(function(e){return '<option>'+esc(e)+'</option>'}).join('');$('bulkEmployee').innerHTML=html;$('employee').innerHTML=employees.map(function(e){return '<option>'+esc(e)+'</option>'}).join('')}function reloadFrame(){var f=$('appFrame');if(!f)return;f.src='about:blank';setTimeout(function(){f.src=APP_URL},80)}window.addEventListener('load',function(){document.documentElement.classList.add(IS_MOBILE?'mobile-mode':'desktop-mode');if(IS_MOBILE){fillEmployees();loadCities().then(loadRecentOrders)}else{$('appFrame').src=APP_URL}});
    (function(){
      function madPhoneDigits(value){return String(value||'').replace(/[\u0660-\u0669]/g,function(ch){return String(ch.charCodeAt(0)-0x0660)}).replace(/[\u06f0-\u06f9]/g,function(ch){return String(ch.charCodeAt(0)-0x06f0)}).replace(/\D/g,'')}
      function madPhoneForSheet(value){var raw=String(value||'').trim();if(!raw)return'';if(raw.charAt(0)==='*')return raw.replace(/\s+/g,'');var d=madPhoneDigits(raw);if(!d)return'';while(d.indexOf('00')===0)d=d.slice(2);if(d.indexOf('972')===0)d=d.slice(3);while(d.charAt(0)==='0')d=d.slice(1);return d}
      function madShouldNormalizeQuery(value){var d=madPhoneDigits(value);return d.length>=3&&(/^\s*(?:\+?972|00972|0?5)/.test(String(value||''))||d.indexOf('972')===0||d.charAt(0)==='5'||d.charAt(0)==='0')}
      var oldCollectPayload=collectPayload;
      collectPayload=function(){var payload=oldCollectPayload();var phone=madPhoneForSheet(payload.phone||($('phone')&&$('phone').value));if(phone){payload.phone=phone;if($('phone'))$('phone').value=phone}return payload};
      if(typeof madApplyAnalysis==='function'){var oldMadApplyAnalysis=madApplyAnalysis;madApplyAnalysis=function(res,text){oldMadApplyAnalysis(res,text);var phone=madPhoneForSheet($('phone')&&$('phone').value);if(phone&&$('phone'))$('phone').value=phone}}
      var oldRenderOrders=renderOrders;
      renderOrders=function(){var input=$('ordersSearch');if(!input)return oldRenderOrders();var original=input.value;var normalized=madPhoneForSheet(original);if(normalized&&normalized!==String(original||'').trim()&&madShouldNormalizeQuery(original)){input.value=normalized;try{return oldRenderOrders()}finally{input.value=original}}return oldRenderOrders()};
      window.madPhoneForSheet=madPhoneForSheet;
    })();
  </script>
