<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0"/>
  <title>MAD Manager v4.6 FINAL</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    :root {
      --bg:#0a0f1e; --card:#161b2c; --primary:#3b82f6; --muted:#94a3b8; --border:rgba(255,255,255,.08);
      --grad:linear-gradient(135deg,#3b82f6 0%,#2563eb 100%);
    }
    body{margin:0;font-family:'Segoe UI',Roboto,system-ui,sans-serif;background:var(--bg);color:#f8fafc;padding-bottom:90px;line-height:1.5}
    .header{background:rgba(16,21,36,.85);backdrop-filter:blur(12px);padding:12px 16px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
    .container{padding:16px;max-width:600px;margin:0 auto}
    .order-card{background:var(--card);border-radius:24px;padding:20px;margin-bottom:20px;border:1px solid var(--border);box-shadow:0 10px 25px rgba(0,0,0,.4)}
    .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .order-id{font-family:monospace;color:var(--muted);background:rgba(255,255,255,.05);padding:2px 8px;border-radius:6px;font-size:13px}
    .status-pill{font-size:11px;padding:4px 12px;border-radius:20px;font-weight:800}
    .status-new{background:rgba(59,130,246,.12);color:#60a5fa}
    .status-prep{background:rgba(16,185,129,.12);color:#34d399}
    .customer-name{font-size:19px;font-weight:900;display:block;margin-bottom:4px}
    .customer-phone{color:var(--muted);font-size:14px;display:flex;align-items:center;gap:6px}
    .offer-details{margin:12px 0;padding:12px;background:rgba(59,130,246,.06);border-radius:12px;color:#93c5fd;font-weight:700;border-right:3px solid var(--primary);font-size:14px;word-break:break-word}
    .meta-line{display:flex;flex-wrap:wrap;gap:10px;font-size:12px;color:var(--muted);margin-top:8px}
    .meta-tag{background:rgba(255,255,255,.05);padding:2px 8px;border-radius:6px}
    .actions-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:18px}
    .actions-secondary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
    .btn{padding:10px 4px;border-radius:14px;border:none;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;gap:6px;text-decoration:none;transition:.2s}
    .btn i{font-size:18px}
    .btn-primary{background:var(--grad);color:#fff}
    .btn-success{background:#059669;color:#fff}
    .btn-wa-ar{background:#d97706;color:#fff}
    .btn-wa-he{background:#7c3aed;color:#fff}
    .btn-outline{background:rgba(255,255,255,.03);color:#fff;border:1px solid var(--border)}

    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:2000;padding:20px}
    .modal-overlay.show{display:flex}
    .modal-content{background:var(--card);width:100%;max-width:480px;padding:24px;border-radius:32px;border:1px solid var(--border);overflow-y:auto;max-height:90vh}

    .smart-box{background:rgba(59,130,246,.10);border:1px dashed var(--primary);padding:15px;border-radius:16px;margin-bottom:18px}
    .smart-box h4{margin:0 0 10px 0;font-size:14px;color:var(--primary);display:flex;align-items:center;gap:8px}

    input,select,textarea{width:100%;padding:12px;margin-bottom:12px;border-radius:12px;border:1px solid var(--border);background:rgba(0,0,0,.2);color:#fff;outline:none;font-size:15px;box-sizing:border-box}
    input:focus,textarea:focus,select:focus{border-color:var(--primary);background:rgba(0,0,0,.35)}

    #toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:14px 28px;border-radius:50px;font-weight:900;z-index:3000;display:none;box-shadow:0 10px 20px rgba(0,0,0,.3)}
    #loadingOverlay{position:fixed;inset:0;background:rgba(6,9,20,.72);z-index:4000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
    .spinner{width:44px;height:44px;border:4px solid rgba(59,130,246,.12);border-top-color:var(--primary);border-radius:50%;animation:spin .8s infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<div id="loadingOverlay"><div class="spinner"></div></div>
<div id="toast">✅ تمت العملية</div>

<!-- Order Modal -->
<div class="modal-overlay" id="orderModal">
  <div class="modal-content">
    <h3 id="modalTitle" style="margin-top:0;">إضافة طلب جديد</h3>

    <div class="smart-box" id="smartSection">
      <h4><i class="fa fa-wand-magic-sparkles"></i> المحلل الذكي + قراءة PDF</h4>
      <textarea id="smartInput" placeholder="الصق نص الطلب هنا..." style="height:90px;margin-bottom:10px;font-size:13px;"></textarea>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <button class="btn btn-outline" onclick="analyzeTextLocal()" style="width:100%;flex-direction:row;height:38px;font-size:13px;">
          <i class="fa fa-bolt"></i> تحليل سريع
        </button>
        <button class="btn btn-primary" onclick="analyzeTextAI()" style="width:100%;flex-direction:row;height:38px;font-size:13px;">
          <i class="fa fa-robot"></i> ذكاء صناعي ✨
        </button>
      </div>

      <div style="display:grid;grid-template-columns:1fr;gap:10px;margin-top:10px;">
        <button class="btn btn-outline" onclick="document.getElementById('pdfUpload').click()" style="width:100%;flex-direction:row;height:38px;font-size:13px;">
          <i class="fa fa-file-pdf" style="color:#ef4444"></i> قراءة PDF وتعبئة
        </button>
        <input type="file" id="pdfUpload" accept="application/pdf" style="display:none" onchange="analyzePdfAI(event)">
      </div>

      <div style="font-size:11px;color:var(--muted);margin-top:10px;line-height:1.6">
        ✅ الذكاء يعبّي: الاسم / الهاتف / المدينة / العنوان / السعر / الأصناف
      </div>
    </div>

    <label>الاسم الكامل</label><input type="text" id="f_name">
    <label>رقم الهاتف</label><input type="tel" id="f_phone">
    <label>الأصناف المطلوبة</label><textarea id="f_offer" rows="2"></textarea>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div><label>السعر (₪)</label><input type="number" id="f_price"></div>
      <div>
        <label>طريقة الدفع</label>
        <select id="f_payment">
          <option value="دفع عند الاستلام">دفع عند الاستلام</option>
          <option value="شراء من الموقع - مدفوع">شراء من الموقع - مدفوع</option>
          <option value="شراء عبر الرابط">شراء عبر الرابط</option>
        </select>
      </div>
    </div>

    <label>المدينة</label><input type="text" id="f_city">
    <label>العنوان التفصيلي</label><input type="text" id="f_address">
    <label>ملاحظات إضافية</label><textarea id="f_notes" rows="2"></textarea>

    <label>شركة التوصيل</label>
    <select id="f_delivery">
      <option value="">-- اختر شركة الشحن --</option>
      <option value="High Express - أم الفحم">High Express - أم الفحم</option>
      <option value="Lama (050-5102019)">Lama (050-5102019)</option>
      <option value="Marwah (052-7035370)">Marwah (052-7035370)</option>
      <option value="Areen (052-5118966)">Areen (052-5118966)</option>
      <option value="Pickup">Pickup</option>
    </select>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;">
      <button class="btn btn-outline" onclick="closeModal('orderModal')">إلغاء</button>
      <button class="btn btn-primary" onclick="saveOrder()" id="saveBtn">حفظ الطلب ✨</button>
    </div>
  </div>
</div>

<div class="header">
  <div class="header-top" style="display:flex;justify-content:space-between;align-items:center;">
    <div class="logo" style="font-weight:900;font-size:20px;">MAD <span>MANAGER</span></div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-outline" onclick="load()" style="width:40px;height:40px;"><i class="fa fa-sync"></i></button>
      <button class="btn btn-primary" onclick="openAddModal()" style="width:40px;height:40px;"><i class="fa fa-plus"></i></button>
    </div>
  </div>
  <div style="margin-top:10px;">
    <input type="text" id="searchInput" placeholder="بحث باسم العميل أو رقم الهاتف..." oninput="filterOrders()" style="margin-bottom:0;background:rgba(255,255,255,0.05);">
  </div>
</div>

<div class="container" id="ordersList"></div>

<script>
// ✅ رابط السكربت (اللي أرسلته أنت)
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxR05-74zGsy7o3R9bdizecDEEjbaFrzr0h8SiFx-FjEYceNGlTnOOEEC1RnRW3-z9ppg/exec";
const DASH_KEY = "12345678";

const CUSTOMER_SERVICE_PHONE = "972524033442";
const CUSTOMER_SERVICE_STAR  = "*9935";

let allOrders = [];
let editingRow = null;

function showLoading(s){ document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; }
function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; setTimeout(()=>t.style.display='none',2500); }
const safe = (v)=> (v===undefined||v===null||String(v).toLowerCase()==='undefined'||String(v).toLowerCase()==='null') ? '' : String(v).trim();

function formatLocalPhone(p){
  if(!p) return '';
  let d=String(p).replace(/[^0-9]/g,'');
  if(d.startsWith('972')) d='0'+d.substring(3);
  if(!d.startsWith('0') && d.length===9) d='0'+d;
  return d;
}
function normalizePhoneForLink(p){
  let d=String(p||'').replace(/[^0-9]/g,'');
  if(d.startsWith('0')) d='972'+d.substring(1);
  if(!d.startsWith('972') && d.length===9) d='972'+d;
  return d;
}

function fillFromAI(d){
  if(!d) return;
  if(d.name)    document.getElementById('f_name').value = d.name;
  if(d.phone)   document.getElementById('f_phone').value = formatLocalPhone(d.phone);
  if(d.city)    document.getElementById('f_city').value = d.city;
  if(d.address) document.getElementById('f_address').value = d.address;
  if(d.offer)   document.getElementById('f_offer').value = d.offer;
  if(d.notes)   document.getElementById('f_notes').value = d.notes;
  if(d.price!==undefined && d.price!==null && String(d.price).trim()!=='') document.getElementById('f_price').value = d.price;
}

function analyzeTextLocal(){
  const raw=document.getElementById('smartInput').value;
  if(!raw.trim()) return showToast('الصق نصاً أولاً');

  const phoneMatch = raw.match(/(?:05|972|5)[0-9]{8,11}/);
  if(phoneMatch) document.getElementById('f_phone').value = formatLocalPhone(phoneMatch[0]);

  const priceMatch = raw.match(/([0-9]{2,4})\s*(?:₪|shekel|ILS|السعر)/i) || raw.match(/(?:₪|السعر|Price)\s*:?\s*([0-9]{2,4})/i);
  if(priceMatch) document.getElementById('f_price').value = priceMatch[1];

  const nameMatch = raw.match(/(?:الاسم|Name)\s*:?\s*([^\n|]+)/i);
  if(nameMatch) document.getElementById('f_name').value = nameMatch[1].trim();
  else {
    const firstLine = raw.split('\n')[0].trim();
    if(firstLine.length < 30) document.getElementById('f_name').value = firstLine;
  }

  const cityMatch = raw.match(/(?:المدينة|city|عنوان|من)\s*:?\s*([^\n|]+)/i);
  if(cityMatch) document.getElementById('f_city').value = cityMatch[1].trim();

  if(!document.getElementById('f_offer').value.trim()) document.getElementById('f_offer').value = raw.substring(0,160).trim();
  showToast('تم تحليل سريع ✅');
}

// ✅ AI عبر POST (أفضل وأثبت)
async function analyzeTextAI(){
  const raw=document.getElementById('smartInput').value;
  if(!raw.trim()) return showToast('الصق نصاً أولاً');
  showLoading(true);
  try{
    const res = await fetch(SCRIPT_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'analyze', key:DASH_KEY, text: raw })
    });
    const data = await res.json();
    if(data.result !== 'SUCCESS') throw new Error(data.message || 'AI ERROR');
    fillFromAI(data.data);
    showToast('تم التحليل بالذكاء ✨');
  }catch(e){
    analyzeTextLocal();
    showToast('الذكاء فشل، تم تعبئة سريع ✅');
  }
  showLoading(false);
}

async function analyzePdfAI(ev){
  const file = ev.target.files && ev.target.files[0];
  if(!file) return;
  showLoading(true);
  try{
    const base64 = await fileToBase64(file);
    const res = await fetch(SCRIPT_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'analyzePDF', key:DASH_KEY, fileBase64: base64, text: document.getElementById('smartInput').value || '' })
    });
    const data = await res.json();
    if(data.result !== 'SUCCESS') throw new Error(data.message || 'AI PDF ERROR');
    fillFromAI(data.data);
    showToast('تمت قراءة PDF ✨');
  }catch(e){
    showToast('فشل قراءة PDF');
  }
  showLoading(false);
  ev.target.value='';
}

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>{
      const s=String(r.result||'');
      resolve(s.includes(',') ? s.split(',')[1] : s);
    };
    r.onerror=reject;
    r.readAsDataURL(file);
  });
}

async function load(){
  showLoading(true);
  try{
    const res = await fetch(`${SCRIPT_URL}?action=get&key=${encodeURIComponent(DASH_KEY)}&_=${Date.now()}`);
    const data = await res.json();
    if(data && data.result === 'ERROR') throw new Error(data.message||'ERROR');
    allOrders = Array.isArray(data) ? data : [];
    renderOrders(allOrders);
  }catch(e){
    showToast('خطأ في جلب البيانات');
    document.getElementById('ordersList').innerHTML = `<div style="text-align:center;padding:50px;color:var(--muted);">تعذّر تحميل الطلبات</div>`;
  }
  showLoading(false);
}

function filterOrders(){
  const term=document.getElementById('searchInput').value.toLowerCase();
  const filtered = allOrders.filter(o=>{
    const n=safe(o.name).toLowerCase();
    const p=safe(o.phone);
    return n.includes(term) || p.includes(term) || formatLocalPhone(p).includes(term);
  });
  renderOrders(filtered);
}

function renderOrders(list){
  const container=document.getElementById('ordersList');
  if(!list||list.length===0){
    container.innerHTML = `<div style="text-align:center;padding:50px;color:var(--muted);">لا توجد طلبات</div>`;
    return;
  }

  const latestFirst=[...list].filter(o=>o.rowIndex).reverse();

  container.innerHTML = latestFirst.map(o=>{
    const isPrep=(o.status||'').includes('تجهيز')||(o.status||'').includes('الإرسال');
    const deliveryId = safe(o.delivery_order_id || o.deliveryId || '');
    return `
      <div class="order-card">
        <div class="card-header">
          <small class="order-id">#${safe(o.orderId)||'---'}</small>
          <span class="status-pill ${isPrep?'status-prep':'status-new'}">${safe(o.status)||'جديد'}</span>
        </div>

        <div onclick="openEditModal(${o.rowIndex})" style="cursor:pointer;">
          <span class="customer-name">${safe(o.name)||'—'}</span>
          <div class="customer-phone"><i class="fa fa-phone"></i> ${formatLocalPhone(o.phone)||'—'}</div>
          <div class="offer-details">${safe(o.offer)||'—'}</div>

          <div class="meta-line">
            <span class="meta-tag">📍 ${safe(o.city)||'—'}</span>
            <span class="meta-tag">₪${safe(o.price)||'—'}</span>
            <span class="meta-tag">💳 ${safe(o.payment)||'—'}</span>
            <span class="meta-tag">🚚 ${safe(o.delivery)||'—'}</span>
            ${deliveryId ? `<span class="meta-tag">🧾 شحنة: ${deliveryId}</span>` : ``}
          </div>
        </div>

        <div class="actions-grid">
          <button class="btn btn-wa-ar" onclick="sendMsg(${o.rowIndex},'ar')"><i class="fa-brands fa-whatsapp"></i><span>عربي</span></button>
          <button class="btn btn-wa-he" onclick="sendMsg(${o.rowIndex},'he')"><i class="fa-brands fa-whatsapp"></i><span>עברית</span></button>
          <button class="btn btn-success" onclick="approve(${o.rowIndex})"><i class="fa fa-check"></i><span>اعتماد</span></button>
          <button class="btn btn-outline" onclick="openEditModal(${o.rowIndex})"><i class="fa fa-edit"></i><span>تعديل</span></button>
        </div>

        <div class="actions-secondary">
          <button class="btn btn-outline" onclick="downloadReceipt(${o.rowIndex},'ar')"><i class="fa fa-file-pdf" style="color:#ef4444"></i><span>PDF ع</span></button>
          <button class="btn btn-outline" onclick="downloadReceipt(${o.rowIndex},'he')"><i class="fa fa-file-pdf" style="color:#ef4444"></i><span>PDF هـ</span></button>
          <button class="btn btn-outline" onclick="sendToDelivery(${o.rowIndex})"><i class="fa fa-truck"></i><span>شحن</span></button>
        </div>
      </div>`;
  }).join('');
}

// ✅ PDF من السيرفر (10×10 + عربي/عبري مضبوط)
async function downloadReceipt(row, lang){
  showLoading(true);
  try{
    const res = await fetch(SCRIPT_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'pdfReceipt', key:DASH_KEY, row: row, lang: lang })
    });
    const data = await res.json();
    if(data.result !== 'SUCCESS') throw new Error(data.message || 'PDF ERROR');

    const blob = base64ToBlob(data.pdfBase64, 'application/pdf');
    downloadBlob(blob, data.filename || `receipt_${row}_${lang}.pdf`);
    showToast('تم تنزيل PDF ✅');
  }catch(e){
    showToast('فشل تنزيل PDF');
  }
  showLoading(false);
}

function base64ToBlob(base64, mime){
  const bytes = atob(base64);
  const arr = new Uint8Array(bytes.length);
  for(let i=0;i<bytes.length;i++) arr[i]=bytes.charCodeAt(i);
  return new Blob([arr], {type:mime});
}
function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1500);
}

async function sendMsg(row, lang){
  const o = allOrders.find(x=>x.rowIndex==row);
  if(!o) return;

  const paymentMethod = safe(o.payment) || (lang==='he' ? 'תשלום במעמד המסירה' : 'دفع عند الاستلام');

  const serviceWaLink = `https://wa.me/${CUSTOMER_SERVICE_PHONE}`;
  const telStarLink = `tel:${CUSTOMER_SERVICE_STAR}`;

  const contactBlock = (lang==='he')
    ? `\n📞 שירות לקוחות: ${CUSTOMER_SERVICE_PHONE}\n🔗 WhatsApp: ${serviceWaLink}\n📞 קו נוסף: ${CUSTOMER_SERVICE_STAR}\n🔗 חיוג: ${telStarLink}`
    : `\n📞 خدمة العملاء: ${CUSTOMER_SERVICE_PHONE}\n🔗 واتساب مباشر: ${serviceWaLink}\n📞 رقم إضافي: ${CUSTOMER_SERVICE_STAR}\n🔗 اتصال: ${telStarLink}`;

  const msg = (lang==='ar')
    ? `أهلاً بك ${safe(o.name)} في MAD Parfumeur 🖤\nالعرض: ${safe(o.offer)}\nالعنوان: ${safe(o.city)}\nالسعر: ${safe(o.price)} ₪\nالدفع: ${paymentMethod}${contactBlock}`
    : `שלום ${safe(o.name)} 👋\nמוצר: ${safe(o.offer)}\nעיר: ${safe(o.city)}\nמחיר: ${safe(o.price)} ₪\nתשלום: ${paymentMethod}${contactBlock}`;

  const wa = `https://wa.me/${normalizePhoneForLink(o.phone)}?text=${encodeURIComponent(msg)}`;
  window.open(wa,'_blank');
}

async function approve(row){
  showLoading(true);
  const o=allOrders.find(x=>x.rowIndex==row);
  if(!o){showLoading(false);return;}

  const p=new URLSearchParams({
    action:'updateOrder', key:DASH_KEY, row:row,
    offer:safe(o.offer), name:safe(o.name), phone:safe(o.phone),
    city:safe(o.city), address:safe(o.address||''), notes:safe(o.notes||''),
    delivery:safe(o.delivery), payment:safe(o.payment), price:safe(o.price),
    status:'بانتظار الإرسال للتجهيز'
  });

  try{
    const res=await fetch(`${SCRIPT_URL}?${p.toString()}`);
    const data=await res.json();
    if(data.result==='SUCCESS'){ showToast('تم الاعتماد ✨'); load(); }
    else{ showToast(data.message||'فشل'); showLoading(false); }
  }catch(e){ showToast('فشل'); showLoading(false); }
}

async function sendToDelivery(row){
  showLoading(true);
  try{
    const res=await fetch(`${SCRIPT_URL}?action=sendToDelivery&key=${encodeURIComponent(DASH_KEY)}&row=${row}&_=${Date.now()}`);
    const data=await res.json();
    if(data.result==='SUCCESS'){ showToast(data.delivery_order_id ? `تم الإرسال ✅ رقم: ${data.delivery_order_id}` : 'تم الإرسال ✅'); load(); }
    else{ showToast(data.message||'فشل الإرسال'); showLoading(false); }
  }catch(e){ showToast('فشل الإرسال'); showLoading(false); }
}

function openAddModal(){
  editingRow=null;
  document.getElementById('modalTitle').textContent='إضافة طلب جديد';
  document.getElementById('smartSection').style.display='block';
  document.getElementById('smartInput').value='';
  ['f_name','f_phone','f_offer','f_price','f_city','f_address','f_notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f_payment').value='دفع عند الاستلام';
  document.getElementById('f_delivery').value='';
  document.getElementById('orderModal').classList.add('show');
}

function openEditModal(row){
  const o=allOrders.find(x=>x.rowIndex==row);
  if(!o) return;
  editingRow=row;
  document.getElementById('modalTitle').textContent='تعديل تفاصيل الطلب';
  document.getElementById('smartSection').style.display='none';

  document.getElementById('f_name').value=safe(o.name);
  document.getElementById('f_phone').value=formatLocalPhone(o.phone);
  document.getElementById('f_offer').value=safe(o.offer);
  document.getElementById('f_price').value=safe(o.price);
  document.getElementById('f_payment').value=safe(o.payment)||'دفع عند الاستلام';
  document.getElementById('f_city').value=safe(o.city);
  document.getElementById('f_address').value=safe(o.address||'');
  document.getElementById('f_notes').value=safe(o.notes||'');
  document.getElementById('f_delivery').value=safe(o.delivery||'');

  document.getElementById('orderModal').classList.add('show');
}

async function saveOrder(){
  const isAdd=(editingRow===null);
  showLoading(true);

  const payload={
    action: isAdd ? 'addOrder' : 'updateOrder',
    key: DASH_KEY,
    row: isAdd ? '' : editingRow,
    name: safe(document.getElementById('f_name').value),
    phone: safe(document.getElementById('f_phone').value),
    offer: safe(document.getElementById('f_offer').value),
    price: safe(document.getElementById('f_price').value),
    city: safe(document.getElementById('f_city').value),
    address: safe(document.getElementById('f_address').value),
    notes: safe(document.getElementById('f_notes').value),
    payment: safe(document.getElementById('f_payment').value),
    delivery: safe(document.getElementById('f_delivery').value),
    status: 'NEW'
  };

  try{
    const res=await fetch(`${SCRIPT_URL}?` + new URLSearchParams(payload).toString());
    const data=await res.json();
    if(data.result==='SUCCESS'){
      showToast(isAdd ? 'تمت إضافة الطلب ✨' : 'تم الحفظ ✨');
      closeModal('orderModal');
      load();
    }else{
      showToast(data.message||'فشل الحفظ');
      showLoading(false);
    }
  }catch(e){
    showToast('فشل الحفظ');
    showLoading(false);
  }
}

function closeModal(id){ document.getElementById(id).classList.remove('show'); }

window.onload=load;
</script>
</body>
</html>
