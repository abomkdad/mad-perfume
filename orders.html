<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MAD Label PDF 10x10</title>
  <style>
    :root {
      --bg: #0b1220;
      --card: #111827;
      --line: rgba(255,255,255,0.12);
      --text: #f3f4f6;
      --muted: #9ca3af;
      --primary: #2563eb;
      --ok: #059669;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background: radial-gradient(circle at top, #18243c 0%, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 16px;
    }

    .panel {
      background: rgba(17,24,39,0.88);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      backdrop-filter: blur(8px);
    }

    h1 {
      font-size: 20px;
      margin: 0 0 8px 0;
    }

    .sub {
      color: var(--muted);
      margin: 0 0 16px 0;
      font-size: 13px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    label {
      display: block;
      margin: 0 0 6px;
      font-size: 13px;
      color: #d1d5db;
    }

    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(0,0,0,0.2);
      color: #fff;
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
      outline: none;
    }

    textarea { min-height: 74px; resize: vertical; }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      color: #fff;
      font-weight: 700;
      padding: 11px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-primary { background: var(--primary); }
    .btn-ok { background: var(--ok); }

    .hint {
      color: var(--muted);
      font-size: 12px;
      margin-top: 10px;
    }

    #invoicePreview {
      width: 10cm;
      height: 10cm;
      margin: 0 auto;
      background: #fff;
      color: #000;
      padding: 8mm;
      border-radius: 2px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .inv-header {
      text-align: center;
      border-bottom: 2px solid #000;
      margin-bottom: 8px;
      padding-bottom: 6px;
    }

    .inv-body {
      flex: 1;
      font-size: 11px;
      line-height: 1.55;
      direction: rtl;
      overflow: hidden;
      word-break: break-word;
    }

    .inv-footer {
      border-top: 2px solid #000;
      padding-top: 7px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 8px;
    }

    .total {
      text-align: left;
      font-weight: 900;
      font-size: 22px;
      line-height: 1;
    }

    @media (max-width: 900px) {
      .wrap { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <h1>صفحة ملصق MAD - تنزيل PDF</h1>
      <p class="sub">عبّي البيانات واضغط "تحميل PDF". ينزل ملف جاهز بمقاس 10سم × 10سم.</p>

      <div class="grid">
        <div>
          <label for="f_name">الاسم</label>
          <input id="f_name" value="محمد جلبوني"/>
        </div>
        <div>
          <label for="f_phone">الهاتف</label>
          <input id="f_phone" value="0599123456"/>
        </div>
      </div>

      <div class="grid" style="margin-top:10px;">
        <div>
          <label for="f_city">المدينة</label>
          <input id="f_city" value="أم الفحم"/>
        </div>
        <div>
          <label for="f_price">السعر (₪)</label>
          <input id="f_price" value="199"/>
        </div>
      </div>

      <div style="margin-top:10px;">
        <label for="f_offer">الأصناف</label>
        <textarea id="f_offer">عطر MAD - 100ml + هدية</textarea>
      </div>

      <div class="actions">
        <button class="btn-primary" onclick="fillPreview()">تحديث المعاينة</button>
        <button class="btn-ok" onclick="downloadPdfLabel()">تحميل PDF</button>
      </div>

      <div class="hint">اسم الملف: <span id="fileNamePreview">MAD-Label-10x10.pdf</span></div>
    </section>

    <section class="panel">
      <div id="invoicePreview">
        <div class="inv-header">
          <div style="font-size:28px; font-weight:900; letter-spacing:2px;">MAD</div>
          <div style="font-size:10px; font-weight:700;">PARFUMEUR</div>
          <div style="font-size:9px; margin-top:4px; display:flex; justify-content:space-between;">
            <span id="p_date">DATE: 02.03.2026</span>
            <span id="p_ord">ORD: MAD-00001</span>
          </div>
        </div>

        <div class="inv-body" id="p_body">
          <strong>الاسم:</strong> محمد جلبوني<br>
          <strong>الهاتف:</strong> 0599123456<br>
          <strong>المدينة:</strong> أم الفحم<br>
          <strong>الأصناف:</strong> عطر MAD - 100ml + هدية
        </div>

        <div class="inv-footer">
          <div style="font-size:8px; text-align:center; flex:1; font-weight:700;">شكرا لثقتكم بنا</div>
          <div class="total">₪<span id="p_total">199</span></div>
        </div>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <script>
    function pad2(n) { return String(n).padStart(2, '0'); }

    function fillPreview() {
      const name = document.getElementById('f_name').value.trim() || '-';
      const phone = document.getElementById('f_phone').value.trim() || '-';
      const city = document.getElementById('f_city').value.trim() || '-';
      const price = document.getElementById('f_price').value.trim() || '0';
      const offer = document.getElementById('f_offer').value.trim() || '-';

      const now = new Date();
      const dateText = `${pad2(now.getDate())}.${pad2(now.getMonth() + 1)}.${now.getFullYear()}`;
      const ord = `MAD-${Date.now().toString().slice(-5)}`;

      document.getElementById('p_date').textContent = `DATE: ${dateText}`;
      document.getElementById('p_ord').textContent = `ORD: ${ord}`;
      document.getElementById('p_total').textContent = price;
      document.getElementById('p_body').innerHTML =
        `<strong>الاسم:</strong> ${escapeHtml(name)}<br><strong>الهاتف:</strong> ${escapeHtml(phone)}<br><strong>المدينة:</strong> ${escapeHtml(city)}<br><strong>الأصناف:</strong> ${escapeHtml(offer)}`;

      document.getElementById('fileNamePreview').textContent = `${ord}_10x10.pdf`;
    }

    function escapeHtml(str) {
      return str
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    async function downloadPdfLabel() {
      fillPreview();

      const el = document.getElementById('invoicePreview');
      const ordText = document.getElementById('p_ord').textContent.replace('ORD: ', '').trim() || 'MAD-Label';
      const fileName = `${ordText}_10x10.pdf`;

      const { jsPDF } = window.jspdf;
      const canvas = await html2canvas(el, {
        scale: 3,
        backgroundColor: '#ffffff',
        useCORS: true
      });

      const img = canvas.toDataURL('image/png');
      const pdf = new jsPDF({
        orientation: 'portrait',
        unit: 'mm',
        format: [100, 100]
      });

      pdf.addImage(img, 'PNG', 0, 0, 100, 100);
      pdf.save(fileName);
    }

    fillPreview();
  </script>
</body>
</html>
