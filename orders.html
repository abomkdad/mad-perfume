<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAD Print Manager | نظام الطباعة واللوجستيات</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- jsPDF & html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .sticker-font { font-family: sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input, select, textarea { outline: none !important; }
        .btn-active:active { transform: scale(0.95); }
    </style>
</head>
<body class="text-slate-700 pb-20">

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-slate-100 p-4 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 p-1.5 rounded-lg shadow-md">
                <i data-lucide="printer" class="text-white w-5 h-5"></i>
            </div>
            <h1 class="text-lg font-black tracking-tight text-slate-900">MAD <span class="text-indigo-600">PRINT</span></h1>
        </div>
        <button onclick="fetchOrders()" class="bg-slate-50 p-2 rounded-full border border-slate-100 text-slate-400 btn-active">
            <i data-lucide="refresh-ccw" id="refreshIcon" class="w-5 h-5"></i>
        </button>
    </nav>

    <div class="p-4 space-y-6 max-w-lg mx-auto">
        
        <!-- Status Alert -->
        <div id="statusAlert" class="hidden p-4 rounded-2xl flex items-center gap-3 text-xs font-bold border transition-all shadow-sm">
            <i id="statusIcon" class="w-5 h-5"></i>
            <span id="statusMsg"></span>
        </div>

        <!-- Action Mode Card -->
        <div id="modeIndicator" class="bg-white border-slate-100 p-4 rounded-[2rem] border shadow-sm flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div id="modeIconBox" class="p-2.5 rounded-2xl bg-slate-50 text-slate-400 transition-colors">
                    <i id="modeIcon" data-lucide="plus-circle" class="w-5 h-5"></i>
                </div>
                <div>
                    <p id="modeTitle" class="text-sm font-black text-slate-700">إضافة طلب جديد</p>
                    <p class="text-[10px] text-slate-400 font-medium">نظام الربط الذكي متصل</p>
                </div>
            </div>
            <button id="cancelEditBtn" onclick="cancelEdit()" class="hidden text-xs font-bold text-indigo-600">إلغاء</button>
        </div>

        <!-- AI Analysis Input -->
        <div class="space-y-3">
            <label class="text-xs font-black flex items-center gap-2 text-indigo-600 mr-1 uppercase">
                <i data-lucide="wand-2" class="w-4 h-4"></i>
                بوكس التحليل الذكي
            </label>
            <div class="relative group">
                <textarea
                    id="aiInput"
                    class="w-full h-32 bg-white border border-slate-200 rounded-[2rem] p-5 text-sm focus:ring-4 focus:ring-indigo-50 focus:border-indigo-500 transition-all placeholder:text-slate-300 shadow-sm"
                    placeholder="ألصق النص هنا أو ارفع PDF..."
                ></textarea>
                <div class="absolute bottom-4 left-4 flex gap-2">
                    <input type="file" id="pdfFileInput" accept="application/pdf" class="hidden" onchange="handleFileUpload(event)">
                    <button onclick="document.getElementById('pdfFileInput').click()" class="bg-white text-slate-400 border border-slate-100 p-3 rounded-xl shadow-sm btn-active">
                        <i data-lucide="file-up" class="w-5 h-5"></i>
                    </button>
                    <button id="aiBtn" onclick="analyzeWithGemini()" class="bg-indigo-600 text-white p-3 rounded-xl shadow-lg btn-active transition-all">
                        <i data-lucide="wand-2" id="aiBtnIcon" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Manual Data Grid -->
        <div class="bg-white rounded-[2.5rem] border border-slate-100 p-6 shadow-sm space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2 space-y-1">
                    <span class="text-[10px] text-slate-400 font-black mr-1 uppercase flex items-center gap-1">
                        <i data-lucide="building-2" class="w-3 h-3"></i> شركة التوصيل
                    </span>
                    <select id="courierSelect" class="w-full bg-slate-50 border border-slate-100 rounded-xl p-3 text-sm font-bold text-indigo-700">
                        <option value="Hi Express">Hi Express (Olivery)</option>
                        <option value="Marwa">Marwa</option>
                        <option value="Lama">Lama</option>
                        <option value="Areen">Areen</option>
                        <option value="Aiait">Aiait</option>
                        <option value="توصيل يدوي">توصيل يدوي</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <span class="text-[10px] text-slate-400 font-bold mr-1">الاسم</span>
                    <input type="text" id="orderName" class="w-full bg-slate-50 border-0 rounded-xl p-3 text-sm font-bold">
                </div>
                <div class="space-y-1">
                    <span class="text-[10px] text-slate-400 font-bold mr-1">الهاتف</span>
                    <input type="tel" id="orderPhone" class="w-full bg-slate-50 border-0 rounded-xl p-3 text-sm font-bold ltr text-left">
                </div>
                <div class="space-y-1">
                    <span class="text-[10px] text-slate-400 font-bold mr-1">المدينة</span>
                    <input type="text" id="orderCity" class="w-full bg-slate-50 border-0 rounded-xl p-3 text-sm font-bold">
                </div>
                <div class="space-y-1">
                    <span class="text-[10px] text-slate-400 font-bold mr-1">السعر</span>
                    <input type="text" id="orderPrice" class="w-full bg-slate-50 border-0 rounded-xl p-3 text-sm font-black text-indigo-600">
                </div>
                <div class="col-span-2 space-y-1">
                    <span class="text-[10px] text-slate-400 font-bold mr-1">العنوان بالتفصيل</span>
                    <input type="text" id="orderAddress" class="w-full bg-slate-50 border-0 rounded-xl p-3 text-sm">
                </div>
            </div>
            <button onclick="handleSaveAction()" id="saveBtn" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-black text-sm flex items-center justify-center gap-2 shadow-lg btn-active">
                <i data-lucide="save" class="w-5 h-5"></i> <span id="saveBtnText">حفظ الطلب والطباعة</span>
            </button>
        </div>

        <!-- Sticker Preview -->
        <div class="bg-white rounded-[2rem] border border-slate-100 p-6 space-y-4 shadow-sm">
            <div class="flex justify-center">
                <div id="stickerCapture" class="w-[260px] h-[260px] bg-white text-black p-6 relative border border-slate-100 flex flex-col justify-between shadow-xl sticker-font rounded-sm" dir="rtl">
                    <div class="flex justify-between items-start border-b border-slate-50 pb-2">
                        <span class="text-[8px] font-black border-2 border-black px-1 leading-none uppercase">Original Label</span>
                        <p id="previewCourier" class="text-[10px] font-black uppercase text-indigo-600 truncate max-w-[120px]">Hi Express</p>
                    </div>
                    <div class="space-y-3 text-right py-2">
                        <div>
                            <p class="text-[8px] text-slate-400 font-bold uppercase leading-none mb-1">Customer / לקוח</p>
                            <p id="previewName" class="text-sm font-black leading-none">---</p>
                        </div>
                        <div>
                            <p class="text-[8px] text-slate-400 font-bold uppercase leading-none mb-1">Destination / יעד</p>
                            <p id="previewLocation" class="text-[11px] font-bold leading-tight">---</p>
                        </div>
                        <div class="bg-blue-50/50 p-2 rounded-lg border-r-4 border-indigo-600">
                            <p id="previewDetails" class="text-[13px] font-black text-blue-900 leading-tight">مستعد للتحليل...</p>
                        </div>
                    </div>
                    <div class="flex justify-between items-end border-t border-slate-50 pt-2">
                        <div class="w-12 h-12 bg-slate-50 flex items-center justify-center border border-slate-100 opacity-20">
                            <i data-lucide="qr-code" class="w-8 h-8"></i>
                        </div>
                        <div class="text-right leading-none">
                            <p class="text-2xl font-black"><span id="previewPrice">0</span> ₪</p>
                            <p id="previewId" class="text-[7px] font-mono text-slate-300 mt-1 uppercase">PRNT-XXXXX</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- History Section -->
        <div class="space-y-4 pt-4">
            <div class="flex items-center justify-between px-2">
                <h3 class="font-black text-xl flex items-center gap-2 text-slate-800">
                    <i data-lucide="list" class="text-indigo-600"></i> سجل الطلبات
                </h3>
                <span id="orderCount" class="text-xs font-bold bg-white border border-slate-100 px-4 py-1.5 rounded-full text-slate-400 shadow-sm">0 طلب</span>
            </div>
            <div id="orderHistoryList" class="space-y-4"></div>
        </div>
    </div>

    <!-- AI Chat Assistant -->
    <div id="aiChat" class="fixed bottom-6 right-6 z-[100] flex flex-col items-end">
        <div id="chatWindow" class="hidden mb-4 w-[340px] h-[500px] bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 flex flex-col overflow-hidden">
            <div class="bg-indigo-600 p-5 flex items-center justify-between text-white font-bold">
                <div class="flex items-center gap-2"><i data-lucide="bot" class="w-6 h-6"></i> مساعد MAD</div>
                <button onclick="toggleChat()"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div id="chatMessages" class="flex-grow overflow-y-auto p-5 space-y-4 bg-slate-50/50 no-scrollbar"></div>
            <div class="p-4 bg-white border-t border-slate-100 flex gap-3">
                <input type="text" id="chatInput" class="flex-grow bg-slate-50 border-0 rounded-2xl p-3 text-xs" placeholder="اسأل المساعد...">
                <button onclick="askAIAssistant()" class="bg-indigo-600 text-white p-3 rounded-2xl active:scale-90"><i data-lucide="send" class="w-5 h-5"></i></button>
            </div>
        </div>
        <button onclick="toggleChat()" class="p-4 bg-indigo-600 text-white rounded-full shadow-2xl active:scale-90 flex items-center justify-center">
            <i data-lucide="message-square" class="w-7 h-7"></i>
        </button>
    </div>

    <script>
        const apiKey = "";
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzXDBGY0PTODQR0CW2btQtBHRsqbUfrl3nYx2GTNKmF4LN_8itoWGTS7KDwfU7DL5GS3w/exec";
        const SECRET_KEY = "12345678";
        let orders = [];
        let editingRow = null;

        // --- CORE FETCH WITH RETRY ---
        async function fetchWithRetry(url, options = {}, retries = 5, backoff = 1000) {
            try {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                return response;
            } catch (error) {
                if (retries <= 0) throw error;
                await new Promise(res => setTimeout(res, backoff));
                return fetchWithRetry(url, options, retries - 1, backoff * 2);
            }
        }

        window.onload = () => {
            lucide.createIcons();
            fetchOrders();
            ['orderName', 'orderCity', 'orderAddress', 'orderPrice', 'courierSelect'].forEach(id => {
                document.getElementById(id).addEventListener('input', updatePreview);
            });
        };

        function updatePreview() {
            document.getElementById('previewName').innerText = document.getElementById('orderName').value || '---';
            document.getElementById('previewLocation').innerText = `${document.getElementById('orderCity').value} ${document.getElementById('orderAddress').value}`.trim() || '---';
            document.getElementById('previewPrice').innerText = document.getElementById('orderPrice').value || '0';
            document.getElementById('previewCourier').innerText = document.getElementById('courierSelect').value;
        }

        async function fetchOrders() {
            const icon = document.getElementById('refreshIcon');
            icon.classList.add('animate-spin');
            try {
                const res = await fetchWithRetry(`${GAS_WEBAPP_URL}?key=${SECRET_KEY}&action=get`);
                const data = await res.json();
                if (Array.isArray(data)) {
                    orders = data.sort((a, b) => (b.rowIndex || 0) - (a.rowIndex || 0));
                    renderOrders();
                }
            } catch (e) { showStatus('error', 'فشل تحديث البيانات'); }
            icon.classList.remove('animate-spin');
        }

        function renderOrders() {
            const list = document.getElementById('orderHistoryList');
            document.getElementById('orderCount').innerText = `${orders.length} طلب`;
            list.innerHTML = orders.length === 0 ? '<div class="text-center py-10 text-slate-300 italic">لا توجد سجلات...</div>' : '';
            
            orders.forEach(order => {
                const card = document.createElement('div');
                card.className = `bg-white border rounded-[2rem] p-5 space-y-4 shadow-sm relative transition-all ${editingRow === order.rowIndex ? 'border-indigo-500 ring-4 ring-indigo-50' : 'border-slate-100'}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="text-sm font-black text-slate-900">${order.name || '---'}</h4>
                            <p class="text-[10px] text-slate-400 font-bold flex items-center gap-1 mt-1">
                                <i data-lucide="map-pin" class="w-3 h-3 text-indigo-400"></i> ${order.city || ''}
                            </p>
                        </div>
                        <div class="px-2.5 py-1 rounded-lg text-[9px] font-black ${order.Status?.includes('بالطريق') ? 'bg-emerald-50 text-emerald-600' : 'bg-indigo-50 text-indigo-600'}">
                            ${order.Status || 'NEW'}
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-[10px] font-bold border-t border-slate-50 pt-3 text-slate-500">
                        <div><i data-lucide="phone" class="w-3 h-3 inline mr-1"></i> ${order.phone || ''}</div>
                        <div class="text-indigo-600"><i data-lucide="coins" class="w-3 h-3 inline mr-1"></i> ₪${order.price || '0'}</div>
                    </div>
                    <div class="grid grid-cols-2 gap-2 pt-1">
                        <button onclick="generatePDFForOrder(${order.rowIndex})" class="bg-slate-50 py-3 rounded-xl border border-slate-100 font-bold text-[10px] btn-active">طباعة ملصق</button>
                        <button onclick="openWhatsApp('${order.phone}')" class="bg-emerald-50 text-emerald-700 py-3 rounded-xl border border-emerald-100 font-bold text-[10px] btn-active">واتساب</button>
                        <button onclick="initiateEdit(${order.rowIndex})" class="bg-indigo-50 text-indigo-700 py-3 rounded-xl border border-indigo-100 font-bold text-[10px] btn-active">تعديل</button>
                        <button onclick="handleDelete(${order.rowIndex})" class="bg-rose-50 text-rose-600 py-3 rounded-xl border border-rose-100 font-bold text-[10px] btn-active">حذف</button>
                    </div>
                    ${!order.delivery_order_id ? `
                    <button onclick="handleDelivery(${order.rowIndex})" class="w-full bg-emerald-600 text-white py-3.5 rounded-2xl text-[11px] font-black shadow-lg btn-active">
                        <i data-lucide="truck" class="w-4 h-4 inline mr-1"></i> إرسال لـ ${order.delivery || 'الشحن'}
                    </button>` : `<div class="bg-slate-50 rounded-xl p-2.5 text-center text-[9px] font-mono text-slate-400 border border-dashed tracking-tighter">رقم التتبع: ${order.delivery_order_id}</div>`}
                `;
                list.appendChild(card);
            });
            lucide.createIcons();
        }

        // --- AI LOGIC ---
        async function analyzeWithGemini(fileData = null) {
            const text = document.getElementById('aiInput').value;
            if (!text && !fileData) return;
            
            const btn = document.getElementById('aiBtn');
            const icon = document.getElementById('aiBtnIcon');
            btn.disabled = true;
            icon.classList.add('animate-spin');
            showStatus('success', 'جاري تحليل البيانات...');

            const systemPrompt = "Return ONLY a JSON object with keys: name, phone, address, city, details_hebrew, price. Translate details to Hebrew. If missing, use empty string.";
            const contents = [{ parts: [{ text: `${systemPrompt}\n\nCONTENT: ${text}` }] }];
            if (fileData) contents[0].parts.push({ inlineData: { mimeType: "application/pdf", data: fileData } });

            try {
                const res = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents })
                });
                const result = await res.json();
                const aiResponse = result.candidates[0].content.parts[0].text;
                const jsonMatch = aiResponse.match(/\{[\s\S]*\}/);
                
                if (jsonMatch) {
                    const data = JSON.parse(jsonMatch[0]);
                    document.getElementById('orderName').value = data.name || '';
                    document.getElementById('orderPhone').value = data.phone || '';
                    document.getElementById('orderCity').value = data.city || '';
                    document.getElementById('orderAddress').value = data.address || '';
                    document.getElementById('orderPrice').value = data.price || '';
                    document.getElementById('previewDetails').innerText = data.details_hebrew || '---';
                    updatePreview();
                    showStatus('success', 'تم التحليل بنجاح');
                }
            } catch (e) { showStatus('error', 'فشل التحليل الذكي'); }
            btn.disabled = false;
            icon.classList.remove('animate-spin');
        }

        async function handleSaveAction() {
            const data = {
                key: SECRET_KEY,
                action: editingRow ? 'updateOrder' : 'addOrder',
                name: document.getElementById('orderName').value,
                phone: document.getElementById('orderPhone').value,
                city: document.getElementById('orderCity').value,
                address: document.getElementById('orderAddress').value,
                price: document.getElementById('orderPrice').value,
                delivery: document.getElementById('courierSelect').value,
                offer: document.getElementById('previewDetails').innerText,
                orderId: document.getElementById('previewId').innerText,
                row: editingRow
            };

            showStatus('success', 'جاري المزامنة...');
            try {
                await fetchWithRetry(GAS_WEBAPP_URL, { 
                    method: 'POST', 
                    body: JSON.stringify(data),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                showStatus('success', 'تم الحفظ!');
                resetForm();
                fetchOrders();
            } catch (e) { showStatus('error', 'فشل الإرسال للجدول'); }
        }

        async function handleDelivery(row) {
            showStatus('success', 'جاري إرسال الطلب...');
            try {
                const res = await fetchWithRetry(GAS_WEBAPP_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ key: SECRET_KEY, action: 'sendToDelivery', row: row }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                const result = await res.json();
                if (result.result === 'SUCCESS') showStatus('success', 'تم الشحن بنجاح!');
                else showStatus('error', result.message || 'فشل الشحن');
                fetchOrders();
            } catch (e) { showStatus('error', 'خطأ في الربط'); }
        }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = () => analyzeWithGemini(reader.result.split(',')[1]);
                reader.readAsDataURL(file);
            }
        }

        // --- UTILS ---
        function showStatus(type, msg) {
            const alert = document.getElementById('statusAlert');
            const icon = document.getElementById('statusIcon');
            const text = document.getElementById('statusMsg');
            alert.className = `p-4 rounded-2xl flex items-center gap-3 text-xs font-bold border transition-all shadow-sm ${type === 'success' ? 'bg-emerald-50 text-emerald-700 border-emerald-100' : 'bg-rose-50 text-rose-700 border-rose-100'}`;
            icon.setAttribute('data-lucide', type === 'success' ? 'check-circle-2' : 'alert-circle');
            text.innerText = msg;
            alert.classList.remove('hidden');
            lucide.createIcons();
            setTimeout(() => alert.classList.add('hidden'), 5000);
        }

        function initiateEdit(row) {
            const order = orders.find(o => o.rowIndex === row);
            if (!order) return;
            editingRow = row;
            document.getElementById('orderName').value = order.name || '';
            document.getElementById('orderPhone').value = order.phone || '';
            document.getElementById('orderCity').value = order.city || '';
            document.getElementById('orderAddress').value = order.address || '';
            document.getElementById('orderPrice').value = order.price || '';
            document.getElementById('courierSelect').value = order.delivery || 'Hi Express';
            document.getElementById('previewDetails').innerText = order.offer || '---';
            document.getElementById('modeTitle').innerText = `تعديل طلب #${row}`;
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            updatePreview();
        }

        function cancelEdit() {
            editingRow = null;
            resetForm();
            document.getElementById('modeTitle').innerText = `إضافة طلب جديد`;
            document.getElementById('cancelEditBtn').classList.add('hidden');
        }

        function resetForm() {
            ['orderName', 'orderPhone', 'orderCity', 'orderAddress', 'orderPrice', 'aiInput'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('previewDetails').innerText = 'مستعد...';
            updatePreview();
        }

        function openWhatsApp(phone) { window.open(`https://wa.me/${phone.replace(/\D/g, '')}`, '_blank'); }

        function toggleChat() { document.getElementById('chatWindow').classList.toggle('hidden'); }

        async function askAIAssistant() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg) return;
            const chat = document.getElementById('chatMessages');
            chat.innerHTML += `<div class="flex justify-start"><div class="p-3 bg-white border rounded-2xl text-xs">${msg}</div></div>`;
            input.value = '';
            try {
                const context = JSON.stringify(orders.slice(0, 10));
                const res = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `أنت مساعد MAD. الطلبات الحالية: ${context}. السؤال: ${msg}. أجب باختصار بالعربية.` }] }] })
                });
                const result = await res.json();
                chat.innerHTML += `<div class="flex justify-end"><div class="p-3 bg-indigo-600 text-white rounded-2xl text-xs">${result.candidates[0].content.parts[0].text}</div></div>`;
                chat.scrollTop = chat.scrollHeight;
            } catch (e) { }
        }

        async function generatePDFForOrder(row) {
            const order = orders.find(o => o.rowIndex === row);
            if (!order) return;
            document.getElementById('previewName').innerText = order.name || '';
            document.getElementById('previewLocation').innerText = `${order.city || ''} ${order.address || ''}`;
            document.getElementById('previewPrice').innerText = order.price || '0';
            document.getElementById('previewDetails').innerText = order.offer || '---';
            try {
                const canvas = await html2canvas(document.getElementById('stickerCapture'), { scale: 3 });
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({ orientation: 'p', unit: 'mm', format: [100, 100] });
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 100, 100);
                pdf.save(`MAD-${order.name || row}.pdf`);
            } catch (e) { showStatus('error', 'فشل الطباعة'); }
            updatePreview();
        }
    </script>
</body>
</html>
