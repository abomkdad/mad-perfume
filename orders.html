<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxaA4Wc7cEyU6gx-MzuA_C8psZPuWCLmIJ9TPjnqX_RGG4SDQR0Jeeqcnf85Q65NdlK/exec";
const DASH_KEY = "12345678";

const CUSTOMER_SERVICE_PHONE = "972524033442";
const CUSTOMER_SERVICE_STAR = "*9935";

let allOrders = [];
let editingRow = null;

function showLoading(s) { document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; }
function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2500); }
const safe = (v) => (v === undefined || v === null || String(v).toLowerCase() === "undefined" || String(v).toLowerCase() === "null") ? "" : String(v).trim();

function formatLocalPhone(p) {
  if (!p) return "";
  let d = String(p).replace(/\D/g, "");
  if (d.startsWith("972")) d = "0" + d.substring(3);
  if (!d.startsWith("0") && d.length === 9) d = "0" + d;
  return d;
}
function normalizePhoneForLink(p) {
  let d = String(p || "").replace(/\D/g, "");
  if (d.startsWith("0")) d = "972" + d.substring(1);
  if (!d.startsWith("972") && d.length === 9) d = "972" + d;
  return d;
}

function analyzeText() {
  const raw = document.getElementById('smartInput').value;
  if (!raw.trim()) return showToast("الصق نصاً أولاً");

  const phoneMatch = raw.match(/(?:05|972|5)\d{8,11}/);
  if (phoneMatch) document.getElementById('f_phone').value = formatLocalPhone(phoneMatch[0]);

  const priceMatch = raw.match(/(\d{2,4})\s*(?:₪|shekel|ILS|السعر)/i) || raw.match(/(?:₪|السعر|Price)\s*:?\s*(\d{2,4})/i);
  if (priceMatch) document.getElementById('f_price').value = priceMatch[1];

  const nameMatch = raw.match(/(?:الاسم|Name)\s*:?\s*([^\n|]+)/i);
  if (nameMatch) document.getElementById('f_name').value = nameMatch[1].trim();
  else {
    const firstLine = raw.split('\n')[0].trim();
    if (firstLine.length < 30) document.getElementById('f_name').value = firstLine;
  }

  const cityMatch = raw.match(/(?:المدينة|city|عنوان|من)\s*:?\s*([^\n|]+)/i);
  if (cityMatch) document.getElementById('f_city').value = cityMatch[1].trim();

  document.getElementById('f_offer').value = raw.substring(0, 100).trim();
  showToast("تم تحليل البيانات بنجاح ⚡");
}

async function load() {
  showLoading(true);
  try {
    const res = await fetch(`${SCRIPT_URL}?action=get&key=${encodeURIComponent(DASH_KEY)}&_=${Date.now()}`);
    const data = await res.json();
    if (data && data.result === "ERROR") throw new Error(data.message || "ERROR");
    allOrders = Array.isArray(data) ? data : [];
    renderOrders(allOrders);
  } catch(e) {
    showToast("خطأ في جلب البيانات");
    document.getElementById('ordersList').innerHTML =
      `<div style="text-align:center; padding:50px; color:var(--muted);">تعذّر تحميل الطلبات</div>`;
  }
  showLoading(false);
}

function filterOrders() {
  const term = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allOrders.filter(o => {
    const n = safe(o.name).toLowerCase();
    const p = safe(o.phone);
    return n.includes(term) || p.includes(term) || formatLocalPhone(p).includes(term);
  });
  renderOrders(filtered);
}

function renderOrders(list) {
  const container = document.getElementById('ordersList');
  if (!list || list.length === 0) {
    container.innerHTML = `<div style="text-align:center; padding:50px; color:var(--muted);">لا توجد طلبات لعرضها</div>`;
    return;
  }

  const reversedList = [...list].filter(o => o.rowIndex).reverse();

  container.innerHTML = reversedList.map(o => {
    const isPrep = (o.status || "").includes("تجهيز") || (o.status || "").includes("الإرسال");
    const deliveryId = safe(o.delivery_order_id);
    return `
      <div class="order-card">
        <div class="card-header">
          <small class="order-id">#${safe(o.orderId) || '---'}</small>
          <span class="status-pill ${isPrep ? 'status-prep' : 'status-new'}">${safe(o.status) || 'جديد'}</span>
        </div>

        <div onclick="openEditModal(${o.rowIndex})" style="cursor:pointer;">
          <span class="customer-name">${safe(o.name) || "—"}</span>
          <div class="customer-phone"><i class="fa fa-phone"></i> ${formatLocalPhone(o.phone) || "—"}</div>

          <div class="offer-details">${safe(o.offer) || "—"}</div>

          <div class="meta-line">
            <span class="meta-tag">📍 ${safe(o.city) || "—"}</span>
            <span class="meta-tag">₪${safe(o.price) || "—"}</span>
            <span class="meta-tag">💳 ${safe(o.payment) || "—"}</span>
            <span class="meta-tag">🚚 ${safe(o.delivery) || "—"}</span>
            ${deliveryId ? `<span class="meta-tag">🧾 شحنة: ${deliveryId}</span>` : ``}
          </div>
        </div>

        <div class="actions-grid">
          <button class="btn btn-wa-ar" onclick="sendMsg(${o.rowIndex}, 'ar')"><i class="fa-brands fa-whatsapp"></i><span>عربي</span></button>
          <button class="btn btn-wa-he" onclick="sendMsg(${o.rowIndex}, 'he')"><i class="fa-brands fa-whatsapp"></i><span>עברית</span></button>
          <button class="btn btn-success" onclick="approve(${o.rowIndex})"><i class="fa fa-check"></i><span>اعتماد</span></button>
          <button class="btn btn-outline" onclick="openEditModal(${o.rowIndex})"><i class="fa fa-edit"></i><span>تعديل</span></button>
        </div>

        <div class="actions-secondary">
          <button class="btn btn-outline" onclick="openPrintModal(${o.rowIndex}, 'ar')"><i class="fa fa-print"></i><span>وصل ع</span></button>
          <button class="btn btn-outline" onclick="openPrintModal(${o.rowIndex}, 'he')"><i class="fa fa-print"></i><span>وصل هـ</span></button>
          <button class="btn btn-outline" onclick="sendToDelivery(${o.rowIndex})"><i class="fa fa-truck"></i><span>شحن</span></button>
        </div>
      </div>`;
  }).join('');
}

async function sendMsg(row, lang) {
  const o = allOrders.find(x => x.rowIndex == row);
  if(!o) return;

  const E = {
    blackHeart: "\u{1F5A4}",
    diamond: "\u{1F48E}",
    pin: "\u{1F4CD}",
    money: "\u{1F4B0}",
    card: "\u{1F4B3}",
    truck: "\u{1F69A}",
    memo: "\u{1F4DD}",
    phone: "\u{1F4DE}",
    wave: "\u{1F44B}",
    box: "\u{1F4E6}",
    info: "\u{2139}\u{FE0F}",
    link: "\u{1F517}"
  };

  const paymentMethod = safe(o.payment) || (lang === "he" ? "תשלום במעמד המסירה" : "دفع عند الاستلام");

  const noteTxt = safe(o.notes)
    ? (lang === "he" ? `\n${E.memo} הערה: ${safe(o.notes)}` : `\n${E.memo} ملاحظة: ${safe(o.notes)}`)
    : "";

  const deliveryTxt = safe(o.delivery)
    ? (lang === "he" ? `\n${E.truck} חברת משלוח: ${safe(o.delivery)}` : `\n${E.truck} شركة التوصيل: ${safe(o.delivery)}`)
    : "";

  const serviceWaLink = `https://wa.me/${CUSTOMER_SERVICE_PHONE}`;
  const telStarLink = `tel:${CUSTOMER_SERVICE_STAR}`;

  const contactBlock = (lang === "he")
    ? `\n${E.phone} שירות לקוחות: ${CUSTOMER_SERVICE_PHONE}\n${E.link} WhatsApp: ${serviceWaLink}\n${E.phone} קו נוסף: ${CUSTOMER_SERVICE_STAR}\n${E.link} חיוג: ${telStarLink}`
    : `\n${E.phone} خدمة العملاء: ${CUSTOMER_SERVICE_PHONE}\n${E.link} واتساب مباشر: ${serviceWaLink}\n${E.phone} رقم إضافي: ${CUSTOMER_SERVICE_STAR}\n${E.link} اتصال: ${telStarLink}`;

  const supportLine = (lang === "he")
    ? `\n${E.info} לשינוי ההזמנה או להוספת הערות לחברת המשלוחים – אפשר לפנות אלינו.`
    : `\n${E.info} لتعديل الطلب أو إضافة ملاحظات لشركة التوصيل يمكن التواصل معنا.`;

  const msg = (lang === "ar")
    ? `أهلاً بك ${safe(o.name)} في MAD Parfumeur ${E.blackHeart}
يسعدنا تأكيد طلبك المميز!
${E.diamond} العرض: ${safe(o.offer)}
${E.pin} العنوان: ${safe(o.city)}
${E.money} السعر: ${safe(o.price)} ₪
${E.card} الدفع: ${paymentMethod}${deliveryTxt}${noteTxt}${contactBlock}${supportLine}`
    : `שלום ${safe(o.name)} ${E.wave}, תודה שהזמנת מ-MAD Parfumeur
${E.box} המוצר: ${safe(o.offer)}
${E.pin} כתובת: ${safe(o.city)}
${E.money} מחיר: ${safe(o.price)} ₪
${E.card} תשלום: ${paymentMethod}${deliveryTxt}${noteTxt}${contactBlock}${supportLine}`;

  const wa = `https://wa.me/${normalizePhoneForLink(o.phone)}?text=${encodeURIComponent(msg)}`;
  window.open(wa, "_blank");
}

async function approve(row) {
  showLoading(true);
  const o = allOrders.find(x => x.rowIndex == row);
  if(!o) { showLoading(false); return; }

  const p = new URLSearchParams({
    action: "updateOrder", key: DASH_KEY, row: row,
    offer: safe(o.offer), name: safe(o.name), phone: safe(o.phone),
    city: safe(o.city), notes: safe(o.notes),
    delivery: safe(o.delivery), payment: safe(o.payment), price: safe(o.price),
    address: safe(o.address || ""),
    status: "بانتظار الإرسال للتجهيز"
  });

  try {

    showLoading(false);

}

    row: isAdd ? "" : editingRow,

  };

  try {

async function downloadPdfLabel() {
  const el = document.getElementById("invoicePreview");
  if (!el) return;

  showLoading(true);
  try {
    const { jsPDF } = window.jspdf;
    const canvas = await html2canvas(el, {
      scale: 3,
      backgroundColor: "#ffffff",
      useCORS: true
    });

    const img = canvas.toDataURL("image/png");
    const pdf = new jsPDF({
      orientation: "portrait",
      unit: "mm",
      format: [100, 100]
    });

    pdf.addImage(img, "PNG", 0, 0, 100, 100);

    const ord = (document.getElementById("p_ord").textContent || "MAD-Label")
      .replace(/[^\w\-]+/g, "_");

    pdf.save(`${ord}_10x10.pdf`);
    showToast("تم تنزيل PDF ✅");
  } catch (e) {
    showToast("فشل تنزيل PDF");
  }
  showLoading(false);
}
