<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAD Print Manager | نظام الطباعة واللوجستيات</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- jsPDF & html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
        .sticker-font { font-family: sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-700 pb-20">

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-slate-100 p-4 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 p-1.5 rounded-lg shadow-md shadow-indigo-100">
                <i data-lucide="printer" class="text-white w-5 h-5"></i>
            </div>
            <h1 class="text-lg font-black tracking-tight text-slate-900">MAD <span class="text-indigo-600">PRINT</span></h1>
        </div>
        <button onclick="fetchOrders()" class="bg-slate-50 p-2 rounded-full border border-slate-100 text-slate-400 active:rotate-180 transition-transform duration-500">
            <i data-lucide="refresh-ccw" id="refreshIcon" class="w-5 h-5"></i>
        </button>
    </nav>

    <div class="p-4 space-y-6 max-w-lg mx-auto">
        
        <!-- Status Alert -->
        <div id="statusAlert" class="hidden p-3 rounded-2xl flex items-center gap-2 text-xs font-bold border transition-all shadow-sm">
            <i id="statusIcon" class="w-4 h-4"></i>
            <span id="statusMsg"></span>
        </div>

        <!-- Action Mode Card -->
        <div id="modeIndicator" class="bg-white border-slate-100 p-4 rounded-[2rem] border shadow-sm flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div id="modeIconBox" class="p-2.5 rounded-2xl bg-slate-50 text-slate-400">
                    <i id="modeIcon" data-lucide="plus-circle" class="w-5 h-5"></i>
                </div>
                <div>
                    <p id="modeTitle" class="text-sm font-black text-slate-700">إضافة طلب جديد</p>
                    <p class="text-[10px] text-slate-400 font-medium">نظام الربط الذكي مع Hi Express</p>
                </div>
            </div>
            <button id="cancelEditBtn" onclick="cancelEdit()" class="hidden text-[10px] font-bold text-indigo-600 hover:underline">إلغاء</button>
        </div>

        <!-- AI Analysis Input -->
        <div class="space-y-3">
            <label class="text-xs font-black flex items-center gap-2 text-indigo-600 mr-1">
                <i data-lucide="wand-2" class="w-4 h-4"></i>
                بوكس الذكاء الاصطناعي (نص أو PDF)
            </label>
            <div class="relative group">
                <textarea
                    id="aiInput"
                    class="w-full h-28 bg-white border border-slate-200 rounded-[2rem] p-4 text-sm focus:ring-4 focus:ring-indigo-50 focus:border-indigo-500 focus:outline-none transition-all placeholder:text-slate-300 shadow-sm"
                    placeholder="ألصق رسالة واتساب هنا للتحليل التلقائي..."
                ></textarea>
                <div class="absolute bottom-3 left-3 flex gap-2">
                    <input type="file" id="pdfFileInput" accept="application/pdf" class="hidden" onchange="handleFileUpload(event)">
                    <button onclick="document.getElementById('pdfFileInput').click()" class="bg-white text-slate-400 border border-slate-100 p-3 rounded-xl shadow-sm hover:text-indigo-600 transition-all">
                        <i data-lucide="file-up" class="w-5 h-5"></i>
                    </button>
                    <button onclick="analyzeWithGemini()" class="bg-indigo-600 text-white p-3 rounded-xl shadow-lg shadow-indigo-100 active:scale-95 transition-all">
                        <i data-lucide="wand-2" id="aiBtnIcon" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Manual Data Grid -->
        <div class="bg-white rounded-[2.5rem] border border-slate-100 p-5 shadow-sm space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div class="col-span-2 space-y-1">
                    <span class="text-[10px] text-slate-400 font-black mr-1 uppercase flex items-center gap-1">
                        <i data-lucide="building-2" class="w-3 h-3"></i> شركة التوصيل
                    </span>
                    <select id="courierSelect" class="w-full bg-slate-50 border border-slate-100 rounded-xl p-3 text-sm font-bold text-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-100">
                        <option value="Hi Express">Hi Express (Olivery)</option>
                        <option value="Marwa">Marwa</option>
                        <option value="Lama">Lama</option>
                        <option value="Areen">Areen</option>
                        <option value="Aiait">Aiait</option>
                        <option value="توصيل يدوي">توصيل يدوي</option>
                    </select>
                </div>
                <input type="text" id="orderName" placeholder="الاسم الكامل" class="bg-slate-50 border-0 rounded-xl p-3 text-sm font-bold">
                <input type="tel" id="orderPhone" placeholder="الهاتف" class="bg-slate-50 border-0 rounded-xl p-3 text-sm font-bold ltr text-left">
                <input type="text" id="orderCity" placeholder="المدينة" class="bg-slate-50 border-0 rounded-xl p-3 text-sm font-bold">
                <input type="text" id="orderPrice" placeholder="السعر ₪" class="bg-slate-50 border-0 rounded-xl p-3 text-sm font-black text-indigo-600">
                <input type="text" id="orderAddress" placeholder="العنوان بالتفصيل" class="col-span-2 bg-slate-50 border-0 rounded-xl p-3 text-sm">
            </div>
            <button onclick="handleSaveAction()" id="saveBtn" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-black text-sm flex items-center justify-center gap-2 shadow-lg shadow-slate-200 active:scale-95 transition-all">
                <i data-lucide="save" class="w-5 h-5"></i> <span>حفظ الطلب والطباعة</span>
            </button>
        </div>

        <!-- Sticker Preview -->
        <div class="bg-white rounded-[2rem] border border-slate-100 p-5 space-y-4 shadow-sm overflow-hidden">
            <div class="flex items-center justify-between">
                <h3 class="text-[10px] font-black text-slate-300 tracking-widest uppercase italic">Label Preview (10x10)</h3>
            </div>
            <div class="flex justify-center">
                <div id="stickerCapture" class="w-[240px] h-[240px] bg-white text-black p-5 relative border border-slate-100 flex flex-col justify-between shadow-xl sticker-font" dir="rtl">
                    <div class="flex justify-between items-start border-b border-slate-50 pb-2">
                        <span class="text-[7px] font-black border border-black px-1 leading-none">PRNT_MODE</span>
                        <p id="previewCourier" class="text-[9px] font-black uppercase text-indigo-600 truncate max-w-[100px]">Hi Express</p>
                    </div>
                    <div class="space-y-2 text-right py-2">
                        <div>
                            <p class="text-[8px] text-slate-400 font-bold uppercase mb-0.5">Customer / לקוח</p>
                            <p id="previewName" class="text-sm font-black leading-none">---</p>
                        </div>
                        <div>
                            <p class="text-[8px] text-slate-400 font-bold uppercase mb-0.5">Location / יעד</p>
                            <p id="previewLocation" class="text-[10px] font-bold leading-tight">---</p>
                        </div>
                        <div class="bg-indigo-50/50 p-2 rounded-lg border-r-4 border-indigo-600">
                            <p id="previewDetails" class="text-[12px] font-black text-indigo-900 leading-tight">مמתין לנתונים...</p>
                        </div>
                    </div>
                    <div class="flex justify-between items-end border-t border-slate-50 pt-1">
                        <div class="w-10 h-10 bg-slate-50 flex items-center justify-center border border-slate-100 opacity-20">
                            <i data-lucide="qr-code" class="w-6 h-6"></i>
                        </div>
                        <div class="text-right leading-none">
                            <p class="text-xl font-black"><span id="previewPrice">0</span> ₪</p>
                            <p id="previewId" class="text-[6px] font-mono text-slate-300 mt-1 uppercase tracking-tighter">PRNT-XXXXX</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- History Section -->
        <div class="space-y-4 pt-4">
            <div class="flex items-center justify-between px-2">
                <h3 class="font-black text-lg flex items-center gap-2 text-slate-800">
                    <i data-lucide="list" class="text-indigo-600"></i> سجل الطلبات
                </h3>
                <span id="orderCount" class="text-[10px] font-bold bg-white border px-3 py-1 rounded-full text-slate-400 shadow-sm">0 طلب</span>
            </div>
            <div id="orderHistoryList" class="space-y-4">
                <!-- Orders will be injected here -->
            </div>
        </div>
    </div>

    <!-- AI Chat Assistant -->
    <div id="aiChat" class="fixed bottom-6 right-6 z-[100] flex flex-col items-end">
        <div id="chatWindow" class="hidden mb-4 w-[320px] h-[450px] bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 flex flex-col overflow-hidden animate-in slide-in-from-bottom-5">
            <div class="bg-indigo-600 p-4 flex items-center justify-between text-white">
                <div class="flex items-center gap-2">
                    <i data-lucide="bot" class="w-5 h-5"></i>
                    <span class="font-bold text-sm">مساعد MAD الذكي</span>
                </div>
                <button onclick="toggleChat()" class="hover:bg-white/20 p-1 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div id="chatMessages" class="flex-grow overflow-y-auto p-4 space-y-3 bg-slate-50/50 no-scrollbar">
                <div class="flex justify-end">
                    <div class="max-w-[85%] p-3 rounded-2xl text-[11px] leading-relaxed shadow-sm bg-indigo-500 text-white rounded-bl-none">
                        أهلاً بك! كيف يمكنني مساعدتك في إدارة طلباتك اليوم؟
                    </div>
                </div>
            </div>
            <div class="p-3 bg-white border-t border-slate-50 flex gap-2">
                <input type="text" id="chatInput" class="flex-grow bg-slate-50 border-0 rounded-xl p-2.5 text-xs focus:ring-2 focus:ring-indigo-100" placeholder="اسألني عن إحصائيات الطلبات...">
                <button onclick="askAIAssistant()" class="bg-indigo-600 text-white p-2.5 rounded-xl active:scale-90"><i data-lucide="send" class="w-5 h-5"></i></button>
            </div>
        </div>
        <button onclick="toggleChat()" class="p-4 bg-indigo-600 text-white rounded-full shadow-2xl shadow-indigo-300 active:scale-90 transition-all flex items-center justify-center relative">
            <i data-lucide="message-square" id="chatBtnIcon" class="w-6 h-6"></i>
            <span class="absolute -top-1 -right-1 bg-rose-500 w-3 h-3 rounded-full border-2 border-white"></span>
        </button>
    </div>

    <script>
        // CONFIGURATION
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzXDBGY0PTODQR0CW2btQtBHRsqbUfrl3nYx2GTNKmF4LN_8itoWGTS7KDwfU7DL5GS3w/exec";
        const SECRET_KEY = "12345678";
        const GEMINI_API_KEY = ""; // سيتم استخدام المفتاح المدمج بالبيئة

        let orders = [];
        let editingRow = null;
        let isChatOpen = false;

        // INITIALIZATION
        window.onload = () => {
            lucide.createIcons();
            fetchOrders();
            setupLivePreview();
        };

        // UI SYNC
        function setupLivePreview() {
            const fields = ['orderName', 'orderCity', 'orderAddress', 'orderPrice', 'courierSelect'];
            fields.forEach(id => {
                document.getElementById(id).addEventListener('input', updatePreview);
            });
        }

        function updatePreview() {
            document.getElementById('previewName').innerText = document.getElementById('orderName').value || '---';
            document.getElementById('previewLocation').innerText = (document.getElementById('orderCity').value + ' ' + document.getElementById('orderAddress').value).trim() || '---';
            document.getElementById('previewPrice').innerText = document.getElementById('orderPrice').value || '0';
            document.getElementById('previewCourier').innerText = document.getElementById('courierSelect').value;
        }

        // FETCH ORDERS
        async function fetchOrders() {
            const icon = document.getElementById('refreshIcon');
            icon.classList.add('animate-spin');
            try {
                const response = await fetch(`${GAS_WEBAPP_URL}?key=${SECRET_KEY}&action=get`);
                const data = await response.json();
                if (Array.isArray(data)) {
                    orders = data.sort((a, b) => b.rowIndex - a.rowIndex);
                    renderOrders();
                }
            } catch (e) { showStatus('error', 'فشل جلب البيانات'); }
            icon.classList.remove('animate-spin');
        }

        function renderOrders() {
            const list = document.getElementById('orderHistoryList');
            const count = document.getElementById('orderCount');
            count.innerText = `${orders.length} طلب`;
            list.innerHTML = orders.length === 0 ? '<div class="text-center py-10 text-slate-300 text-sm italic">لا توجد طلبات...</div>' : '';
            
            orders.forEach(order => {
                const card = document.createElement('div');
                card.className = `bg-white border rounded-[2rem] p-5 space-y-4 shadow-sm relative transition-all ${editingRow === order.rowIndex ? 'border-indigo-400 ring-4 ring-indigo-50' : 'border-slate-100'}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="text-sm font-black text-slate-900">${order.name || 'مجهول'}</h4>
                            <p class="text-[10px] text-slate-400 font-bold flex items-center gap-1 mt-0.5">
                                <i data-lucide="map-pin" class="w-3 h-3 text-indigo-400"></i> ${order.city || ''} ${order.address || ''}
                            </p>
                        </div>
                        <div class="px-2.5 py-1 rounded-full text-[9px] font-black ${order.Status?.includes('بالطريق') ? 'bg-emerald-50 text-emerald-600' : 'bg-indigo-50 text-indigo-600'}">
                            ${order.Status || 'NEW'}
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-[11px] font-bold border-t border-slate-50 pt-3 text-slate-500">
                        <div class="flex items-center gap-2"><i data-lucide="phone" class="w-3 h-3"></i> ${order.phone || ''}</div>
                        <div class="flex items-center gap-2 text-indigo-600"><i data-lucide="coins" class="w-3 h-3"></i> ₪${order.price || '0'}</div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="generatePDFForOrder(${order.rowIndex})" class="col-span-2 bg-slate-50 text-slate-700 py-3.5 rounded-2xl border border-slate-100 flex items-center justify-center gap-2 font-bold text-xs"><i data-lucide="download" class="w-4 h-4 text-indigo-500"></i> طباعة ملصق PDF</button>
                        <button onclick="openWhatsApp('${order.phone}')" class="bg-emerald-50 text-emerald-700 py-3 rounded-xl border border-emerald-100 flex items-center justify-center gap-2 font-bold text-xs"><i data-lucide="message-circle" class="w-4 h-4"></i> واتساب</button>
                        <button onclick="initiateEdit(${order.rowIndex})" class="bg-indigo-50 text-indigo-700 py-3 rounded-xl border border-indigo-100 flex items-center justify-center gap-2 font-bold text-xs"><i data-lucide="edit-3" class="w-4 h-4"></i> تعديل</button>
                        <button onclick="handleDelete(${order.rowIndex})" class="bg-rose-50 text-rose-600 py-3 rounded-xl border border-rose-100 flex items-center justify-center gap-2 font-bold text-xs"><i data-lucide="trash-2" class="w-4 h-4"></i> حذف</button>
                        <button onclick="copyOrder('${order.name}', '${order.phone}', '${order.city}', '${order.address}', '${order.price}')" class="bg-slate-50 text-slate-600 py-3 rounded-xl border border-slate-100 flex items-center justify-center gap-2 font-bold text-xs"><i data-lucide="copy" class="w-4 h-4"></i> نسخ</button>
                    </div>
                    ${!order.delivery_order_id ? `
                    <button onclick="handleDelivery(${order.rowIndex})" class="w-full bg-emerald-600 text-white py-4 rounded-2xl text-xs font-bold flex items-center justify-center gap-2 shadow-lg shadow-emerald-50 active:scale-95">
                        <i data-lucide="truck" class="w-5 h-5"></i> <span>إرسال لـ ${order.delivery || 'الشحن'}</span>
                    </button>` : `<div class="bg-slate-50 rounded-xl p-2 text-center text-[10px] font-mono text-slate-400 border border-dashed">رقم التتبع: ${order.delivery_order_id}</div>`}
                `;
                list.appendChild(card);
            });
            lucide.createIcons();
        }

        // ACTIONS
        async function handleSaveAction() {
            const data = {
                name: document.getElementById('orderName').value,
                phone: document.getElementById('orderPhone').value,
                city: document.getElementById('orderCity').value,
                address: document.getElementById('orderAddress').value,
                price: document.getElementById('orderPrice').value,
                courier: document.getElementById('courierSelect').value,
                details_hebrew: document.getElementById('previewDetails').innerText,
                orderId: document.getElementById('previewId').innerText
            };
            
            showStatus('success', 'جاري الحفظ...');
            try {
                const action = editingRow ? 'updateOrder' : 'addOrder';
                const body = { key: SECRET_KEY, action, ...data, offer: data.details_hebrew, delivery: data.courier };
                if (editingRow) body.row = editingRow;

                await fetch(GAS_WEBAPP_URL, { method: 'POST', body: JSON.stringify(body) });
                showStatus('success', 'تم الحفظ بنجاح!');
                resetForm();
                fetchOrders();
            } catch (e) { showStatus('error', 'حدث خطأ أثناء الحفظ'); }
        }

        async function handleDelete(row) {
            if (!confirm('هل أنت متأكد من حذف هذا الطلب؟')) return;
            showStatus('success', 'جاري الحذف...');
            try {
                await fetch(GAS_WEBAPP_URL, { method: 'POST', body: JSON.stringify({ key: SECRET_KEY, action: 'deleteOrder', row }) });
                showStatus('success', 'تم الحذف');
                fetchOrders();
            } catch (e) { showStatus('error', 'فشل الحذف'); }
        }

        async function handleDelivery(row) {
            showStatus('success', 'جاري الإرسال لشركة الشحن...');
            try {
                await fetch(GAS_WEBAPP_URL, { method: 'POST', body: JSON.stringify({ key: SECRET_KEY, action: 'sendToDelivery', row }) });
                showStatus('success', 'تم الإرسال لـ Hi Express بنجاح!');
                fetchOrders();
            } catch (e) { showStatus('error', 'فشل إرسال الطلب'); }
        }

        // AI ASSISTANT
        async function analyzeWithGemini(fileData = null) {
            const text = document.getElementById('aiInput').value;
            if (!text && !fileData) return;
            
            const btn = document.getElementById('aiBtnIcon');
            btn.classList.add('animate-spin');
            showStatus('success', 'Gemini يقوم بالتحليل...');

            const prompt = `Return ONLY JSON with keys: name, phone, address, city, details_hebrew, price. Translate details to Hebrew. Text: ${text}`;
            const parts = [{ text: prompt }];
            if (fileData) parts.push({ inlineData: { mimeType: "application/pdf", data: fileData } });

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts }] })
                });
                const result = await res.json();
                const jsonText = result.candidates[0].content.parts[0].text.match(/\{[\s\S]*\}/)[0];
                const data = JSON.parse(jsonText);
                
                document.getElementById('orderName').value = data.name || '';
                document.getElementById('orderPhone').value = data.phone || '';
                document.getElementById('orderCity').value = data.city || '';
                document.getElementById('orderAddress').value = data.address || '';
                document.getElementById('orderPrice').value = data.price || '';
                document.getElementById('previewDetails').innerText = data.details_hebrew || '---';
                updatePreview();
                showStatus('success', 'تم استخراج البيانات');
            } catch (e) { showStatus('error', 'فشل التحليل الذكي'); }
            btn.classList.remove('animate-spin');
        }

        async function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => analyzeWithGemini(reader.result.split(',')[1]);
            reader.readAsDataURL(file);
        }

        // CHAT ASSISTANT
        function toggleChat() {
            const window = document.getElementById('chatWindow');
            isChatOpen = !isChatOpen;
            window.classList.toggle('hidden');
        }

        async function askAIAssistant() {
            const input = document.getElementById('chatInput');
            const msg = input.value;
            if (!msg) return;

            const chat = document.getElementById('chatMessages');
            chat.innerHTML += `<div class="flex justify-start"><div class="max-w-[85%] p-3 rounded-2xl text-[11px] bg-white border border-slate-100 rounded-br-none">${msg}</div></div>`;
            input.value = '';

            try {
                const context = JSON.stringify(orders.slice(0, 10));
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Answer in Arabic based on these orders: ${context}. User: ${msg}` }] }]
                    })
                });
                const result = await res.json();
                const reply = result.candidates[0].content.parts[0].text;
                chat.innerHTML += `<div class="flex justify-end"><div class="max-w-[85%] p-3 rounded-2xl text-[11px] bg-indigo-500 text-white rounded-bl-none">${reply}</div></div>`;
                chat.scrollTop = chat.scrollHeight;
            } catch (e) { }
        }

        // UTILS
        function initiateEdit(row) {
            const order = orders.find(o => o.rowIndex === row);
            if (!order) return;
            editingRow = row;
            document.getElementById('orderName').value = order.name || '';
            document.getElementById('orderPhone').value = order.phone || '';
            document.getElementById('orderCity').value = order.city || '';
            document.getElementById('orderAddress').value = order.address || '';
            document.getElementById('orderPrice').value = order.price || '';
            document.getElementById('courierSelect').value = order.delivery || 'Hi Express';
            document.getElementById('previewDetails').innerText = order.offer || '---';
            document.getElementById('previewId').innerText = order.orderId || 'PRNT-XXXX';
            
            document.getElementById('modeTitle').innerText = `تعديل الطلب #${row}`;
            document.getElementById('modeIconBox').className = "p-2.5 rounded-2xl bg-indigo-50 text-indigo-600";
            document.getElementById('modeIcon').setAttribute('data-lucide', 'edit-3');
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            updatePreview();
            lucide.createIcons();
        }

        function cancelEdit() {
            editingRow = null;
            resetForm();
            document.getElementById('modeTitle').innerText = `إضافة طلب جديد`;
            document.getElementById('modeIconBox').className = "p-2.5 rounded-2xl bg-slate-50 text-slate-400";
            document.getElementById('modeIcon').setAttribute('data-lucide', 'plus-circle');
            document.getElementById('cancelEditBtn').classList.add('hidden');
            lucide.createIcons();
        }

        function resetForm() {
            const fields = ['orderName', 'orderPhone', 'orderCity', 'orderAddress', 'orderPrice', 'aiInput'];
            fields.forEach(id => document.getElementById(id).value = '');
            document.getElementById('previewDetails').innerText = 'ממתין לנתונים...';
            document.getElementById('previewId').innerText = `PRNT-${Math.floor(Math.random() * 90000) + 10000}`;
            updatePreview();
        }

        function showStatus(type, msg) {
            const alert = document.getElementById('statusAlert');
            const icon = document.getElementById('statusIcon');
            const text = document.getElementById('statusMsg');
            
            alert.className = `p-3 rounded-2xl flex items-center gap-2 text-xs font-bold border transition-all shadow-sm ${type === 'success' ? 'bg-emerald-50 text-emerald-700 border-emerald-100' : 'bg-rose-50 text-rose-700 border-rose-100'}`;
            icon.setAttribute('data-lucide', type === 'success' ? 'check-circle-2' : 'alert-circle');
            text.innerText = msg;
            alert.classList.remove('hidden');
            lucide.createIcons();
            setTimeout(() => alert.classList.add('hidden'), 4000);
        }

        function openWhatsApp(phone) {
            window.open(`https://wa.me/${phone.replace(/\D/g, '')}`, '_blank');
        }

        function copyOrder(name, phone, city, address, price) {
            const text = `طلب طباعة:\nالاسم: ${name}\nالهاتف: ${phone}\nالعنوان: ${city} - ${address}\nالسعر: ${price} ₪`;
            navigator.clipboard.writeText(text).then(() => showStatus('success', 'تم النسخ'));
        }

        // PDF GENERATION (HTML2CANVAS)
        async function generatePDFForOrder(row) {
            const order = orders.find(o => o.rowIndex === row);
            if (!order) return;
            
            // تحديث المعاينة قبل التصوير
            document.getElementById('previewName').innerText = order.name || '';
            document.getElementById('previewLocation').innerText = `${order.city || ''} ${order.address || ''}`;
            document.getElementById('previewPrice').innerText = order.price || '0';
            document.getElementById('previewCourier').innerText = order.delivery || 'Hi Express';
            document.getElementById('previewDetails').innerText = order.offer || 'ממתין לנתונים...';
            document.getElementById('previewId').innerText = order.orderId || '---';

            showStatus('success', 'جاري تجهيز PDF...');
            try {
                const canvas = await html2canvas(document.getElementById('stickerCapture'), { scale: 3, backgroundColor: '#ffffff' });
                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({ orientation: 'p', unit: 'mm', format: [100, 100] });
                pdf.addImage(imgData, 'PNG', 0, 0, 100, 100);
                pdf.save(`MAD-Sticker-${row}.pdf`);
                showStatus('success', 'تم التحميل');
            } catch (e) { showStatus('error', 'فشل توليد PDF'); }
        }
    </script>
</body>
</html>
