<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>MAD Manager PRO v7.8</title>
    
    <!-- CSS Dependencies -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0b0f1a;
            --card: #161d2f;
            --card-hover: #1f293d;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --grad: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        
        body {
            margin: 0;
            background: var(--bg);
            color: #f8fafc;
            padding-bottom: 80px; /* مساحة للزر العائم */
            overflow-x: hidden;
        }

        /* Header Styling */
        .header {
            background: rgba(17, 24, 39, 0.9);
            backdrop-filter: blur(15px);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .header-content {
            max-width: 850px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 900;
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span { color: var(--primary); text-shadow: 0 0 15px var(--primary-glow); }

        .search-container {
            max-width: 850px;
            margin: 15px auto 0;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 14px 50px 14px 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 16px;
            transition: 0.3s;
        }

        .search-container i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
        }

        /* Order Cards Feed */
        .container {
            padding: 20px;
            max-width: 850px;
            margin: 0 auto;
        }

        .order-card {
            background: var(--card);
            border-radius: 26px;
            padding: 22px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            animation: cardFadeIn 0.5s ease-out;
        }

        @keyframes cardFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .order-card:hover {
            border-color: rgba(59, 130, 246, 0.4);
            transform: translateY(-4px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .status-pill {
            font-size: 11px;
            padding: 6px 14px;
            border-radius: 12px;
            font-weight: 900;
        }

        .st-new { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .st-shipping { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .st-success { background: rgba(16, 185, 129, 0.2); color: #34d399; }

        .customer-name { font-size: 20px; font-weight: 800; display: block; margin-bottom: 10px; color: #fff; }

        .items-box {
            background: rgba(255, 255, 255, 0.03);
            border-right: 5px solid var(--primary);
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
            color: #cbd5e1;
            font-size: 14px;
        }

        /* Buttons */
        .action-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        
        .btn {
            border: none; border-radius: 16px; padding: 12px 6px; font-size: 11px; font-weight: 800;
            cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 8px; transition: 0.2s; color: white; background: rgba(255,255,255,0.06); border: 1px solid var(--border);
        }

        .btn i { font-size: 20px; }
        .btn-blue { background: var(--grad); border: none; }
        .btn-green { background: #10b981; border: none; }
        .btn-orange { background: #f59e0b; border: none; color: #000; }
        
        /* Floating Action Button (FAB) */
        .fab {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: var(--grad);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
            cursor: pointer;
            z-index: 1500;
            transition: 0.3s;
            border: none;
        }

        .fab:hover { transform: scale(1.1) rotate(90deg); }

        /* Modal Overlay */
        .modal {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center; z-index: 2000; padding: 15px;
        }
        .modal.show { display: flex; }
        .modal-body {
            background: var(--card); width: 100%; max-width: 600px; padding: 30px; border-radius: 32px;
            border: 1px solid var(--border); max-height: 92vh; overflow-y: auto;
        }

        input, select, textarea {
            width: 100%; padding: 15px; background: rgba(0,0,0,0.4); border: 1px solid var(--border);
            border-radius: 14px; color: white; outline: none; font-size: 15px; margin-bottom: 15px;
        }

        #toast {
            position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%);
            padding: 16px 35px; border-radius: 60px; font-weight: 800; display: none; z-index: 5000;
            text-align: center; max-width: 85%; box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            background: var(--success);
        }

        #global-loader {
            position: fixed; inset: 0; background: rgba(7, 11, 20, 0.9); z-index: 6000;
            display: none; align-items: center; justify-content: center; flex-direction: column;
        }

        @media (max-width: 480px) {
            .btn span { display: none; }
            .action-row { gap: 8px; }
        }
    </style>
</head>
<body>

<div id="global-loader">
    <div class="spinner" style="width: 60px; height: 60px; border: 5px solid rgba(59, 130, 246, 0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
    <p style="margin-top: 20px; font-weight: 800;">جاري المزامنة...</p>
</div>

<div id="toast">✅ تمت العملية</div>

<!-- Floating Add Button -->
<button class="fab" onclick="openOrderModal(true)" title="إضافة طلب جديد">
    <i class="fa fa-plus"></i>
</button>

<!-- Header -->
<div class="header">
    <div class="header-content">
        <div class="logo">MAD <span>PARFUMEUR</span></div>
        <div style="display: flex; gap: 12px;">
            <button class="btn" style="width: 48px; height: 48px;" onclick="fetchData()"><i class="fa fa-sync"></i></button>
            <button class="btn btn-blue" style="width: 48px; height: 48px;" onclick="openOrderModal(true)"><i class="fa fa-plus"></i></button>
        </div>
    </div>
    <div class="search-container">
        <i class="fa fa-search"></i>
        <input type="text" id="mainSearch" placeholder="ابحث باسم العميل أو الهاتف..." oninput="handleGlobalSearch()">
    </div>
</div>

<div class="container" id="ordersList"></div>

<!-- Order Modal -->
<div class="modal" id="orderModal">
    <div class="modal-body">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="modalTitle" style="margin:0;">تفاصيل الطلب</h2>
            <button class="btn" style="width: 40px; height: 40px; border:none;" onclick="closeOrderModal()"><i class="fa fa-times"></i></button>
        </div>

        <div style="background:rgba(59,130,246,0.1); padding:20px; border-radius:20px; margin-bottom:20px; border: 1px dashed var(--primary);">
            <textarea id="aiRawInput" placeholder="الصق نص الطلب هنا للتحليل بذكاء Gemini..." style="height:100px; margin-bottom:10px;"></textarea>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <button class="btn" onclick="runQuickParse()"><i class="fa fa-bolt"></i> تحليل سريع</button>
                <button class="btn btn-blue" onclick="runGeminiDeepParse()"><i class="fa fa-sparkles"></i> ذكاء Gemini</button>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <input type="text" id="f_ref" placeholder="رقم المرجع (Ref)">
            <input type="text" id="f_name" placeholder="اسم العميل">
        </div>
        <input type="tel" id="f_phone" placeholder="رقم الهاتف">
        <textarea id="f_offer" placeholder="الأصناف المطلوبة" rows="2"></textarea>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <input type="number" id="f_price" placeholder="السعر (₪)">
            <select id="f_payment">
                <option>دفع عند الاستلام</option>
                <option>مدفوع مسبقاً</option>
                <option>رابط دفع</option>
            </select>
        </div>
        
        <input type="text" id="f_city" placeholder="المدينة">
        <input type="text" id="f_addr" placeholder="العنوان بالتفصيل">

        <select id="f_delivery">
            <option value="Hi Express">Hi Express (Olivery ✨)</option>
            <option value="Pickup">Pickup</option>
        </select>

        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 15px; margin-top: 10px;">
            <button class="btn" style="height: 55px;" onclick="closeOrderModal()">إلغاء</button>
            <button class="btn btn-blue" style="height: 55px;" onclick="handleFormSubmission()">حفظ في الجدول <i class="fa fa-save"></i></button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwA_maAqzWmgW5UFBk-ieKbsj6Ksm7LHL82cD6Hd-CELAQc3kE511VgI6NC-2EtBafyvw/exec";
    const SECRET_KEY = "12345678";
    let ordersData = [];
    let currentEditingRow = null;

    function toggleGlobalLoader(s) { document.getElementById('global-loader').style.display = s ? 'flex' : 'none'; }
    function showNotify(m, t='success') {
        const toast = document.getElementById('toast');
        toast.innerHTML = m;
        toast.style.background = t === 'success' ? 'var(--success)' : 'var(--danger)';
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 4000);
    }

    async function scriptCall(p) {
        const r = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({...p, key: SECRET_KEY}) });
        return await r.json();
    }

    async function fetchData() {
        toggleGlobalLoader(true);
        try {
            const r = await fetch(`${SCRIPT_URL}?action=get&key=${SECRET_KEY}&t=${Date.now()}`);
            const d = await r.json();
            if (Array.isArray(d)) { ordersData = d; renderOrders(ordersData); }
        } catch(e) { showNotify("خطأ في الاتصال", "danger"); }
        toggleGlobalLoader(false);
    }

    function renderOrders(l) {
        const list = document.getElementById('ordersList');
        if(!l.length) { list.innerHTML = '<p style="text-align:center; padding:100px;">لا توجد طلبات</p>'; return; }
        list.innerHTML = l.filter(o=>o.rowIndex).reverse().map(o => `
            <div class="order-card">
                <div class="card-header"><span>#${o.orderId||'---'}</span><span class="status-pill st-new">${o.status||'جديد'}</span></div>
                <div onclick="openOrderModal(false, ${o.rowIndex})">
                    <span class="customer-name">${o.name||'بدون اسم'}</span>
                    <div class="info-item"><i class="fa fa-phone"></i> ${o.phone||'---'}</div>
                    <div class="items-box">${o.offer||'---'}</div>
                    <div style="font-size:13px; color:var(--muted);">₪${o.price||0} | ${o.city||'---'} | ${o.delivery||'Hi Express'}</div>
                    ${o.delivery_order_id ? `<div style="margin-top:10px; color:var(--success); font-weight:800;">📦 ${o.delivery_order_id}</div>` : ''}
                </div>
                <div class="action-row">
                    <button class="btn btn-orange" onclick="whatsapp(${o.rowIndex}, 'ar')"><i class="fab fa-whatsapp"></i><span>عربي</span></button>
                    <button class="btn btn-purple" onclick="whatsapp(${o.rowIndex}, 'he')"><i class="fab fa-whatsapp"></i><span>Heb</span></button>
                    <button class="btn btn-green" onclick="approveOrder(${o.rowIndex})"><i class="fa fa-check"></i><span>اعتماد</span></button>
                    <button class="btn btn-blue" onclick="shipWithOlivery(${o.rowIndex})"><i class="fa fa-truck"></i><span>شحن</span></button>
                </div>
            </div>
        `).join('');
    }

    async function runGeminiDeepParse() {
        const t = document.getElementById('aiRawInput').value;
        if(!t) return;
        toggleGlobalLoader(true);
        const res = await scriptCall({ action: 'analyze', text: t });
        if (res.result === 'SUCCESS') populateForm(res.data);
        toggleGlobalLoader(false);
    }

    function populateForm(d) {
        if(d.name) document.getElementById('f_name').value = d.name;
        if(d.phone) document.getElementById('f_phone').value = d.phone;
        if(d.city) document.getElementById('f_city').value = d.city;
        if(d.price) document.getElementById('f_price').value = d.price;
        if(d.offer) document.getElementById('f_offer').value = d.offer;
        if(d.address) document.getElementById('f_addr').value = d.address;
        if(d.orderId) document.getElementById('f_ref').value = d.orderId;
    }

    async function handleFormSubmission() {
        const p = {
            action: currentEditingRow ? 'updateOrder' : 'addOrder',
            row: currentEditingRow,
            name: document.getElementById('f_name').value,
            phone: document.getElementById('f_phone').value,
            offer: document.getElementById('f_offer').value,
            price: document.getElementById('f_price').value,
            city: document.getElementById('f_city').value,
            address: document.getElementById('f_addr').value,
            payment: document.getElementById('f_payment').value,
            delivery: document.getElementById('f_delivery').value,
            orderId: document.getElementById('f_ref').value,
            status: currentEditingRow ? undefined : 'جديد'
        };
        toggleGlobalLoader(true);
        const r = await scriptCall(p);
        if (r.result === 'SUCCESS') { showNotify("تم الحفظ"); closeOrderModal(); fetchData(); }
        toggleGlobalLoader(false);
    }

    async function shipWithOlivery(row) {
        toggleGlobalLoader(true);
        const r = await scriptCall({ action: 'sendToDelivery', row: row });
        if (r.result === 'SUCCESS') { showNotify("تم الشحن ✨"); fetchData(); }
        else showNotify("فشل الشحن التلقائي", "danger");
        toggleGlobalLoader(false);
    }

    function openOrderModal(isNew, row = null) {
        currentEditingRow = row;
        document.getElementById('orderModal').classList.add('show');
        if (isNew) document.querySelectorAll('#orderModal input, #orderModal textarea').forEach(i=>i.value="");
        else {
            const o = ordersData.find(x=>x.rowIndex==row);
            document.getElementById('f_name').value = o.name||"";
            document.getElementById('f_phone').value = o.phone||"";
            document.getElementById('f_offer').value = o.offer||"";
            document.getElementById('f_price').value = o.price||"";
            document.getElementById('f_city').value = o.city||"";
            document.getElementById('f_addr').value = o.address||"";
            document.getElementById('f_ref').value = o.orderId||"";
        }
    }
    function closeOrderModal() { document.getElementById('orderModal').classList.remove('show'); }
    function handleGlobalSearch() {
        const q = document.getElementById('mainSearch').value.toLowerCase();
        renderOrders(ordersData.filter(o => String(o.name).toLowerCase().includes(q) || String(o.phone).includes(q)));
    }
    window.onload = fetchData;
</script>

</body>
</html>
