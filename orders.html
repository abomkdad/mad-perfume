<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"
  />
  <title>MAD PRINT</title>
  <meta name="description" content="MAD Print Manager" />

  <style>
    :root{
      --bg:#0f172a;
      --bg2:#111827;
      --card:#111827;
      --line:#1f2937;
      --txt:#e5e7eb;
      --muted:#94a3b8;
      --brand:#22c55e;
      --header-h:64px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --radius:14px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,
    body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:linear-gradient(180deg,#0b1220,#111827);
      color:var(--txt);
      font-family:Arial,sans-serif;
      overscroll-behavior:none;
    }

    body{
      position:fixed;
      inset:0;
      touch-action:manipulation;
    }

    .app{
      position:fixed;
      inset:0;
      width:100%;
      height:100dvh;
      height:100vh;
      overflow:hidden;
      background:linear-gradient(180deg,#0b1220,#111827);
    }

    .top{
      position:absolute;
      top:0;
      right:0;
      left:0;
      height:calc(var(--header-h) + var(--safe-top));
      padding:
        calc(var(--safe-top) + 10px)
        14px
        10px
        14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border-bottom:1px solid var(--line);
      background:rgba(17,24,39,.96);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      z-index:10;
    }

    .title{
      font-weight:900;
      letter-spacing:.5px;
      font-size:18px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-shrink:0;
    }

    .btn{
      appearance:none;
      border:1px solid #334155;
      background:#0b1220;
      color:#e5e7eb;
      padding:10px 14px;
      border-radius:12px;
      cursor:pointer;
      text-decoration:none;
      font-size:13px;
      font-weight:700;
      line-height:1;
      min-height:40px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      white-space:nowrap;
      transition:transform .12s ease, opacity .12s ease, background .12s ease;
    }

    .btn:active{
      transform:scale(.98);
    }

    .btn.primary{
      background:var(--brand);
      color:#052e16;
      border-color:#16a34a;
    }

    .main{
      position:absolute;
      top:calc(var(--header-h) + var(--safe-top));
      right:0;
      left:0;
      bottom:0;
      padding:12px 12px calc(12px + var(--safe-bottom));
      overflow:hidden;
    }

    .frame-shell{
      position:relative;
      width:100%;
      height:100%;
      border:1px solid #334155;
      border-radius:16px;
      overflow:hidden;
      background:#fff;
      box-shadow:0 12px 30px rgba(0,0,0,.28);
    }

    iframe{
      display:block;
      width:100%;
      height:100%;
      border:0;
      background:#fff;
    }

    .note{
      position:absolute;
      right:50%;
      transform:translateX(50%);
      bottom:calc(8px + var(--safe-bottom));
      z-index:11;
      font-size:12px;
      color:var(--muted);
      background:rgba(15,23,42,.72);
      padding:6px 10px;
      border:1px solid rgba(51,65,85,.7);
      border-radius:999px;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      pointer-events:none;
    }

    @media (max-width:640px){
      :root{
        --header-h:60px;
      }

      .top{
        padding:
          calc(var(--safe-top) + 8px)
          10px
          8px
          10px;
      }

      .title{
        font-size:16px;
      }

      .actions{
        gap:6px;
      }

      .btn{
        padding:9px 11px;
        font-size:12px;
        min-height:38px;
        border-radius:10px;
      }

      .main{
        padding:8px 8px calc(8px + var(--safe-bottom));
      }

      .frame-shell{
        border-radius:12px;
      }

      .note{
        font-size:11px;
        max-width:calc(100% - 20px);
        text-align:center;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="title">MAD PRINT</div>

      <div class="actions">
        <a
          class="btn"
          href="https://script.google.com/macros/s/AKfycbwKKrwNVKfUgW9emJ_khk64d6RfliO75LO2NRoiMmC5E7DIHxMOgEjRBwSfY4T7BB0T/exec"
          target="_blank"
          rel="noopener"
        >
          فتح مباشر
        </a>

        <button class="btn primary" type="button" onclick="reloadFrame()">
          تحديث
        </button>
      </div>
    </header>

    <main class="main">
      <div class="frame-shell">
        <iframe
          id="appFrame"
          title="MAD Print Manager"
          src="https://script.google.com/macros/s/AKfycbwKKrwNVKfUgW9emJ_khk64d6RfliO75LO2NRoiMmC5E7DIHxMOgEjRBwSfY4T7BB0T/exec"
          loading="eager"
          referrerpolicy="no-referrer"
          allow="clipboard-read; clipboard-write">
        </iframe>
      </div>

      <div class="note">إذا لم يظهر داخل الإطار، استخدم زر "فتح مباشر"</div>
    </main>
  </div>

  <script>
    function reloadFrame() {
      const f = document.getElementById('appFrame');
      const currentSrc = f.src;
      f.src = 'about:blank';
      setTimeout(() => {
        f.src = currentSrc;
      }, 60);
    }

    function setAppHeight() {
      document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
    }

    setAppHeight();
    window.addEventListener('resize', setAppHeight);
    window.addEventListener('orientationchange', setAppHeight);
  </script>
</body>
</html>
