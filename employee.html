<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MAD PRINT - الموظف</title>
  <style>
    :root {
      --page-bg: #0f172a;
      --frame-border: rgba(148, 163, 184, 0.18);
      --frame-shadow: 0 18px 50px rgba(2, 6, 23, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.12), transparent 28%),
        linear-gradient(180deg, #0f172a 0%, #111827 100%);
      overflow: hidden;
    }

    body {
      font-family: "Tajawal", system-ui, sans-serif;
      padding: 8px;
    }

    .frame-shell {
      width: 100%;
      height: calc(100vh - 16px);
      border: 0.5px solid var(--frame-border);
      border-radius: 16px;
      overflow: hidden;
      background: var(--page-bg);
      box-shadow: var(--frame-shadow);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: var(--page-bg);
    }
  </style>
</head>
<body>
  <div class="frame-shell">
    <iframe
      src="https://script.google.com/macros/s/AKfycbyvhHKQzApxh2mi0mCLYIAPRTITLarleyuoaH6hVlXw3wxIl7plO4x4uEqEJCz61MgvZg/exec?page=employee"
      title="MAD PRINT Employee"
      loading="eager"
      referrerpolicy="no-referrer"
      allow="fullscreen; clipboard-read; clipboard-write">
    </iframe>
  </div>
</body>
</html>
