<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MAD PRINT - الموظف</title>
  <style>
    :root {
      --bg: #0f172a;
      --bg2: #111827;
      --card: rgba(15, 23, 42, 0.82);
      --line: rgba(148, 163, 184, 0.2);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #3b82f6;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top right, rgba(59, 130, 246, 0.18), transparent 28%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .status {
      width: min(420px, 100%);
      padding: 28px 24px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--card);
      box-shadow: 0 24px 60px rgba(2, 6, 23, 0.32);
      text-align: center;
      backdrop-filter: blur(16px);
    }

    .spinner {
      width: 54px;
      height: 54px;
      margin: 0 auto 18px;
      border-radius: 999px;
      border: 4px solid rgba(148, 163, 184, 0.2);
      border-top-color: var(--accent);
      animation: spin 1s linear infinite;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
      font-weight: 800;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: 15px;
    }

    .error {
      color: #fca5a5;
      white-space: pre-wrap;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <main class="status" id="statusBox">
    <div class="spinner" aria-hidden="true"></div>
    <h1>جاري فتح لوحة الموظف</h1>
    <p>يتم الآن تحميل النسخة المحلية على نفس الدومين...</p>
  </main>

  <script>
    const EMPLOYEE_PAYLOAD_RPC_URL = 'https://script.google.com/macros/s/AKfycbxZ66FgMUIMTfbKjLP7Dh6ikuG9RHvuMmNeOCjhjnFh3_fF0v7Lypthw0uBK_Kk2Cy8/exec';
    const EMPLOYEE_PAYLOAD_PARTS = [1, 2, 3, 4, 5];

    bootstrapEmployeePage().catch((error) => {
      const box = document.getElementById('statusBox');
      box.innerHTML = `
        <h1>تعذر فتح الصفحة</h1>
        <p class="error">${escapeHtml(String((error && error.message) || error || 'Unknown error'))}</p>
      `;
    });

    async function bootstrapEmployeePage() {
      const payloadParts = await Promise.all(
        EMPLOYEE_PAYLOAD_PARTS.map(async (partNumber) => {
          const url = new URL(EMPLOYEE_PAYLOAD_RPC_URL);
          url.searchParams.set('action', 'rpc');
          url.searchParams.set('method', 'api_getEmployeePayloadPart');
          url.searchParams.set('args', JSON.stringify([partNumber]));

          const response = await fetch(url.toString(), {
            method: 'GET',
            mode: 'cors',
            redirect: 'follow',
            cache: 'no-store'
          });

          let data = null;
          try {
            data = await response.json();
          } catch (_) {
            throw new Error(`تعذر قراءة الجزء ${partNumber}`);
          }

          if (!response.ok || !data || data.success !== true) {
            throw new Error((data && data.error) || `فشل تحميل الجزء ${partNumber}`);
          }

          return String(data.result || '');
        })
      );

      const payload = payloadParts.join('');
      const binary = atob(payload);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) {
        bytes[i] = binary.charCodeAt(i);
      }

      const html = new TextDecoder().decode(bytes);
      document.open();
      document.write(html);
      document.close();
      installEmployeePhoneSearchPatch();
    }

    function installEmployeePhoneSearchPatch() {
      const code = '(function(){' +
        'function digits(value){return String(value||"").replace(/[\\u0660-\\u0669]/g,function(ch){return String(ch.charCodeAt(0)-0x0660)}).replace(/[\\u06f0-\\u06f9]/g,function(ch){return String(ch.charCodeAt(0)-0x06f0)}).replace(/\\D/g,"")}' +
        'function forSheet(value){var raw=String(value||"").trim();if(!raw)return"";if(raw.charAt(0)==="*")return raw.replace(/\\s+/g,"");var d=digits(raw);if(!d)return"";while(d.indexOf("00")===0)d=d.slice(2);if(d.indexOf("972")===0)d=d.slice(3);while(d.charAt(0)==="0")d=d.slice(1);return d}' +
        'function variants(value){var raw=String(value||"").trim();var base=forSheet(raw);var direct=digits(raw);var out=[];function add(x){x=String(x||"").trim().toLowerCase();if(x&&out.indexOf(x)<0)out.push(x)}add(raw);add(direct);add(base);if(base&&base.charAt(0)==="5"){add("0"+base);add("972"+base);add("+972"+base);add("00972"+base)}return out}' +
        'function patchSearch(){if(window.__madPhoneSearchPatched20260714)return true;if(typeof window.getOrderSearchBlob_!=="function")return false;var old=window.getOrderSearchBlob_;window.getOrderSearchBlob_=function(order){var blob=String(old.apply(this,arguments)||"");try{[order&&order.phone,order&&order.customer_phone,order&&order.customerPhone,order&&order.tel,order&&order.mobile].forEach(function(v){variants(v).forEach(function(x){blob+=" "+x})})}catch(e){}return blob};window.__madPhoneSearchPatched20260714=true;window.madPhoneForSheet=forSheet;return true}' +
        'if(!patchSearch()){var tries=0;var timer=setInterval(function(){tries+=1;if(patchSearch()||tries>40)clearInterval(timer)},250)}' +
        '})();';
      setTimeout(() => {
        const script = document.createElement('script');
        script.id = 'mad-phone-employee-patch-20260714';
        script.textContent = code;
        (document.head || document.documentElement || document.body).appendChild(script);
      }, 0);
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
