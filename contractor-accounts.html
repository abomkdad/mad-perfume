<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MAD | حسابات المقاولين</title>
  <meta name="theme-color" content="#eef4f8">
  <style>
    :root {
      --bg: #eef4f8;
      --card: #fff;
      --ink: #102033;
      --muted: #66758a;
      --line: #d8e2ee;
      --green: #16a34a;
      --blue: #2563eb;
      --red: #dc2626;
      --gold: #b98224;
      --dark: #122033;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Tahoma, sans-serif;
      padding: env(safe-area-inset-top) 8px env(safe-area-inset-bottom);
    }
    .app { width: min(1180px, 100%); margin: 0 auto; padding: 10px 0 24px; }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border-radius: 16px;
      background: var(--dark);
      color: #fff;
      box-shadow: 0 16px 42px rgba(16,32,51,.14);
    }
    h1 { margin: 0; font-size: clamp(22px, 5vw, 34px); line-height: 1.1; }
    .top small { display: block; margin-top: 4px; color: #b8c7db; font-weight: 900; }
    .card {
      margin-top: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: var(--card);
      box-shadow: 0 8px 24px rgba(16,32,51,.08);
    }
    .filters {
      display: grid;
      grid-template-columns: 1.3fr 160px 160px auto auto;
      gap: 8px;
      align-items: end;
    }
    label { display: block; margin-bottom: 6px; color: var(--muted); font-size: 13px; font-weight: 900; }
    input, button {
      width: 100%;
      height: 48px;
      border-radius: 12px;
      font: inherit;
      font-weight: 900;
    }
    input {
      border: 1px solid var(--line);
      background: #f9fbfd;
      color: var(--ink);
      padding: 0 12px;
    }
    button {
      min-width: 116px;
      border: 0;
      background: var(--blue);
      color: #fff;
      cursor: pointer;
    }
    button.green { background: var(--green); }
    button.dark { background: #334155; }
    button:disabled { opacity: .6; cursor: wait; }
    .stats {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }
    .stat {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: #f9fbfd;
      text-align: center;
    }
    .stat b { display: block; font-size: clamp(24px, 5vw, 40px); color: var(--ink); }
    .stat span { color: var(--muted); font-size: 12px; font-weight: 900; }
    .stat.good b { color: var(--green); }
    .stat.bad b { color: var(--red); }
    .tabs {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 7px;
      position: sticky;
      top: 0;
      z-index: 5;
      background: var(--bg);
      padding-top: 8px;
    }
    .tab {
      height: 46px;
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--line);
      min-width: 0;
    }
    .tab.active { background: var(--dark); color: #fff; border-color: var(--dark); }
    .table-wrap { overflow: auto; max-height: 68vh; border: 1px solid var(--line); border-radius: 13px; }
    table { width: 100%; border-collapse: collapse; background: #fff; min-width: 780px; }
    th, td { padding: 9px; border-bottom: 1px solid var(--line); text-align: right; font-size: 13px; vertical-align: top; }
    th { position: sticky; top: 0; z-index: 2; background: #f1f5f9; color: #334155; font-size: 12px; }
    td.num, th.num { text-align: center; direction: ltr; }
    .status {
      display: inline-grid;
      place-items: center;
      min-height: 28px;
      padding: 0 9px;
      border-radius: 999px;
      background: #e2e8f0;
      color: #334155;
      font-weight: 900;
      font-size: 12px;
    }
    .status.returned { background: #fee2e2; color: #991b1b; }
    .status.sold { background: #dcfce7; color: #166534; }
    .empty {
      padding: 28px;
      text-align: center;
      color: var(--muted);
      font-weight: 900;
      border: 2px dashed var(--line);
      border-radius: 14px;
      background: #f9fbfd;
    }
    .note {
      margin-top: 8px;
      padding: 10px;
      border-radius: 12px;
      background: #fff8e8;
      color: #8a5a10;
      font-size: 13px;
      font-weight: 900;
      line-height: 1.45;
      text-align: center;
    }
    @media (max-width: 820px) {
      .filters { grid-template-columns: 1fr 1fr; }
      .filters > div:first-child { grid-column: 1 / -1; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .tabs { grid-template-columns: repeat(2, 1fr); }
      .top { align-items: flex-start; flex-direction: column; }
      button { min-width: 0; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div>
        <h1>حسابات المقاولين</h1>
        <small>مبيعات، رواجع، منتجات، ومجموعات حسب الفترة</small>
      </div>
    </header>

    <section class="card">
      <div class="filters">
        <div>
          <label for="contractorInput">المقاول</label>
          <input id="contractorInput" list="contractorsList" placeholder="مثال: Marwa / Hi Express / اسم المقاول">
          <datalist id="contractorsList"></datalist>
        </div>
        <div>
          <label for="fromDate">من تاريخ</label>
          <input id="fromDate" type="date">
        </div>
        <div>
          <label for="toDate">إلى تاريخ</label>
          <input id="toDate" type="date">
        </div>
        <button id="loadBtn" type="button">عرض الحساب</button>
        <button id="excelBtn" class="green" type="button" disabled>تنزيل Excel</button>
      </div>
      <div class="note">الحساب يعتمد على الطلبات التي يظهر فيها اسم المقاول في شركة التوصيل أو الموظف. الرواجع تُخصم من الصافي وتظهر بتفصيل منفصل.</div>
    </section>

    <section class="card stats">
      <div class="stat"><b id="sOrders">0</b><span>كل الطلبات</span></div>
      <div class="stat good"><b id="sSold">0</b><span>طلبات مباعة</span></div>
      <div class="stat bad"><b id="sReturns">0</b><span>طلبات راجعة</span></div>
      <div class="stat good"><b id="sGross">₪0</b><span>مبيعات</span></div>
      <div class="stat bad"><b id="sReturnValue">₪0</b><span>قيمة الرواجع</span></div>
      <div class="stat"><b id="sNet">₪0</b><span>الصافي</span></div>
      <div class="stat good"><b id="sSoldProducts">0</b><span>منتجات مباعة</span></div>
      <div class="stat bad"><b id="sReturnedProducts">0</b><span>منتجات راجعة</span></div>
      <div class="stat"><b id="sNetProducts">0</b><span>صافي المنتجات</span></div>
    </section>

    <div class="tabs">
      <button class="tab active" data-tab="orders" type="button">كل المبيعات</button>
      <button class="tab" data-tab="products" type="button">حسب الكود</button>
      <button class="tab" data-tab="groups" type="button">حسب المجموعة</button>
      <button class="tab" data-tab="returns" type="button">الرواجع</button>
      <button class="tab" data-tab="statuses" type="button">الحالات</button>
    </div>

    <section class="card">
      <div id="content"></div>
    </section>
  </main>

  <script>
    (function () {
      var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzd4FSy5fKZ5B3LF4ogDerw25K16oikiNv0j-4QPZGE4CzbvZFiw5vFIQpE09w486ldCA/exec';
      var XLSX_URL = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
      var params = new URLSearchParams(location.search);
      var contractorInput = document.getElementById('contractorInput');
      var contractorsList = document.getElementById('contractorsList');
      var fromDate = document.getElementById('fromDate');
      var toDate = document.getElementById('toDate');
      var loadBtn = document.getElementById('loadBtn');
      var excelBtn = document.getElementById('excelBtn');
      var content = document.getElementById('content');
      var activeTab = 'orders';
      var report = null;
      var xlsxReady = false;

      function todayIso(d) {
        var date = d || new Date();
        var m = String(date.getMonth() + 1).padStart(2, '0');
        var day = String(date.getDate()).padStart(2, '0');
        return date.getFullYear() + '-' + m + '-' + day;
      }
      var now = new Date();
      var start = new Date(now.getTime() - 6 * 24 * 60 * 60 * 1000);
      contractorInput.value = params.get('contractor') || params.get('c') || '';
      fromDate.value = params.get('from') || todayIso(start);
      toDate.value = params.get('to') || todayIso(now);

      function escapeHtml(value) {
        return String(value == null ? '' : value).replace(/[&<>"']/g, function (ch) {
          return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' })[ch];
        });
      }
      function money(value) {
        return '₪' + Math.round(Number(value || 0)).toLocaleString('en-US');
      }
      function setLoading(text) {
        content.innerHTML = '<div class="empty">' + escapeHtml(text || 'جاري التحميل') + '</div>';
      }
      function jsonp(api, payload) {
        return new Promise(function (resolve, reject) {
          var callback = '__madAccCb_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
          var script = document.createElement('script');
          var timer = setTimeout(function () { cleanup(); reject(new Error('انتهت مهلة الاتصال')); }, 25000);
          function cleanup() {
            clearTimeout(timer);
            try { delete window[callback]; } catch (err) { window[callback] = undefined; }
            if (script.parentNode) script.parentNode.removeChild(script);
          }
          window[callback] = function (res) { cleanup(); resolve(res); };
          script.onerror = function () { cleanup(); reject(new Error('تعذر الاتصال بالنظام')); };
          script.src = SCRIPT_URL
            + '?api=' + encodeURIComponent(api)
            + '&callback=' + encodeURIComponent(callback)
            + '&payload=' + encodeURIComponent(JSON.stringify(payload || {}))
            + '&_=' + Date.now();
          document.head.appendChild(script);
        });
      }
      function loadScript(url) {
        return new Promise(function (resolve, reject) {
          if (window.XLSX) { resolve(); return; }
          var script = document.createElement('script');
          script.src = url;
          script.async = true;
          script.onload = resolve;
          script.onerror = reject;
          document.head.appendChild(script);
        });
      }
      function table(headers, rows) {
        if (!rows.length) return '<div class="empty">لا توجد بيانات لهذه الفترة</div>';
        return '<div class="table-wrap"><table><thead><tr>' + headers.map(function(h) {
          return '<th' + (h.num ? ' class="num"' : '') + '>' + escapeHtml(h.label) + '</th>';
        }).join('') + '</tr></thead><tbody>' + rows.map(function(row) {
          return '<tr>' + headers.map(function(h) {
            var val = typeof h.value === 'function' ? h.value(row) : row[h.key];
            return '<td' + (h.num ? ' class="num"' : '') + '>' + val + '</td>';
          }).join('') + '</tr>';
        }).join('') + '</tbody></table></div>';
      }
      function renderStats() {
        var s = report && report.summary ? report.summary : {};
        document.getElementById('sOrders').textContent = s.totalOrders || 0;
        document.getElementById('sSold').textContent = s.soldOrders || 0;
        document.getElementById('sReturns').textContent = s.returnedOrders || 0;
        document.getElementById('sGross').textContent = money(s.grossSales || 0);
        document.getElementById('sReturnValue').textContent = money(s.returnedValue || 0);
        document.getElementById('sNet').textContent = money(s.netSales || 0);
        document.getElementById('sSoldProducts').textContent = s.soldProducts || 0;
        document.getElementById('sReturnedProducts').textContent = s.returnedProducts || 0;
        document.getElementById('sNetProducts').textContent = s.netProducts || 0;
      }
      function renderTab() {
        if (!report) return;
        if (activeTab === 'products') {
          content.innerHTML = table([
            { label: 'الكود / المنتج', value: function(r) { return escapeHtml(r.code); } },
            { label: 'المجموعة', value: function(r) { return escapeHtml(r.group); } },
            { label: 'مباع', key: 'soldQty', num: true },
            { label: 'راجع', key: 'returnedQty', num: true },
            { label: 'الصافي', key: 'netQty', num: true }
          ], report.productSummary || []);
          return;
        }
        if (activeTab === 'groups') {
          content.innerHTML = table([
            { label: 'المجموعة', value: function(r) { return escapeHtml(r.group); } },
            { label: 'منتجات مباعة', key: 'soldQty', num: true },
            { label: 'منتجات راجعة', key: 'returnedQty', num: true },
            { label: 'صافي المنتجات', key: 'netQty', num: true },
            { label: 'طلبات مباعة', key: 'soldOrders', num: true },
            { label: 'طلبات راجعة', key: 'returnedOrders', num: true }
          ], report.groupSummary || []);
          return;
        }
        if (activeTab === 'returns') {
          content.innerHTML = table(orderHeaders(), report.returnedOrders || []);
          return;
        }
        if (activeTab === 'statuses') {
          content.innerHTML = table([
            { label: 'الحالة', value: function(r) { return escapeHtml(r.status); } },
            { label: 'عدد الطلبات', key: 'orders', num: true },
            { label: 'قيمة', value: function(r) { return money(r.value); }, num: true },
            { label: 'عدد المنتجات', key: 'products', num: true }
          ], report.statusSummary || []);
          return;
        }
        content.innerHTML = table(orderHeaders(), report.orders || []);
      }
      function orderHeaders() {
        return [
          { label: 'التاريخ', value: function(r) { return escapeHtml(r.date); } },
          { label: 'رقم الطلب', value: function(r) { return escapeHtml(r.orderId); } },
          { label: 'الزبون', value: function(r) { return escapeHtml(r.name); } },
          { label: 'الهاتف', value: function(r) { return escapeHtml(r.phone); } },
          { label: 'المدينة', value: function(r) { return escapeHtml(r.customer_area); } },
          { label: 'السعر', value: function(r) { return money(r.price); }, num: true },
          { label: 'الحالة', value: function(r) { return '<span class="status ' + (r.returned ? 'returned' : 'sold') + '">' + escapeHtml(r.Status) + '</span>'; } },
          { label: 'المقاول/الموظف', value: function(r) { return escapeHtml(r.contractor_names || r.delivery_company || r.employee_name); } },
          { label: 'المجموعة', value: function(r) { return escapeHtml(r.group); } },
          { label: 'الأكواد', value: function(r) { return escapeHtml((r.product_codes || []).join(', ')); } },
          { label: 'عدد', key: 'product_count', num: true },
          { label: 'سبب الرجوع', value: function(r) { return escapeHtml(r.return_reason || ''); } }
        ];
      }
      function updateContractorsList(list) {
        contractorsList.innerHTML = (list || []).slice(0, 200).map(function(name) {
          return '<option value="' + escapeHtml(name) + '"></option>';
        }).join('');
      }
      async function loadReport() {
        loadBtn.disabled = true;
        excelBtn.disabled = true;
        setLoading('جاري حساب المقاول');
        try {
          var res = await jsonp('contractorAccounting', {
            contractor: contractorInput.value.trim(),
            startDate: fromDate.value,
            endDate: toDate.value
          });
          if (!res || !res.success) throw new Error((res && (res.error || res.message)) || 'تعذر تحميل الحساب');
          report = res;
          updateContractorsList(res.contractorCandidates);
          renderStats();
          renderTab();
          excelBtn.disabled = false;
        } catch (err) {
          content.innerHTML = '<div class="empty">' + escapeHtml(err && err.message ? err.message : String(err)) + '</div>';
        } finally {
          loadBtn.disabled = false;
        }
      }
      function plainOrders(rows) {
        return (rows || []).map(function(o) {
          return {
            'التاريخ': o.date,
            'رقم الطلب': o.orderId,
            'الزبون': o.name,
            'الهاتف': o.phone,
            'المدينة': o.customer_area,
            'السعر': o.price,
            'الحالة': o.Status,
            'المقاول/الموظف': o.contractor_names,
            'المجموعة': o.group,
            'الأكواد': (o.product_codes || []).join(', '),
            'عدد المنتجات': o.product_count,
            'سبب الرجوع': o.return_reason || '',
            'تاريخ الرجوع': o.returned_at || ''
          };
        });
      }
      function plainProducts(rows) {
        return (rows || []).map(function(r) {
          return { 'الكود': r.code, 'المجموعة': r.group, 'مباع': r.soldQty, 'راجع': r.returnedQty, 'الصافي': r.netQty, 'طلبات مباعة': r.soldOrders, 'طلبات راجعة': r.returnedOrders };
        });
      }
      function plainGroups(rows) {
        return (rows || []).map(function(r) {
          return { 'المجموعة': r.group, 'منتجات مباعة': r.soldQty, 'منتجات راجعة': r.returnedQty, 'صافي المنتجات': r.netQty, 'طلبات مباعة': r.soldOrders, 'طلبات راجعة': r.returnedOrders };
        });
      }
      function plainStatuses(rows) {
        return (rows || []).map(function(r) {
          return { 'الحالة': r.status, 'عدد الطلبات': r.orders, 'القيمة': r.value, 'عدد المنتجات': r.products };
        });
      }
      async function downloadExcel() {
        if (!report) return;
        excelBtn.disabled = true;
        try {
          await loadScript(XLSX_URL);
          var s = report.summary || {};
          var wb = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet([
            { 'البند': 'المقاول', 'القيمة': report.contractor || 'الجميع' },
            { 'البند': 'من تاريخ', 'القيمة': fromDate.value },
            { 'البند': 'إلى تاريخ', 'القيمة': toDate.value },
            { 'البند': 'كل الطلبات', 'القيمة': s.totalOrders || 0 },
            { 'البند': 'طلبات مباعة', 'القيمة': s.soldOrders || 0 },
            { 'البند': 'طلبات راجعة', 'القيمة': s.returnedOrders || 0 },
            { 'البند': 'مبيعات', 'القيمة': s.grossSales || 0 },
            { 'البند': 'قيمة الرواجع', 'القيمة': s.returnedValue || 0 },
            { 'البند': 'الصافي', 'القيمة': s.netSales || 0 },
            { 'البند': 'منتجات مباعة', 'القيمة': s.soldProducts || 0 },
            { 'البند': 'منتجات راجعة', 'القيمة': s.returnedProducts || 0 },
            { 'البند': 'صافي المنتجات', 'القيمة': s.netProducts || 0 }
          ]), 'ملخص');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(plainOrders(report.orders)), 'كل الطلبات');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(plainOrders(report.soldOrders)), 'مبيعات');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(plainOrders(report.returnedOrders)), 'رواجع');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(plainProducts(report.productSummary)), 'حسب الكود');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(plainGroups(report.groupSummary)), 'حسب المجموعة');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(plainStatuses(report.statusSummary)), 'الحالات');
          var name = (report.contractor || 'all').replace(/[\\/:*?"<>|]+/g, '-');
          XLSX.writeFile(wb, 'MAD-account-' + name + '-' + fromDate.value + '-' + toDate.value + '.xlsx');
        } catch (err) {
          alert('تعذر إنشاء Excel: ' + (err && err.message ? err.message : String(err)));
        } finally {
          excelBtn.disabled = false;
        }
      }
      document.querySelector('.tabs').addEventListener('click', function(event) {
        var btn = event.target.closest('.tab');
        if (!btn) return;
        activeTab = btn.dataset.tab;
        document.querySelectorAll('.tab').forEach(function(item) { item.classList.toggle('active', item === btn); });
        renderTab();
      });
      loadBtn.addEventListener('click', loadReport);
      excelBtn.addEventListener('click', downloadExcel);
      loadReport();
    })();
  </script>
</body>
</html>
