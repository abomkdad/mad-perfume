<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MAD PRINT - ماسح الرواجع السريع</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
    body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: #f8fafc; }
    
    .field { width: 100%; min-height: 50px; border-radius: 12px; border: 2px solid #334155; background: #1e293b; color: #f8fafc; padding: 10px 14px; font-weight: 700; outline: none; transition: 0.2s; }
    .field:focus { border-color: #f43f5e; box-shadow: 0 0 0 4px rgba(244,63,94,0.1); }
    
    /* إخفاء الواجهة القديمة للمكتبة بالكامل */
    #reader svg { display: none !important; }
    #reader { border: none !important; width: 100%; height: 100%; }
    #reader video { object-fit: cover; width: 100% !important; height: 100% !important; min-height: 350px; }
    
    /* حركة خط الليزر الأحمر */
    @keyframes laser-scan {
      0% { top: 0%; }
      100% { top: 100%; }
    }
    .animate-laser {
      animation: laser-scan 1.5s infinite alternate ease-in-out;
    }

    .loader { border: 4px solid rgba(255,255,255,0.1); border-left-color: #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="pb-10 flex flex-col items-center">

  <div class="w-full max-w-md p-5 space-y-6 mt-2">
    
    <div class="text-center">
      <div class="w-16 h-16 bg-rose-900/30 text-rose-500 rounded-2xl flex items-center justify-center mx-auto mb-3 border border-rose-500/50 shadow-lg">
        <i data-lucide="package-x" class="w-8 h-8"></i>
      </div>
      <h1 class="text-3xl font-black text-white mb-2">إرجاع طلقة 🚀</h1>
    </div>

    <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 shadow-sm" id="reasonContainer">
      <label class="block text-rose-400 font-black mb-2 flex items-center gap-1.5"><i data-lucide="alert-circle" class="w-4 h-4"></i> سبب الإرجاع (إجباري):</label>
      <select id="reasonSelect" class="field !border-slate-600 focus:!border-rose-500" onchange="toggleCustomReason()">
        <option value="">-- اضغط لاختيار السبب --</option>
        <option value="العميل لا يرد على الهاتف">العميل لا يرد على الهاتف 📵</option>
        <option value="رفض الاستلام / غيّر رأيه">رفض الاستلام / غيّر رأيه ❌</option>
        <option value="العنوان خاطئ أو غير مكتمل">العنوان خاطئ أو غير مكتمل 📍</option>
        <option value="OTHER">سبب آخر (كتابة يدوية) ✍️</option>
      </select>
      <input type="text" id="customReasonInp" class="field mt-3 hidden" placeholder="اكتب سبب الإرجاع التفصيلي...">
    </div>

    <button id="startScanBtn" onclick="startScanner()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-2xl font-black text-xl flex items-center justify-center gap-3 shadow-lg shadow-blue-900/50 transition-transform active:scale-95">
      <i data-lucide="scan-line" class="w-7 h-7"></i> فتح المسدس (الكاميرا)
    </button>

    <div id="cameraBox" class="hidden flex-col gap-4">
      
      <div class="relative w-full rounded-2xl overflow-hidden bg-black border-2 border-slate-700 shadow-2xl min-h-[350px]">
        
        <div id="reader" class="absolute inset-0"></div>
        
        <div class="absolute inset-0 z-20 flex items-center justify-center pointer-events-none">
          <div class="relative w-[85%] h-[120px] border-2 border-[#3b82f6] rounded-md" style="box-shadow: 0 0 0 9999px rgba(0,0,0,0.6);">
            <div class="absolute left-0 w-full h-[2px] bg-[#ef4444] shadow-[0_0_12px_3px_rgba(239,68,68,0.9)] animate-laser z-30"></div>
          </div>
        </div>

      </div>

      <div class="flex flex-col gap-3">
        <button onclick="stopScanner()" class="w-full bg-[#ef4444] hover:bg-red-600 text-white py-3.5 rounded-xl font-black text-lg shadow-md transition-colors flex justify-center items-center gap-2">
          إيقاف المسح <i data-lucide="x-circle" class="w-5 h-5"></i>
        </button>
        <button onclick="showManualInput()" class="w-full bg-[#b45309] hover:bg-amber-700 text-white py-3.5 rounded-xl font-black text-lg shadow-md transition-colors flex justify-center items-center gap-2">
          إضافة باركود يدوي <i data-lucide="keyboard" class="w-5 h-5"></i>
        </button>
      </div>

    </div>

    <div id="manualBox" class="hidden flex-col gap-3 bg-slate-800 p-4 rounded-2xl border border-slate-700 mt-4">
      <label class="block text-slate-300 font-bold text-sm">أدخل رقم الهاتف أو الباركود:</label>
      <div class="flex gap-2">
        <input type="text" id="manualInp" class="field !min-h-[50px] font-mono text-center tracking-widest text-lg" dir="ltr" placeholder="...">
        <button onclick="handleManualSubmit()" class="bg-blue-600 hover:bg-blue-500 px-5 rounded-xl font-black text-white"><i data-lucide="send" class="w-5 h-5"></i></button>
      </div>
      <button onclick="hideManualInput()" class="text-sm text-slate-400 font-bold mt-2 hover:text-white">إلغاء</button>
    </div>

    <div id="loadingBox" class="hidden flex-col items-center justify-center py-10 bg-slate-800 rounded-2xl border border-slate-700">
      <div class="loader mb-4"></div>
      <div class="text-blue-400 font-black text-lg" id="loadingText">جاري معالجة الطلب...</div>
    </div>

    <div id="resultBox" class="hidden rounded-2xl p-5 border text-center font-black text-lg shadow-lg transition-all duration-300"></div>

  </div>

  <script>
    lucide.createIcons();
    
    // 🟢 رابط الـ API الخاص بك
    const API_URL = "https://script.google.com/macros/s/AKfycbz9B97h7_7B7I_K7zNbrcmAf3GIRPdba0j9EHkRzwy4dZq9VJx5_matbrO75ZCKY7qw/exec";
    
    let scanner = null;

    function toggleCustomReason() {
      const val = document.getElementById('reasonSelect').value;
      const customBox = document.getElementById('customReasonInp');
      if (val === 'OTHER') customBox.classList.remove('hidden');
      else customBox.classList.add('hidden');
    }

    function getReason() {
      let r = document.getElementById('reasonSelect').value;
      if (r === 'OTHER') r = document.getElementById('customReasonInp').value.trim();
      return r;
    }

    function showManualInput() {
      stopScanner();
      document.getElementById('manualBox').classList.remove('hidden');
      document.getElementById('manualBox').classList.add('flex');
    }

    function hideManualInput() {
      document.getElementById('manualBox').classList.add('hidden');
      document.getElementById('manualBox').classList.remove('flex');
      document.getElementById('startScanBtn').classList.remove('hidden');
    }

    // ==========================================
    // 🟢 تشغيل الكاميرا (سريعة جداً FPS: 20)
    // ==========================================
    function startScanner() {
      const reason = getReason();
      if (!reason) { alert("⚠️ يرجى اختيار سبب الإرجاع أولاً!"); return; }

      document.getElementById('resultBox').classList.add('hidden');
      document.getElementById('manualBox').classList.add('hidden');
      document.getElementById('startScanBtn').classList.add('hidden');
      document.getElementById('reasonContainer').classList.add('hidden');
      
      document.getElementById('cameraBox').classList.remove('hidden');
      document.getElementById('cameraBox').classList.add('flex');

      if (!scanner) {
        scanner = new Html5Qrcode("reader");
      }

      // استخدمنا طريقتك + رفعنا الـ fps لـ 20 لسرعة الصاروخ
      scanner.start(
        { facingMode: { exact: "environment" } },
        { 
          fps: 20, 
          // المربع الوهمي للمكتبة عشان يركز المعالج على النص فقط (مخفي بالـ CSS)
          qrbox: { width: 300, height: 120 } 
        },
        (decodedText) => {
          onScanSuccess(decodedText);
        },
        (errorMessage) => {
          // يتم التجاهل للحفاظ على الأداء
        }
      ).catch(err => {
        stopScanner();
        showResult(false, "تعذر فتح الكاميرا: " + err);
      });
    }

    function onScanSuccess(decodedText) {
      stopScanner();
      processReturn(decodedText.trim());
    }

    function stopScanner() {
      if (scanner && scanner.isScanning) {
        scanner.stop().then(() => {
          scanner.clear();
        }).catch(e => console.log(e));
      }
      document.getElementById('cameraBox').classList.add('hidden');
      document.getElementById('cameraBox').classList.remove('flex');
      document.getElementById('reasonContainer').classList.remove('hidden');
      document.getElementById('startScanBtn').classList.remove('hidden');
    }

    // ==========================================
    // 🟢 الإرسال إلى الباك إند
    // ==========================================

    function handleManualSubmit() {
      const val = document.getElementById('manualInp').value.trim();
      if (!val) return;
      document.getElementById('manualInp').value = '';
      hideManualInput();
      processReturn(val);
    }

    async function processReturn(barcode) {
      const reason = getReason();
      if (!reason) { alert("⚠️ يرجى اختيار سبب الإرجاع أولاً!"); return; }

      showLoader("جاري إرجاع الطلب للمخزن...");

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: "return", barcode: barcode, reason: reason })
        });

        const data = await response.json();
        hideLoader();

        if (data.success) {
          showResult(true, `✅ تم إرجاع الطلب بنجاح!\n(${data.orderName || ''})`);
        } else {
          showResult(false, `❌ فشل: ${data.message}`);
        }
      } catch (err) {
        hideLoader();
        showResult(false, "❌ خطأ في الاتصال بالخادم. تفقد الإنترنت.");
      }
    }

    // ==========================================
    // 🟢 دوال الواجهة
    // ==========================================

    function showLoader(text) {
      document.getElementById('resultBox').classList.add('hidden');
      document.getElementById('loadingText').innerText = text;
      document.getElementById('loadingBox').classList.remove('hidden');
      document.getElementById('loadingBox').classList.add('flex');
    }

    function hideLoader() {
      document.getElementById('loadingBox').classList.add('hidden');
      document.getElementById('loadingBox').classList.remove('flex');
      document.getElementById('reasonContainer').classList.remove('hidden');
      document.getElementById('startScanBtn').classList.remove('hidden');
    }

    function showResult(isSuccess, text) {
      const box = document.getElementById('resultBox');
      box.innerText = text;
      if (isSuccess) {
        box.className = "mt-4 bg-emerald-900/30 border border-emerald-500 text-emerald-400 rounded-2xl p-6 text-center font-black text-xl shadow-lg";
      } else {
        box.className = "mt-4 bg-rose-900/30 border border-rose-500 text-rose-400 rounded-2xl p-6 text-center font-black text-xl shadow-lg";
      }
      box.classList.remove('hidden');
      
      // إظهار الأزرار الأساسية مجدداً بعد النتيجة
      document.getElementById('reasonContainer').classList.remove('hidden');
      document.getElementById('startScanBtn').classList.remove('hidden');
    }
  </script>
</body>
</html>
