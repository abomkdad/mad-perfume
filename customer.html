  <style>
    :root {
      --bg: #121a2b;
      --panel: #18243a;
      --panel-2: #202f4a;
      --line: rgba(255,255,255,.16);
      --text: #f5f8ff;
      --muted: #adbad2;
      --gold: #ffd889;
      --gold-2: #c98b12;
      --blue: #2b7bff;
      --green: #25d366;
      --danger: #ff8798;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at 20% -30%, #3c4d6d 0%, #1a2437 42%, var(--bg) 100%);
      color: var(--text);
    }
    button, input, textarea {
      font: inherit;
    }
    button {
      cursor: pointer;
    }
    .wrap {
      max-width: 520px;
      margin: 0 auto;
      padding: 10px 8px 94px;
    }
    .top {
      position: sticky;
      top: 0;
      z-index: 20;
      margin: 0 -8px 10px;
      padding: 10px 8px 12px;
      background: rgba(18,26,43,.94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }
    .top-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 9px;
    }
    .title {
      margin: 0;
      color: var(--gold);
      font-size: 20px;
      line-height: 1.2;
      font-weight: 950;
    }
    .header-wa {
      min-height: 38px;
      border: 1px solid rgba(66,217,122,.72);
      border-radius: 10px;
      padding: 8px 12px;
      background: linear-gradient(180deg, #25d366 0%, #1ea952 100%);
      color: #fff;
      text-decoration: none;
      font-size: 12px;
      font-weight: 950;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .floating-wa {
      position: fixed;
      left: 12px;
      right: auto;
      bottom: 76px;
      z-index: 65;
      width: auto;
      max-width: 178px;
      min-height: 46px;
      margin: 0;
      border: 1px solid rgba(66,217,122,.92);
      border-radius: 999px;
      padding: 7px 11px;
      background: linear-gradient(180deg, #25d366 0%, #159447 100%);
      color: #ffffff;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(0,0,0,.34), 0 0 0 0 rgba(37,211,102,.24);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      animation: floatingWaPulse 2.1s ease-in-out infinite;
    }
    .floating-wa::before {
      content: "WA";
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #ffffff;
      color: #159447;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 950;
      flex: 0 0 auto;
    }
    .floating-wa span,
    .floating-wa small {
      display: block;
      line-height: 1.12;
      text-align: start;
    }
    .floating-wa span {
      font-size: 13px;
      font-weight: 950;
      white-space: nowrap;
    }
    .floating-wa small {
      margin-top: 1px;
      color: rgba(255,255,255,.86);
      font-size: 10px;
      font-weight: 850;
      white-space: nowrap;
    }
    .floating-wa:focus-visible {
      outline: 3px solid rgba(255,216,137,.88);
      outline-offset: 3px;
    }
    @keyframes floatingWaPulse {
      0%, 100% { box-shadow: 0 14px 34px rgba(0,0,0,.38), 0 0 0 0 rgba(37,211,102,.28); filter: brightness(1); }
      50% { box-shadow: 0 14px 34px rgba(0,0,0,.38), 0 0 0 8px rgba(37,211,102,.12); filter: brightness(1.08); }
    }
    body.product-view .floating-wa {
      bottom: 12px;
    }
    body.product-view .product-page {
      padding-bottom: 64px;
    }
    .search {
      width: 100%;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 12px;
      padding: 12px 13px;
      outline: none;
      background: rgba(255,255,255,.07);
      color: var(--text);
      font-size: 14px;
    }
    .search::placeholder {
      color: #8796b4;
    }
    .cat-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 10px 0 1px;
      scroll-snap-type: x proximity;
    }
    .cat-tabs::-webkit-scrollbar { display: none; }
    .cat-hint {
      min-height: 24px;
      width: max-content;
      max-width: 100%;
      margin: 7px auto 0;
      border: 1px solid rgba(37, 99, 235, .22);
      border-radius: 999px;
      padding: 5px 12px;
      background: rgba(37, 99, 235, .08);
      color: #2563eb;
      font-size: 12px;
      line-height: 1.15;
      font-weight: 950;
      text-align: center;
      pointer-events: none;
      animation: categoryHintPulse 1.45s ease-in-out infinite;
    }
    .cat-hint::before,
    .cat-hint::after {
      content: "‹‹";
      display: inline-block;
      color: #16a34a;
      font-weight: 950;
      animation: categoryHintSlide 1.45s ease-in-out infinite;
    }
    .cat-hint::before { margin-inline-end: 6px; }
    .cat-hint::after { margin-inline-start: 6px; }
    .cat-hint.is-used {
      opacity: .18;
      animation: none;
    }
    .cat-hint.is-used::before,
    .cat-hint.is-used::after {
      animation: none;
    }
    @keyframes categoryHintPulse {
      0%, 100% { opacity: .55; transform: translateX(0); }
      50% { opacity: 1; transform: translateX(-6px); }
    }
    @keyframes categoryHintSlide {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(-4px); }
    }

    .cat-tab {
      flex: 0 0 auto;
      min-height: 40px;
      min-width: 88px;
      border: 1px solid rgba(255,255,255,.26);
      border-radius: 12px;
      padding: 9px 12px;
      background: rgba(255,255,255,.1);
      color: #edf4ff;
      font-size: 13px;
      font-weight: 900;
      line-height: 1.15;
      white-space: nowrap;
      scroll-snap-align: start;
    }
    .cat-tab.active {
      border-color: rgba(74,149,255,.85);
      background: linear-gradient(180deg, #2b7bff 0%, #1f6fff 100%);
      color: #fff;
    }
    .cat-tab.offer {
      border-color: rgba(255,216,137,.5);
      background: rgba(255,216,137,.16);
      color: #ffe1a2;
    }
    .cat-tab.offer.active {
      border-color: rgba(255,216,137,.88);
      background: linear-gradient(180deg, #ffd36f 0%, #c98b12 100%);
      color: #172033;
    }
    .status {
      margin: 14px 0;
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .section {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 8px 8px;
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      box-shadow: 0 10px 28px rgba(0,0,0,.22);
    }
    .section-head {
      margin: 0 0 8px;
      padding-bottom: 6px;
      border-bottom: 1px dashed rgba(255,255,255,.18);
      color: var(--gold);
      font-size: 15px;
      font-weight: 950;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .count {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .card {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      background: #1b263d;
      display: flex;
      flex-direction: column;
    }
    .product-img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      background: rgba(255,255,255,.05);
    }
    .card.offer-card .product-img {
      object-fit: contain;
      background: #f2eadb;
    }
    .body {
      padding: 8px;
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 6px;
    }
    .name {
      margin: 0;
      min-height: 38px;
      color: var(--text);
      font-size: 14px;
      line-height: 1.28;
      font-weight: 850;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .code {
      margin: 0;
      color: #c7d5ef;
      font-size: 12px;
      line-height: 1.35;
      font-weight: 780;
    }
    .price {
      margin: 0;
      color: #ffce76;
      font-size: 18px;
      font-weight: 950;
    }
    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: auto;
    }
    .btn {
      min-height: 40px;
      border: 1px solid rgba(74,149,255,.8);
      border-radius: 10px;
      padding: 9px 8px;
      background: linear-gradient(180deg, #2a8bff 0%, #1f6fff 100%);
      color: #fff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 950;
      line-height: 1.2;
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn.alt {
      border-color: rgba(255,255,255,.28);
      background: rgba(255,255,255,.12);
      color: #ecf2ff;
    }
    .btn.wa {
      border-color: rgba(66,217,122,.9);
      background: linear-gradient(180deg, #25d366 0%, #1ea952 100%);
    }
    .btn-row .btn {
      flex: 1;
      min-width: 0;
    }
    .cart-bar {
      position: fixed;
      left: 8px;
      right: 8px;
      bottom: 8px;
      z-index: 50;
      max-width: 520px;
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px;
      background: #111a2d;
      box-shadow: 0 14px 34px rgba(0,0,0,.4);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .cart-bar[hidden],
    .cart-panel[hidden] {
      display: none !important;
    }
    .cart-meta {
      min-width: 0;
      display: grid;
      gap: 2px;
    }
    .cart-meta b {
      color: var(--gold);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cart-meta span {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }
    .cart-open {
      min-width: 112px;
    }
    .cart-panel {
      position: fixed;
      inset: 0;
      z-index: 70;
      padding: 10px 8px;
      background: rgba(0,0,0,.58);
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .cart-sheet {
      width: min(520px, 100%);
      max-height: 88vh;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 18px 18px 14px 14px;
      background: #121c31;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .cart-head {
      padding: 10px;
      border-bottom: 1px solid rgba(255,255,255,.12);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .cart-title {
      margin: 0;
      color: var(--gold);
      font-size: 16px;
      font-weight: 950;
    }
    .cart-close {
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 8px;
      padding: 6px 9px;
      background: rgba(255,255,255,.1);
      color: #f2f6ff;
      font-size: 12px;
      font-weight: 850;
    }
    .cart-recap,
    .cart-costs,
    .order-form {
      margin: 8px 10px 0;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 12px;
      background: rgba(255,255,255,.04);
      padding: 9px 10px;
    }
    .cart-recap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      background: linear-gradient(180deg, rgba(255,216,137,.13), rgba(255,255,255,.05));
      border-color: rgba(255,216,137,.22);
    }
    .cart-recap span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }
    .cart-recap strong {
      color: var(--gold);
      font-size: 15px;
      font-weight: 950;
      white-space: nowrap;
    }
    .order-form {
      display: grid;
      gap: 8px;
    }
    .order-form[hidden],
    .cart-costs[hidden] {
      display: none !important;
    }
    .order-form h3 {
      margin: 0;
      color: var(--gold);
      font-size: 14px;
      font-weight: 950;
    }
    .order-hint {
      margin: -2px 0 0;
      color: var(--muted);
      font-size: 11px;
      font-weight: 750;
      line-height: 1.35;
    }
    .order-field {
      display: grid;
      gap: 4px;
    }
    .order-field span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }
    .order-input {
      width: 100%;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 10px;
      padding: 11px 12px;
      outline: none;
      background: rgba(255,255,255,.08);
      color: var(--text);
      font-size: 14px;
    }
    .order-input::placeholder {
      color: #8796b4;
    }
    .order-input:focus {
      border-color: rgba(74,149,255,.82);
      box-shadow: 0 0 0 3px rgba(31,111,255,.18);
    }
    .order-input.invalid {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(239,111,131,.18);
    }
    textarea.order-input {
      min-height: 64px;
      resize: vertical;
    }
    .order-error {
      margin: 0;
      border-radius: 9px;
      padding: 7px 8px;
      background: rgba(239,111,131,.12);
      color: #ffb8c3;
      font-size: 11px;
      font-weight: 850;
      line-height: 1.35;
    }
    .order-error[hidden] {
      display: none !important;
    }
    .order-error.success {
      background: rgba(22, 163, 74, .14);
      color: #bbf7d0;
      border: 1px solid rgba(34, 197, 94, .28);
    }
    .cart-items {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .cart-empty {
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 11px;
      color: var(--muted);
      text-align: center;
      font-size: 12px;
      line-height: 1.45;
    }
    .cart-empty strong {
      display: block;
      margin-bottom: 3px;
      color: var(--text);
      font-size: 13px;
    }
    .cart-item {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 12px;
      padding: 8px;
      background: rgba(255,255,255,.04);
    }
    .cart-thumb {
      width: 54px;
      height: 54px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 10px;
      object-fit: cover;
      background: rgba(255,255,255,.08);
    }
    .cart-line {
      min-width: 0;
    }
    .cart-item h4 {
      margin: 0 0 3px;
      color: var(--text);
      font-size: 12px;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .cart-code,
    .cart-line-total {
      margin: 0;
      font-size: 11px;
      font-weight: 800;
    }
    .cart-code {
      color: var(--muted);
    }
    .cart-line-total {
      margin-top: 2px;
      color: #ffce76;
      font-size: 12px;
    }
    .cart-tools {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }
    .remove-btn {
      border: 1px solid rgba(239,111,131,.52);
      border-radius: 7px;
      padding: 5px 8px;
      background: rgba(239,111,131,.12);
      color: #ffb8c3;
      font-size: 10px;
      font-weight: 850;
    }
    .qty {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 11px;
      padding: 4px;
      background: rgba(255,255,255,.08);
    }
    .qty button {
      width: 25px;
      height: 25px;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 8px;
      background: rgba(255,255,255,.1);
      color: #fff;
      font-size: 15px;
      font-weight: 950;
      line-height: 1;
    }
    .qty span {
      min-width: 18px;
      text-align: center;
      font-size: 13px;
      font-weight: 950;
    }
    .cart-costs {
      margin-bottom: 10px;
      display: grid;
      gap: 6px;
    }
    .cost-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }
    .cost-row strong {
      color: var(--text);
      font-size: 13px;
      white-space: nowrap;
    }
    .cost-row.final {
      padding-top: 6px;
      border-top: 1px dashed rgba(255,255,255,.16);
      color: var(--gold);
      font-size: 13px;
    }
    .cost-row.final strong {
      color: var(--gold);
      font-size: 15px;
      font-weight: 950;
    }
    .cost-note {
      border-radius: 9px;
      padding: 7px 8px;
      background: rgba(255,216,137,.1);
      color: #ffe0a2;
      font-size: 11px;
      font-weight: 850;
      line-height: 1.35;
    }
    .cart-actions {
      border-top: 1px solid rgba(255,255,255,.12);
      padding: 10px;

    function cartCount() {
      let count = 0;
      for (const item of cart.values()) count += item.qty;
      return count;
    }
    function cartSubtotal() {
      let total = 0;
      for (const item of cart.values()) total += item.product.price * item.qty;
      return total;
    }
    function deliveryFee(subtotal) {
      return subtotal > 0 && subtotal < FREE_DELIVERY_MIN ? DELIVERY_FEE : 0;
    }
    function grandTotal() {
      const subtotal = cartSubtotal();
      return subtotal + deliveryFee(subtotal);
    }
    function orderFields() {
      return [els.customerName, els.customerPhone, els.customerAddress];
    }
    function customerDetails() {
      return {
        name: safe(els.customerName.value).trim(),
        phone: safe(els.customerPhone.value).trim(),
        city: safe(els.customerAddress.value).trim()
      };
    }
    function focusFirstMissingOrderField() {
      const missing = orderFields().find((field) => !safe(field.value).trim());
      const target = missing || els.customerName;
      els.orderForm.scrollIntoView({ block: "start", behavior: "smooth" });
      setTimeout(() => target.focus(), 180);
    }
    function validateOrderForm(shouldFocus = false) {
      els.orderFormError.classList.remove("success");
      els.orderFormError.textContent = t("orderFormError");
      let firstMissing = null;
      for (const field of orderFields()) {
        const missing = !safe(field.value).trim();
        field.classList.toggle("invalid", missing);
        if (missing && !firstMissing) firstMissing = field;
      }
      const invalidPhone = !firstMissing && !isValidPhone(els.customerPhone.value);
      if (invalidPhone) {
        els.customerPhone.classList.add("invalid");
        els.orderFormError.textContent = t("orderPhoneError");
      }
      els.orderFormError.hidden = !firstMissing && !invalidPhone;
      if (firstMissing && shouldFocus) focusFirstMissingOrderField();
      if (invalidPhone && shouldFocus) {
        els.orderForm.scrollIntoView({ block: "start", behavior: "smooth" });
        setTimeout(() => els.customerPhone.focus(), 180);
      }
      return !firstMissing && !invalidPhone;
    }

    function addToCart(productId) {
      const product = products.find((item) => item.id === productId);

      else cart.set(productId, { product, qty: 1 });
      trackEvent("AddToCart", {
        content_type: "product",
        content_id: product.code,
        content_ids: [product.code],
        content_name: product.name,
        quantity: 1,
        currency: "ILS",
        value: product.price

        cartAutoOpened = true;
        openCartPanel(false, "add_to_cart");
      }

    function updateQty(productId, delta) {

      if (!item) return;

        if (category === OFFER_CATEGORY) continue;
        const catId = categoryParamValue(category, categories);
        tabs.push(`<button class="cat-tab ${selectedCategory === category ? "active" : ""}" data-cat="${escapeHtml(category)}" data-cat-id="${escapeHtml(catId)}" title="cat=${escapeHtml(catId)}" type="button">${escapeHtml(categoryLabel(category))}</button>`);
      }
      els.categoryTabs.innerHTML = tabs.join("");
    }
    function offerItemCount(product) {
      const text = (safe(product.code) + " " + safe(product.name)).toUpperCase();
      const codes = text.match(/\b[A-Z]{1,5}\d{2,4}\b/g) || [];
      return new Set(codes).size || 1;
    }
    function effectiveProductPrice(product) {
      const base = Number(product.price) > 0 ? Number(product.price) : 100;
      return base;
    }
    function catalogHeroHtml() {
      return [
        "<section class=\"sales-hero\" aria-label=\"" + escapeHtml(t("heroTitle")) + "\">",
        "<h2>" + escapeHtml(t("heroTitle")) + "</h2>",
        "<p>" + escapeHtml(t("heroSubtitle")) + "</p>",
        "<div class=\"sales-offer\">" + escapeHtml(t("heroOffer")) + "</div>",
        "<div class=\"sales-trust\">",
        "<span>" + escapeHtml(t("trustCustomers")) + "</span>",
        "<span>" + escapeHtml(t("trustBranches")) + "</span>",
        "<span>" + escapeHtml(t("trustService")) + "</span>",
        "<span>" + escapeHtml(t("trustPayment")) + "</span>",
        "</div>",
        "<button class=\"btn wa\" type=\"button\" data-scroll-offers>" + escapeHtml(t("heroCta")) + "</button>",
        "</section>"
      ].join("");
    }
    function renderProducts() {
      const query = safe(els.search.value).trim().toLowerCase();
      const filtered = products.filter((product) => {
        const category = productCategory(product);
        const matchesCategory = selectedCategory === "all" || selectedCategory === category;
        return matchesCategory && (!query || productSearchText(product).includes(query));
      });
      if (!filtered.length) {
        els.status.hidden = false;
        els.status.textContent = t("empty");
        els.content.innerHTML = "";
        return;
      }
      els.status.hidden = true;
      const grouped = new Map();
      for (const product of filtered) {
        const category = selectedCategory === "all" ? productCategory(product) : selectedCategory;
        if (!grouped.has(category)) grouped.set(category, []);
        grouped.get(category).push(product);
      }
      els.content.innerHTML = catalogHeroHtml() + customerVideoCarouselHtml("catalog") + sortedCategories([...grouped.keys()]).map((category) => {
        const list = grouped.get(category) || [];
        const cards = list.map((product) => {
          const qty = cart.get(product.id)?.qty || 0;
          const offer = productCategory(product) === OFFER_CATEGORY;
          return `
            <article class="card ${offer ? "offer-card" : ""}" data-id="${escapeHtml(product.id)}">
              <img class="product-img" src="${escapeHtml(product.image)}" alt="${escapeHtml(product.name)}" loading="lazy">
              <div class="body">
                <h3 class="name">${escapeHtml(product.name)}</h3>
                <p class="code">MAD - ${escapeHtml(t("code"))}: ${escapeHtml(product.code)}</p>
                <p class="price">${escapeHtml(money(product.price))}</p>
                <div class="btn-row">
                  <button class="btn wa add-btn" data-id="${escapeHtml(product.id)}" type="button">${escapeHtml(qty ? `${t("added")} (${qty})` : t("orderNow"))}</button>
                  <a class="btn alt details-btn" href="${escapeHtml(productPageUrl(product))}">${escapeHtml(pt("details"))}</a>
                </div>
              </div>
            </article>
          `;
        }).join("");
        return `
          <section class="section">
            <h2 class="section-head">
              <span>${escapeHtml(categoryLabel(category))}</span>
              <span class="count">${list.length}</span>
            </h2>
            <div class="grid">${cards}</div>
          </section>
        `;
      }).join("");
      attachReviewVideoTracking(els.content);
    }
    function normalizeProduct(product, index) {
      return {
        id: safe(product.id || `${locale}:instant:${index}`),
        code: safe(product.code || "MAD"),
        name: safe(product.name || product.code || "MAD"),
        description: safe(product.description || ""),
        category: safe(product.category || "Other"),
        image: safe(product.image || ""),
        link: safe(product.link || ""),
        price: Number(product.price) > 0 ? Number(product.price) : 100
      };
    }
    function setProducts(nextProducts) {
      products = nextProducts
        .map(normalizeProduct)
        .filter((product) => product.code && product.image)
        .map((product) => ({ ...product, price: effectiveProductPrice(product) }));
    }
    function renderCurrentProducts() {
      const productKey = requestedProductKey();
      if (productKey) {
        const product = findProductByKey(productKey);
        if (product) {
          renderProductPage(product);
          return true;
        }
        return false;
      }
      const categories = sortedCategories(products.map(productCategory));
      selectedCategory = categoryFromUrl(categories) || (categories.includes(OFFER_CATEGORY) ? OFFER_CATEGORY : "all");
      renderCategoryTabs();
      renderProducts();
      return true;
    }
    function clearOldCatalogCache() {
      try {
        Object.keys(localStorage)
          .filter((key) => key.startsWith("madCatalog:"))
          .forEach((key) => localStorage.removeItem(key));
      } catch (error) {
        console.warn(error);
      }
    }
    async function fetchCatalogProducts(catalogLocale) {
      const url = new URL(CATALOG_URL);
      url.searchParams.set("lang", catalogLocale);
      url.searchParams.set("_", Date.now().toString());
      const response = await fetch(url.toString(), { cache: "no-store" });
      if (!response.ok) throw new Error(`Catalog failed: ${response.status}`);
      const rows = await response.json();
      if (!Array.isArray(rows)) throw new Error("Catalog is not an array");
      return rows
        .map((row, index) => normalizeRow(row, index, catalogLocale))
        .filter((product) => product.code && product.image);
    }
    async function loadCatalog() {
      els.status.hidden = true;
      clearOldCatalogCache();
      try {
        const freshProducts = await fetchCatalogProducts(locale);
        if (!freshProducts.length) throw new Error("Catalog is empty");
        setProducts(freshProducts);
        if (!renderCurrentProducts()) {
          const productKey = requestedProductKey();
          if (productKey) {
            const alternateLocales = ["ar", "he"].filter((item) => item !== locale);
            for (const alternateLocale of alternateLocales) {
              const alternateProducts = await fetchCatalogProducts(alternateLocale);
              setProducts([...freshProducts, ...alternateProducts]);
              if (renderCurrentProducts()) return;
            }
          }
          document.body.classList.remove("product-view");
          els.status.hidden = false;
          els.status.textContent = pt("productNotFound");
        }
      } catch (error) {
        console.warn(error);
        document.body.classList.remove("product-view");
        els.status.hidden = false;
        els.status.textContent = t("loadError");
      }
    }

    function applyText() {
      document.title = t("title");
      els.title.textContent = t("title");
      els.search.placeholder = t("search");
      els.categoryHint.textContent = t("categoryHint");
      els.headerWa.textContent = "WhatsApp";
      els.headerWa.href = waUrl(t("consultGreeting"));
      els.floatingWaText.textContent = t("agentWa");
      els.floatingWaHint.textContent = t("agentWaHint");
      els.floatingWa.href = waUrl(t("agentGreeting"));
      els.floatingWa.setAttribute("aria-label", t("agentWa") + " - " + t("agentWaHint"));
      els.openCart.textContent = t("cartCta");
      els.cartTitle.textContent = t("cartTitle");
      els.closeCart.textContent = t("close");
      els.continueShopping.textContent = t("continueShopping");
      els.clearCart.textContent = t("clear");
      els.sendCart.textContent = t("send");
      els.orderFormTitle.textContent = t("orderFormTitle");
      els.orderFormHint.textContent = t("orderFormHint");
      els.customerNameLabel.textContent = t("customerName");
      els.customerPhoneLabel.textContent = t("customerPhone");
      els.customerAddressLabel.textContent = t("customerAddress");
      els.customerName.placeholder = t("customerNamePlaceholder");
      els.customerPhone.placeholder = t("customerPhonePlaceholder");
      els.customerAddress.placeholder = t("customerAddressPlaceholder");
      els.orderFormError.textContent = t("orderFormError");
    }

    els.categoryTabs.addEventListener("scroll", () => els.categoryHint.classList.add("is-used"), { once: true });
    els.categoryTabs.addEventListener("pointerdown", () => els.categoryHint.classList.add("is-used"), { once: true });
    els.categoryTabs.addEventListener("click", (event) => {
      const button = event.target.closest(".cat-tab");
      if (!button) return;
      selectedCategory = safe(button.getAttribute("data-cat")) || "all";
      updateCategoryUrl(selectedCategory, products.map(productCategory));
      renderCategoryTabs();
      renderProducts();
    });
    els.content.addEventListener("click", (event) => {
      const scrollOffers = event.target.closest("[data-scroll-offers]");
      if (scrollOffers) {
        event.preventDefault();
        const firstSection = els.content.querySelector(".section");
        if (firstSection) firstSection.scrollIntoView({ block: "start", behavior: "smooth" });
        trackEvent("ViewContent", { event_source: "catalog_offer_banner" });
        return;
      }
      const addButton = event.target.closest(".add-btn");
      if (addButton) {
        addToCart(safe(addButton.getAttribute("data-id")));
        return;
      }
      if (event.target.closest(".details-btn")) return;
      const card = event.target.closest(".card");
      if (card) {
        const product = products.find((item) => item.id === safe(card.getAttribute("data-id")));
        if (product) location.href = productPageUrl(product);
      }
    });
    els.search.addEventListener("input", renderProducts);
    els.openCart.addEventListener("click", () => openCartPanel(false, "cart_bar"));
    els.closeCart.addEventListener("click", () => {
      els.cartPanel.hidden = true;
    });
    els.continueShopping.addEventListener("click", () => {
      els.cartPanel.hidden = true;
      const firstSection = els.content.querySelector(".section");
      if (firstSection) firstSection.scrollIntoView({ block: "start", behavior: "smooth" });
    });
    els.cartPanel.addEventListener("click", (event) => {
      if (event.target === els.cartPanel) els.cartPanel.hidden = true;
    });
    els.cartItems.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-act]");
      if (!button) return;
      const id = safe(button.getAttribute("data-id"));
      const act = safe(button.getAttribute("data-act"));
      if (act === "rm") {
        cart.delete(id);
        renderCart();
        updateAddButtons();
        return;
      }
      updateQty(id, act === "inc" ? 1 : -1);
    });
    els.clearCart.addEventListener("click", () => {
      cart.clear();
      renderCart();
      updateAddButtons();
    });
    els.sendCart.addEventListener("click", submitCartOrder);
    els.orderForm.addEventListener("submit", (event) => {
      event.preventDefault();
      submitCartOrder();
    });
    for (const field of orderFields()) {
      field.addEventListener("input", () => {
        field.classList.remove("invalid");
        els.orderFormError.classList.remove("success");
        els.orderFormError.textContent = t("orderFormError");
        if (orderFields().every((item) => safe(item.value).trim()) && isValidPhone(els.customerPhone.value)) els.orderFormError.hidden = true;
      });
    }
    els.headerWa.addEventListener("click", () => trackEvent("Contact", {
      event_source: "header_whatsapp",
      phone: WA_NUMBER
    }));
    els.floatingWa.addEventListener("click", () => trackEvent("Contact", {
      event_source: "floating_whatsapp",
      phone: WA_NUMBER
    }));

    applyText();
    renderCart();
    loadCatalog();
  </script>
</body>
</html>
