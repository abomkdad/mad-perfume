    function cartCount() {
      let count = 0;
      for (const item of cart.values()) count += item.qty;
      return count;
    }
    function cartSubtotal() {
      let total = 0;
      for (const item of cart.values()) total += item.product.price * item.qty;
      return total;
    }
    function deliveryFee(subtotal) {
      return subtotal > 0 && subtotal < FREE_DELIVERY_MIN ? DELIVERY_FEE : 0;
    }
    function grandTotal() {
      const subtotal = cartSubtotal();
      return subtotal + deliveryFee(subtotal);
    }
    function orderFields() {
      return [els.customerName, els.customerPhone, els.customerAddress];
    }
    function customerDetails() {
      return {
        name: safe(els.customerName.value).trim(),
        phone: safe(els.customerPhone.value).trim(),
        city: safe(els.customerAddress.value).trim()
      };
    }
    function focusFirstMissingOrderField() {
      const missing = orderFields().find((field) => !safe(field.value).trim());
      const target = missing || els.customerName;
      els.orderForm.scrollIntoView({ block: "start", behavior: "smooth" });
      setTimeout(() => target.focus(), 180);
    }
    function validateOrderForm(shouldFocus = false) {
      els.orderFormError.classList.remove("success");
      els.orderFormError.textContent = t("orderFormError");
      let firstMissing = null;
      for (const field of orderFields()) {
        const missing = !safe(field.value).trim();
        field.classList.toggle("invalid", missing);
        if (missing && !firstMissing) firstMissing = field;
      }
      els.orderFormError.hidden = !firstMissing;
      if (firstMissing && shouldFocus) focusFirstMissingOrderField();
      return !firstMissing;
    }
    function openCartPanel(focusDetails = false, source = "cart") {

          currency: "ILS",
          value: grandTotal()

      if (focusDetails) focusFirstMissingOrderField();

    function addToCart(productId) {
      const product = products.find((item) => item.id === productId);
      if (!product) return;
      const current = cart.get(productId);
      if (current) current.qty += 1;
      else cart.set(productId, { product, qty: 1 });
      trackEvent("AddToCart", {
        content_type: "product",
        content_id: product.code,
        content_ids: [product.code],
        content_name: product.name,
        quantity: 1,
        currency: "ILS",
        value: product.price
      });
      renderCart();
      updateAddButtons();
      if (!cartAutoOpened) {
        cartAutoOpened = true;
        openCartPanel(false, "add_to_cart");
      }
    }
    function updateQty(productId, delta) {
      const item = cart.get(productId);
      if (!item) return;
      item.qty += delta;
      if (item.qty <= 0) cart.delete(productId);
      else if (delta > 0) trackEvent("AddToCart", { content_id: item.product.code, quantity: 1, currency: "ILS", value: item.product.price });
      renderCart();
      updateAddButtons();
    }
    function updateAddButtons() {

      els.cartCosts.innerHTML = `

    function offerItemCount(product) {
      const text = (safe(product.code) + " " + safe(product.name)).toUpperCase();
      const codes = text.match(/\b[A-Z]{1,5}\d{2,4}\b/g) || [];
      return new Set(codes).size || 1;

    function effectiveProductPrice(product) {
      const base = Number(product.price) > 0 ? Number(product.price) : 100;
      if (productCategory(product) === OFFER_CATEGORY) {
        const count = offerItemCount(product);
        if (count >= 5) return 500;
        if (count >= 3) return 350;
      }
      return base;

    function renderProducts() {

    function normalizeProduct(product, index) {
      return {
        id: safe(product.id || `${locale}:instant:${index}`),
        code: safe(product.code || "MAD"),
        name: safe(product.name || product.code || "MAD"),
        description: safe(product.description || ""),
        category: safe(product.category || "Other"),
        image: safe(product.image || ""),
        link: safe(product.link || ""),
        price: Number(product.price) > 0 ? Number(product.price) : 100
      };
    }
    function setProducts(nextProducts) {
      products = nextProducts
        .map(normalizeProduct)
        .filter((product) => product.code && product.image)
        .map((product) => ({ ...product, price: effectiveProductPrice(product) }));

    function renderCurrentProducts() {
      const productKey = requestedProductKey();
      if (productKey) {
        const product = findProductByKey(productKey);
        if (product) {
          renderProductPage(product);
          return true;
        }
        return false;
      }
      selectedCategory = products.some((product) => productCategory(product) === OFFER_CATEGORY) ? OFFER_CATEGORY : "all";
      renderCategoryTabs();
      renderProducts();
      return true;
    }
    function catalogCacheKey() {
      return `madCatalog:${locale}`;
    }
    function readCachedCatalog() {
      try {
        const cached = JSON.parse(localStorage.getItem(catalogCacheKey()) || "null");
        if (cached && Array.isArray(cached.products) && cached.products.length) return cached.products;
      } catch (error) {
        console.warn(error);
      }
      return [];
    }
    function saveCachedCatalog(nextProducts) {
      try {
        localStorage.setItem(catalogCacheKey(), JSON.stringify({
          savedAt: Date.now(),
          products: nextProducts.map((product) => ({
            id: product.id,
            code: product.code,
            name: product.name,
            category: product.category,
            image: product.image,
            link: product.link,
            price: product.price
          }))
        }));
      } catch (error) {
        console.warn(error);
      }
    }
    function renderInstantCatalog() {
      const cached = readCachedCatalog();
      const requestedKey = requestedProductKey();
      const fallbackCatalog = requestedKey
        ? [
            ...(FALLBACK_CATALOG[locale] || []),
            ...Object.keys(FALLBACK_CATALOG)
              .filter((catalogLocale) => catalogLocale !== locale)
              .flatMap((catalogLocale) => FALLBACK_CATALOG[catalogLocale] || [])
          ]
        : (FALLBACK_CATALOG[locale] || []);
      const fallback = requestedKey ? fallbackCatalog : (cached.length ? cached : fallbackCatalog);
      if (!fallback.length) return false;
      setProducts(fallback);
      return renderCurrentProducts();
    }
    async function loadCatalog() {
      els.status.hidden = true;
      const renderedInstantly = renderInstantCatalog();
      const url = new URL(CATALOG_URL);
      url.searchParams.set("lang", locale);
      url.searchParams.set("_", Date.now().toString());
      try {
        const response = await fetch(url.toString(), { cache: "no-store" });
        if (!response.ok) throw new Error(`Catalog failed: ${response.status}`);
        const rows = await response.json();
        if (!Array.isArray(rows)) throw new Error("Catalog is not an array");
        const freshProducts = rows.map(normalizeRow).filter((product) => product.code && product.image);
        setProducts(freshProducts);
        saveCachedCatalog(products);
        if (!renderCurrentProducts()) {
          if (renderedInstantly) return;
          document.body.classList.remove("product-view");
          els.status.hidden = false;
          els.status.textContent = pt("productNotFound");
        }
      } catch (error) {
        console.warn(error);
        if (!renderedInstantly) {
          els.status.hidden = false;
          els.status.textContent = t("loadError");
        }
      }
    }

    });
    els.continueShopping.addEventListener("click", () => {
      els.cartPanel.hidden = true;
      const firstSection = els.content.querySelector(".section");
      if (firstSection) firstSection.scrollIntoView({ block: "start", behavior: "smooth" });
    });
    els.cartPanel.addEventListener("click", (event) => {
      if (event.target === els.cartPanel) els.cartPanel.hidden = true;
    });
    els.cartItems.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-act]");
      if (!button) return;
      const id = safe(button.getAttribute("data-id"));
      const act = safe(button.getAttribute("data-act"));
      if (act === "rm") {
        cart.delete(id);
        renderCart();
        updateAddButtons();
        return;
      }
      updateQty(id, act === "inc" ? 1 : -1);
    });
    els.clearCart.addEventListener("click", () => {
      cart.clear();
      renderCart();
      updateAddButtons();
    });
    els.sendCart.addEventListener("click", submitCartOrder);
    els.orderForm.addEventListener("submit", (event) => {
      event.preventDefault();
      submitCartOrder();
    });
    for (const field of orderFields()) {
      field.addEventListener("input", () => {
        field.classList.remove("invalid");
        els.orderFormError.classList.remove("success");
        els.orderFormError.textContent = t("orderFormError");
        if (orderFields().every((item) => safe(item.value).trim())) els.orderFormError.hidden = true;
      });
    }
    els.headerWa.addEventListener("click", () => trackEvent("Contact", {
      event_source: "header_whatsapp",
      phone: WA_NUMBER
    }));
    els.floatingWa.addEventListener("click", () => trackEvent("Contact", {
      event_source: "floating_whatsapp",
      phone: WA_NUMBER
    }));

    applyText();
    renderCart();
    loadCatalog();
  </script>
</body>
</html>
