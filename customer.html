              <input id="productCustomerName" class="order-input" autocomplete="name" required placeholder="${escapeHtml(pt("namePlaceholder"))}">
            </label>
            <label class="order-field">
              <span>${escapeHtml(pt("phone"))}</span>
              <input id="productCustomerPhone" class="order-input" type="tel" inputmode="tel" autocomplete="tel" required placeholder="${escapeHtml(pt("phonePlaceholder"))}">
            </label>
            <label class="order-field">
              <span>${escapeHtml(pt("city"))}</span>
              <input id="productCustomerCity" class="order-input" autocomplete="address-level2" required placeholder="${escapeHtml(pt("cityPlaceholder"))}">
            </label>
            <label class="order-field">
              <span>${escapeHtml(pt("address"))}</span>
              <textarea id="productCustomerAddress" class="order-input" autocomplete="street-address" required placeholder="${escapeHtml(pt("addressPlaceholder"))}"></textarea>
            </label>
            <div class="product-payment-note">${escapeHtml(landing.paymentNote)}</div>
            <label class="product-consent">
              <input id="productCashConfirm" type="checkbox" required>
              <span>${escapeHtml(pt("cashConfirm"))}</span>
            </label>
            <p id="productFormError" class="order-error" hidden>${escapeHtml(pt("formError"))}</p>
            <button class="btn wa product-main-cta" type="submit">${escapeHtml(pt("submit"))}</button>
          </form>
        </section>
        <section class="product-section">
          <h2>${escapeHtml(landing.noNeedTitle)}</h2>
          <p>${escapeHtml(landing.noNeedText)}</p>
        </section>
        <section class="product-section">
          <h2>${escapeHtml(landing.whyHeadline)}</h2>
          <ul class="product-benefit-grid">
            ${landing.whyItems.map((item) => `<li><strong>${escapeHtml(item.title)}</strong>${escapeHtml(item.text)}</li>`).join("")}
          </ul>
        </section>
        <section class="product-section">
          <h2>${escapeHtml(landing.customerTitle)}</h2>
          <div class="product-proof">${escapeHtml(landing.customerText)}</div>
        </section>
        <section class="product-section">
          <h2>${escapeHtml(pt("deliveryTitle"))}</h2>
          <p>${escapeHtml(pt("deliveryText"))}</p>
        </section>
        <section class="product-section">
          <h2>${escapeHtml(pt("faqTitle"))}</h2>
          <ul class="product-faq-list">
            ${landing.faqs.map((item) => `<li><strong>${escapeHtml(item.q)}</strong>${escapeHtml(item.a)}</li>`).join("")}
          </ul>
        </section>
        <div class="product-sticky">
          <div>
            <b>${escapeHtml(product.name)}</b>
            <span>${escapeHtml(money(product.price))}</span>
          </div>
          <a class="btn wa" href="#productLeadForm" data-focus-lead>${escapeHtml(landing.primary)}</a>
        </div>
      `;
      const form = page.querySelector("#productLeadForm");
      const focusLeadForm = (event) => {
        event.preventDefault();
        form.scrollIntoView({ block: "center", behavior: "smooth" });
        setTimeout(() => page.querySelector("#productCustomerName").focus(), 220);
      };
      page.querySelectorAll("[data-focus-lead]").forEach((link) => link.addEventListener("click", focusLeadForm));
      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const name = safe(page.querySelector("#productCustomerName").value).trim();
        const phone = safe(page.querySelector("#productCustomerPhone").value).trim();
        const city = safe(page.querySelector("#productCustomerCity").value).trim();
        const address = safe(page.querySelector("#productCustomerAddress").value).trim().replace(/\s*\n+\s*/g, ", ");
        const cashConfirm = page.querySelector("#productCashConfirm").checked;
        const missing = !name || !phone || !city || !address || !cashConfirm;
        page.querySelector("#productFormError").hidden = !missing;
        page.querySelectorAll(".product-lead .order-input").forEach((field) => {
          field.classList.toggle("invalid", !safe(field.value).trim());
        });
        page.querySelector(".product-consent").classList.toggle("invalid", !cashConfirm);
        if (missing) return;
        trackEvent("Contact");
        window.open(waUrl(productOrderMessage(product, { name, phone, city, address, cashConfirm })), "_blank", "noopener");
      });
    }
    function cartCount() {
      let count = 0;
      for (const item of cart.values()) count += item.qty;
      return count;
    }
    function cartSubtotal() {
      let total = 0;
      for (const item of cart.values()) total += item.product.price * item.qty;
      return total;
    }
    function deliveryFee(subtotal) {
      return subtotal > 0 && subtotal < FREE_DELIVERY_MIN ? DELIVERY_FEE : 0;
    }
    function grandTotal() {
      const subtotal = cartSubtotal();
      return subtotal + deliveryFee(subtotal);
    }
    function orderFields() {
      return [els.customerName, els.customerPhone, els.customerAddress];
    }
    function customerDetails() {
      return {
        name: safe(els.customerName.value).trim(),
        phone: safe(els.customerPhone.value).trim(),
        address: safe(els.customerAddress.value).trim().replace(/\s*\n+\s*/g, ", ")
      };
    }
    function focusFirstMissingOrderField() {
      const missing = orderFields().find((field) => !safe(field.value).trim());
      const target = missing || els.customerName;
      els.orderForm.scrollIntoView({ block: "start", behavior: "smooth" });
      setTimeout(() => target.focus(), 180);
    }
    function validateOrderForm(shouldFocus = false) {
      let firstMissing = null;
      for (const field of orderFields()) {
        const missing = !safe(field.value).trim();
        field.classList.toggle("invalid", missing);
        if (missing && !firstMissing) firstMissing = field;
      }
      els.orderFormError.hidden = !firstMissing;
      if (firstMissing && shouldFocus) focusFirstMissingOrderField();
      return !firstMissing;
    }
    function openCartPanel(focusDetails = false) {
      els.cartPanel.hidden = false;
      if (focusDetails) focusFirstMissingOrderField();
    }
    function addToCart(productId) {
      const product = products.find((item) => item.id === productId);
      if (!product) return;
      const current = cart.get(productId);
      if (current) current.qty += 1;
      else cart.set(productId, { product, qty: 1 });
      trackEvent("AddToCart", {
        content_type: "product",
        content_id: product.code,
        content_ids: [product.code],
        content_name: product.name,
        quantity: 1,
        currency: "ILS",
        value: product.price
      });
      renderCart();
      updateAddButtons();
    }
    function updateQty(productId, delta) {
      const item = cart.get(productId);
      if (!item) return;
      item.qty += delta;
      if (item.qty <= 0) cart.delete(productId);
      else if (delta > 0) trackEvent("AddToCart", { content_id: item.product.code, quantity: 1, currency: "ILS", value: item.product.price });
      renderCart();
      updateAddButtons();
    }
    function updateAddButtons() {
      document.querySelectorAll(".add-btn").forEach((button) => {
        const id = safe(button.getAttribute("data-id"));
        const qty = cart.get(id)?.qty || 0;
        button.textContent = qty ? `${t("added")} (${qty})` : t("add");
      });
    }
    function renderCart() {
      const count = cartCount();
      const subtotal = cartSubtotal();
      const fee = deliveryFee(subtotal);
      const total = subtotal + fee;
      const summary = `${count} ${t("items")}`;
      els.cartBar.hidden = count === 0;
      els.cartSummary.textContent = summary;
      els.cartTotal.textContent = `${t("total")}: ${money(total)}`;
      els.cartPanelSummary.textContent = summary;
      els.cartPanelTotal.textContent = money(total);

      if (count === 0) {
        els.orderForm.hidden = true;
        els.cartCosts.hidden = true;
        els.sendCart.disabled = true;
        els.orderFormError.hidden = true;
        orderFields().forEach((field) => field.classList.remove("invalid"));
        els.cartItems.innerHTML = `
          <div class="cart-empty">
            <strong>${escapeHtml(t("cartEmptyTitle"))}</strong>
            <span>${escapeHtml(t("cartEmptyHint"))}</span>
          </div>
        `;
        return;
      }

      els.orderForm.hidden = false;
      els.cartCosts.hidden = false;
      els.sendCart.disabled = false;
      els.cartItems.innerHTML = [...cart.entries()].map(([id, item]) => {
        const product = item.product;
        const lineTotal = product.price * item.qty;
        return `
          <article class="cart-item">
            <img class="cart-thumb" src="${escapeHtml(product.image)}" alt="${escapeHtml(product.name)}">
            <div class="cart-line">
              <h4>${escapeHtml(product.name)}</h4>
              <p class="cart-code">${escapeHtml(t("code"))}: ${escapeHtml(product.code)}</p>
              <p class="cart-line-total">${item.qty} × ${escapeHtml(money(product.price))} = ${escapeHtml(money(lineTotal))}</p>
              <div class="cart-tools">
                <button class="remove-btn" type="button" data-act="rm" data-id="${escapeHtml(id)}">${escapeHtml(t("remove"))}</button>
              </div>
            </div>
            <div class="qty" aria-label="${escapeHtml(t("qty"))}">
              <button type="button" data-act="dec" data-id="${escapeHtml(id)}">-</button>
              <span>${item.qty}</span>
              <button type="button" data-act="inc" data-id="${escapeHtml(id)}">+</button>
            </div>
          </article>
        `;
      }).join("");
      els.cartCosts.innerHTML = `
        <div class="cost-row">
          <span>${escapeHtml(t("subtotal"))}</span>
          <strong>${escapeHtml(money(subtotal))}</strong>
        </div>
        <div class="cost-row">
          <span>${escapeHtml(t("delivery"))}</span>
          <strong>${escapeHtml(fee ? money(fee) : t("deliveryFree"))}</strong>
        </div>
        ${fee ? `<div class="cost-note">${escapeHtml(t("deliveryNote"))}</div>` : ""}
        <div class="cost-row final">
          <span>${escapeHtml(t("finalTotal"))}</span>
          <strong>${escapeHtml(money(total))}</strong>
        </div>
      `;
    }
    function sendCartToWhatsApp() {
      if (cart.size === 0) return;
      if (!validateOrderForm(true)) return;
      const customer = customerDetails();
      const lines = [
        t("cartGreeting"),
        "",
        `${t("customerDetailsTitle")}:`,
        `${t("customerName")}: ${customer.name}`,
        `${t("customerPhone")}: ${customer.phone}`,
        `${t("customerAddress")}: ${customer.address}`,
        "",
        `${t("orderDetailsTitle")}:`
      ];
      let index = 1;
      for (const item of cart.values()) {
        const lineTotal = item.product.price * item.qty;
        lines.push(`${index}. ${item.product.name}`);
        lines.push(`   ${t("code")}: ${item.product.code} | ${t("qty")}: ${item.qty} | ${t("total")}: ${money(lineTotal)}`);
        index += 1;
      }
      const subtotal = cartSubtotal();
      const fee = deliveryFee(subtotal);
      lines.push("");
      lines.push(`${t("subtotal")}: ${money(subtotal)}`);
      lines.push(`${t("delivery")}: ${fee ? money(fee) : t("deliveryFree")}`);
      lines.push(`${t("finalTotal")}: ${money(subtotal + fee)}`);
      lines.push(`${cartCount()} ${t("items")}`);
      trackEvent("Contact");
      window.open(waUrl(lines.join("\n")), "_blank", "noopener");
    }
    function renderCategoryTabs() {
      const categories = sortedCategories(products.map(productCategory));
      if (!categories.includes(selectedCategory)) selectedCategory = categories.includes(OFFER_CATEGORY) ? OFFER_CATEGORY : "all";
      const tabs = [];
      if (categories.includes(OFFER_CATEGORY)) {
        tabs.push(`<button class="cat-tab offer ${selectedCategory === OFFER_CATEGORY ? "active" : ""}" data-cat="${OFFER_CATEGORY}" type="button">${escapeHtml(t("offers"))}</button>`);
      }
      tabs.push(`<button class="cat-tab ${selectedCategory === "all" ? "active" : ""}" data-cat="all" type="button">${escapeHtml(t("all"))}</button>`);
      for (const category of categories) {
        if (category === OFFER_CATEGORY) continue;
        tabs.push(`<button class="cat-tab ${selectedCategory === category ? "active" : ""}" data-cat="${escapeHtml(category)}" type="button">${escapeHtml(categoryLabel(category))}</button>`);
      }
      els.categoryTabs.innerHTML = tabs.join("");
    }
    function renderProducts() {
      const query = safe(els.search.value).trim().toLowerCase();
      const filtered = products.filter((product) => {
        const category = productCategory(product);
        const matchesCategory = selectedCategory === "all" || selectedCategory === category;
        return matchesCategory && (!query || productSearchText(product).includes(query));
      });
      if (!filtered.length) {
        els.status.hidden = false;
        els.status.textContent = t("empty");
        els.content.innerHTML = "";
        return;
      }
      els.status.hidden = true;
      const grouped = new Map();
      for (const product of filtered) {
        const category = selectedCategory === "all" ? productCategory(product) : selectedCategory;
        if (!grouped.has(category)) grouped.set(category, []);
        grouped.get(category).push(product);
      }
      els.content.innerHTML = sortedCategories([...grouped.keys()]).map((category) => {
        const list = grouped.get(category) || [];
        const cards = list.map((product) => {
          const qty = cart.get(product.id)?.qty || 0;
          const offer = productCategory(product) === OFFER_CATEGORY;
          return `
            <article class="card ${offer ? "offer-card" : ""}" data-id="${escapeHtml(product.id)}">
              <img class="product-img" src="${escapeHtml(product.image)}" alt="${escapeHtml(product.name)}" loading="lazy">
              <div class="body">
                <h3 class="name">${escapeHtml(product.name)}</h3>
                <p class="code">MAD - ${escapeHtml(t("code"))}: ${escapeHtml(product.code)}</p>
                <p class="price">${escapeHtml(money(product.price))}</p>
                <div class="btn-row">
                  <button class="btn alt add-btn" data-id="${escapeHtml(product.id)}" type="button">${escapeHtml(qty ? `${t("added")} (${qty})` : t("add"))}</button>
                  <a class="btn wa details-btn" href="${escapeHtml(productPageUrl(product))}">${escapeHtml(pt("details"))}</a>
                </div>
              </div>
            </article>
          `;
        }).join("");
        return `
          <section class="section">
            <h2 class="section-head">
              <span>${escapeHtml(categoryLabel(category))}</span>
              <span class="count">${list.length}</span>
            </h2>
            <div class="grid">${cards}</div>
          </section>
        `;
      }).join("");
    }
    async function loadCatalog() {
      els.status.hidden = false;
      els.status.textContent = t("loading");
      const url = new URL(CATALOG_URL);
      url.searchParams.set("lang", locale);
      url.searchParams.set("_", Date.now().toString());
      try {
        const response = await fetch(url.toString(), { cache: "no-store" });
        if (!response.ok) throw new Error(`Catalog failed: ${response.status}`);
        const rows = await response.json();
        if (!Array.isArray(rows)) throw new Error("Catalog is not an array");
        products = rows.map(normalizeRow).filter((product) => product.code && product.image);
        const productKey = requestedProductKey();
        if (productKey) {
          const product = findProductByKey(productKey);
          if (product) {
            renderProductPage(product);
          } else {
            document.body.classList.remove("product-view");
            els.status.hidden = false;
            els.status.textContent = pt("productNotFound");
          }
          return;
        }
        selectedCategory = products.some((product) => productCategory(product) === OFFER_CATEGORY) ? OFFER_CATEGORY : "all";
        renderCategoryTabs();
        renderProducts();
      } catch (error) {
        console.warn(error);
        els.status.hidden = false;
        els.status.textContent = t("loadError");
      }
    }

    function applyText() {
      document.title = t("title");
      els.title.textContent = t("title");
      els.search.placeholder = t("search");
      els.headerWa.textContent = "WhatsApp";
      els.headerWa.href = waUrl(t("consultGreeting"));
      els.openCart.textContent = t("cartCta");
      els.cartTitle.textContent = t("cartTitle");
      els.closeCart.textContent = t("close");
      els.clearCart.textContent = t("clear");
      els.sendCart.textContent = t("send");
      els.orderFormTitle.textContent = t("orderFormTitle");
      els.orderFormHint.textContent = t("orderFormHint");
      els.customerNameLabel.textContent = t("customerName");
      els.customerPhoneLabel.textContent = t("customerPhone");
      els.customerAddressLabel.textContent = t("customerAddress");
      els.customerName.placeholder = t("customerNamePlaceholder");
      els.customerPhone.placeholder = t("customerPhonePlaceholder");
      els.customerAddress.placeholder = t("customerAddressPlaceholder");
      els.orderFormError.textContent = t("orderFormError");
      els.status.textContent = t("loading");
    }

    els.categoryTabs.addEventListener("click", (event) => {
      const button = event.target.closest(".cat-tab");
      if (!button) return;
      selectedCategory = safe(button.getAttribute("data-cat")) || "all";
      renderCategoryTabs();
      renderProducts();
    });
    els.content.addEventListener("click", (event) => {
      const addButton = event.target.closest(".add-btn");
      if (addButton) {
        addToCart(safe(addButton.getAttribute("data-id")));
        return;
      }
      if (event.target.closest(".details-btn")) return;
      const card = event.target.closest(".card");
      if (card) {
        const product = products.find((item) => item.id === safe(card.getAttribute("data-id")));
        if (product) location.href = productPageUrl(product);
      }
    });
    els.search.addEventListener("input", renderProducts);
    els.openCart.addEventListener("click", () => openCartPanel());
    els.closeCart.addEventListener("click", () => {
      els.cartPanel.hidden = true;
    });
    els.cartPanel.addEventListener("click", (event) => {
      if (event.target === els.cartPanel) els.cartPanel.hidden = true;
    });
    els.cartItems.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-act]");
      if (!button) return;
      const id = safe(button.getAttribute("data-id"));
      const act = safe(button.getAttribute("data-act"));
      if (act === "rm") {
        cart.delete(id);
        renderCart();
        updateAddButtons();
        return;
      }
      updateQty(id, act === "inc" ? 1 : -1);
    });
    els.clearCart.addEventListener("click", () => {
      cart.clear();
      renderCart();
      updateAddButtons();
    });
    els.sendCart.addEventListener("click", sendCartToWhatsApp);
    els.orderForm.addEventListener("submit", (event) => {
      event.preventDefault();
      sendCartToWhatsApp();
    });
    for (const field of orderFields()) {
      field.addEventListener("input", () => {
        field.classList.remove("invalid");
        if (orderFields().every((item) => safe(item.value).trim())) els.orderFormError.hidden = true;
      });
    }
    els.headerWa.addEventListener("click", () => trackEvent("Contact"));

    applyText();
    renderCart();
    loadCatalog();
  </script>
</body>
</html>
